        // --- Payroll Data ---
        async function loadPayrollFromDB() {
          const { data, error } = await sb.from('payroll_data').select('raw_row, pay_period_end').order('pay_period_end', { ascending: true });
          if (error) { console.error('loadPayroll error', error); return null; }
          // Reconstruct raw rows with pay period end merged in
          return data.map(r => ({ ...r.raw_row, 'Pay Period End': r.pay_period_end }));
        }

        async function savePayrollToDB(parsedRows, filename) {
          // Map parsed rows to table columns; keep full row in raw_row for safety
          const records = parsedRows.map(row => {
            const orgKey = Object.keys(row).find(k => {
              const c = String(k).replace(/\s+/g, '').toLowerCase();
              return c === 'org.#' || c === 'org#' || c === 'org' || c === 'orgnum';
            });
            const payPeriod = parseDateStrToMonthKey(row['Pay Period End']);
            // Convert month key back to a proper date (first of month) for the date column
            const payDate = payPeriod ? `${payPeriod}-01` : null;
            return {
              pay_period_end:  payDate,
              employee_id:     String(row['ID'] || '').trim() || null,
              employee_name:   String(row['Name'] || '').trim() || null,
              amount:          parseAmount(row['Amount']),
              group_name:      String(row['Group'] || '').trim() || null,
              org_number:      orgKey ? String(row[orgKey]).trim() : null,
              account_number:  String(row['Account #'] || row['Account Number'] || '').trim() || null,
              account_desc:    String(row['Acct. Description'] || row['Account'] || '').trim() || null,
              position_desc:   String(row['Posn Desc'] || row['Position'] || '').trim() || null,
              department_name: String(row['Department name'] || row['Department'] || row['Descr_1'] || '').trim() || null,
              sal_plan:        String(row['Sal Plan'] || '').trim() || null,
              raw_row:         row,
            };
          });

          // Batch insert in chunks of 500 to avoid request size limits
          const CHUNK = 500;
          for (let i = 0; i < records.length; i += CHUNK) {
            const chunk = records.slice(i, i + CHUNK);
            const { error } = await sb.from('payroll_data').insert(chunk);
            if (error) { console.error('savePayroll error', error); throw error; }
          }

          // Log the upload
          await sb.from('upload_log').insert({
            filename:      filename || 'manual_upload',
            rows_inserted: records.length,
            rows_in_file:  parsedRows.length,
            notes:         'Uploaded via app'
          });
        }

        async function saveMappingToDB(parsedRows) {
          const records = parsedRows.map(r => {
            let org = '', fac = '', dept = '';
            for (const [k, v] of Object.entries(r)) {
              const c = String(k).toLowerCase().trim();
              if (c === 'org' || c === 'org.' || c === 'org. #') org = String(v).trim();
              if (c === 'faculty') fac = String(v).trim();
              if (c === 'department') dept = String(v).trim();
            }
            return org ? { org_number: org, faculty: fac, department: dept } : null;
          }).filter(Boolean);

          if (records.length === 0) return;
          const { error } = await sb.from('org_mapping')
            .upsert(records, { onConflict: 'org_number' });
          if (error) console.error('saveMapping error', error);
        }

            if (r.assumption_type === 'filters')    out.startMonthFilter = (r.data && r.data.startMonthFilter) || '';

          return out;

        // --- Iron-Clad Date Parser ---
        function parseDateStrToMonthKey(dateStr) {
          if (!dateStr) return null;
          
          let y, m;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-') && !/[a-zA-Z]/.test(String(dateStr)))) {
            const serial = parseFloat(dateStr);
            const dateObj = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            y = dateObj.getUTCFullYear();
            m = dateObj.getUTCMonth() + 1;
          } else {
            const str = String(dateStr).trim().toLowerCase();
            let foundMonth = false;
            
            const months = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
            for (const [mName, mNum] of Object.entries(months)) {
                if (str.includes(mName)) {
                    m = mNum;
                    foundMonth = true;
                    
                    let year4Match = str.match(/\b(20\d{2})\b/);
                    if (year4Match) {
                        y = parseInt(year4Match[1], 10);
                    } else {
                        let endYearMatch = str.match(/(?:[-/\s]|^)(\d{2})\s*$/);
                        if (endYearMatch) {
                            y = parseInt(endYearMatch[1], 10);
                        } else {
                            let allNumbers = str.match(/\b\d{2}\b/g);
                            if (allNumbers && allNumbers.length > 0) {
                                y = parseInt(allNumbers[allNumbers.length - 1], 10);
                            }
                        }
                    }
                    break;
                }
            }

            if (!foundMonth) {
                const parts = str.split(/[-/]/);
                if (parts.length >= 2) {
                    let p0 = parseInt(parts[0], 10);
                    let p1 = parseInt(parts[1], 10);
                    let p2 = parts.length === 3 ? parseInt(parts[2], 10) : null;

                    if (parts.length === 2) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[1].length === 4) { y = p1; m = p0; }
                        else { y = p1; m = p0; } 
                    } else if (parts.length === 3) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[2].length === 4 || String(p2).length === 2) { 
                            y = p2;
                            if (p0 > 12) { m = p1; } 
                            else if (p1 > 12) { m = p0; } 
                            else { m = p0; } 
                        }
                    }
                }
            }
          }

          if (y && m) {
              if (y < 100) y += 2000;
              return `${y}-${String(m).padStart(2, '0')}`;
          }

          const parsedDate = new Date(dateStr);
          if (!isNaN(parsedDate.getTime())) {
              return `${parsedDate.getFullYear()}-${String(parsedDate.getMonth() + 1).padStart(2, '0')}`;
          }
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          return new Date(yearNum, monthNum - 1, 1).toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        const formatCount = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US').format(val);

        function parseAmount(val) {
          if (val == null || val === '') return 0;
          if (typeof val === 'number') return val;
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          let num = parseFloat(strVal);
          return isNaN(num) ? 0 : (isNegative ? -num : num);
        }

          const [mappingData, setMappingData] = useState(null);
          const [isProcessing, setIsProcessing] = useState(true); 
          
          const [assumptions, setAssumptions] = useState({ oneOffs: [], increments: [], union: [], newHires: [], startMonthFilter: '' });
          const [activeAdminTab, setActiveAdminTab] = useState('union');
          
          // Note: Forecasts is TRUE by default so users can explicitly see the future August 2026 data!
          const [scenarioFilters, setScenarioFilters] = useState({ base: true, union: true, increments: true, oneOffs: true, newHires: true, forecasts: true });
          
          const [activeTab, setActiveTab] = useState('table'); 
          const [waterfallBaseIndex, setWaterfallBaseIndex] = useState(-1);
          const [waterfallCompareIndex, setWaterfallCompareIndex] = useState(-1);
          
          const [dataModel, setDataModel] = useState(null);
          const [expandedRows, setExpandedRows] = useState(new Set(['root']));
          
          const [metric, setMetric] = useState('amount'); 
          const [viewMode, setViewMode] = useState('actuals'); 
          const [timeGrouping, setTimeGrouping] = useState('month');
          const [hierarchyIndex, setHierarchyIndex] = useState(2); // Default to standard Faculty view
          
          const [dashboardMonth, setDashboardMonth] = useState('');
          
          // Union Drafts state for the UI list
          const [unionDrafts, setUnionDrafts] = useState({});
          
          // Refs
          const fileInputRef = useRef(null);
          const incInputRef = useRef(null);
          const newHireInputRef = useRef(null);
          const unionInputRef = useRef(null);
          const oneOffInputRef = useRef(null);
          const mappingInputRef = useRef(null);
          
          const [incMonth, setIncMonth] = useState('2026-08');
          const [nhMonth, setNhMonth] = useState('2026-08');
          
          const logoSrc = useMemo(() => getLogoSrc(), []);

          const processFile = async (file, onComplete) => {
            setIsProcessing(true);
            try {
              let actualFile = file;
              if (file.name.toLowerCase().endsWith('.zip')) {
                  const JSZip = await loadJSZipParser();
                  if (!JSZip) throw new Error("JSZip library not loaded");
                  const zip = await JSZip.loadAsync(file);
                  const filename = Object.keys(zip.files).find(name => !name.startsWith('__MACOSX') && !name.startsWith('.') && !zip.files[name].dir);
                  if (!filename) throw new Error("No valid Excel/CSV found inside ZIP.");
                  const fileData = await zip.files[filename].async("blob");
                  actualFile = new File([fileData], filename);
              }

              const XLSX = await loadExcelParser();
              const reader = new FileReader();
              reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const parsed = XLSX.utils.sheet_to_json(worksheet, { raw: true, defval: "" }); 
                onComplete(parsed);
              };
              reader.readAsArrayBuffer(actualFile);
            } catch (e) {
              console.error(e);
              alert("Error reading file. Details: " + e.message);
              setIsProcessing(false);
            }
          };

          const fetchAndProcessFile = async (filename, callback) => {
            try {
                const res = await fetch('./' + filename);
                if (res.ok) {
                    const blob = await res.blob();
                    const ext = filename.split('.').pop().toLowerCase();
                    const mime = ext === 'zip' ? 'application/zip' : (ext === 'csv' ? 'text/csv' : 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
                    const file = new File([blob], filename, { type: mime });
                    return new Promise(resolve => {
                        processFile(file, (parsed) => {
                            callback(parsed);
                            resolve(true);
                        });
                    });
                }
            } catch (e) { }
            return false;
          };

          // Step 1: Initial Load from Supabase
          useEffect(() => {
            const initApp = async () => {
              try {
                // Load payroll data from Supabase
                const savedData = await loadPayrollFromDB();
                if (savedData && savedData.length > 0) {
                    setRawData(savedData);
                } else {
                    setIsProcessing(false);
                }

                // Load org mapping from Supabase
                const tempMapping = await loadMappingFromDB();
                if (tempMapping) setMappingData(tempMapping);

                // Load assumptions from Supabase
                const savedAssumptions = await loadAssumptionsFromDB();
                const tempAssumptions = savedAssumptions || { oneOffs: [], increments: [], union: [], newHires: [], startMonthFilter: '' };
                setAssumptions(tempAssumptions);

                setIsProcessing(false);
              } catch (err) {
                console.error("Initialization failed", err);
                setIsProcessing(false);
              }
            };
            initApp();
          }, []);

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            processFile(file, async (parsed) => {
              try {
                const doAppend = rawData && rawData.length > 0
                  ? window.confirm(`Existing data found (${rawData.length} rows).\n\nClick [OK] to APPEND to history.\nClick [Cancel] to OVERWRITE everything.`)
                  : false;
                if (!doAppend) await clearPayrollFromDB();
                await savePayrollToDB(parsed, file.name);
                const freshData = await loadPayrollFromDB();
                setRawData(freshData);
              } catch(err) {
                alert('Upload failed: ' + err.message);
              }
              if (fileInputRef.current) fileInputRef.current.value = null;
            });
          };

          const handleClearData = async () => {
            if (window.confirm("Are you sure you want to completely clear all saved raw data AND forecast assumptions?")) {
              setIsProcessing(true);
              await clearAllDB();
              setRawData(null);
              setProcessedDataCache(null);
              setAssumptions({ oneOffs: [], increments: [], union: [], newHires: [], startMonthFilter: '' });
              setMappingData(null);
              setDataModel(null);
              setDashboardMonth('');
              setActiveTab('table');
              setWaterfallBaseIndex(-1);
              setWaterfallCompareIndex(-1);
              setIsProcessing(false);
            }
          };

          const saveAssumptionsState = async (newAssumptions) => {
              setAssumptions(newAssumptions);
              await saveAssumptionsToDB(newAssumptions);
          };

          // --- Step 2: Hydration Phase (Pre-Processing) ---
          useEffect(() => {
              if (!rawData) return;
              setIsProcessing(true);
              
              setTimeout(() => {
                  let orgKey = null;
                  if (rawData.length > 0) {
                      orgKey = Object.keys(rawData[0]).find(k => {
                          const c = String(k).replace(/\s+/g, '').toLowerCase();
                          return c === 'org.#' || c === 'org#' || c === 'org' || c === 'orgnum';
                      });
                  }
                  
                  const uniqueGroupsSet = new Set();
                  const monthsSet = new Set();
                  
                  const processed = rawData.map(row => {
                      const month = parseDateStrToMonthKey(row['Pay Period End']);
                      const amount = parseAmount(row['Amount']);
                      const id = String(row['ID'] || '').trim();
                      const group = String(row['Group'] || '').trim();
                      
                      const orgValue = orgKey ? row[orgKey] : null;
                      const cleanOrgValue = orgValue ? String(orgValue).trim() : null;
                      
                      if (group && group !== 'undefined') uniqueGroupsSet.add(group);
                      if (month) monthsSet.add(month);
                      
                      return { row, month, amount, id, group, cleanOrgValue };
                  });
                  
                  setProcessedDataCache({
                      data: processed,
                      uniqueGroups: Array.from(uniqueGroupsSet).sort(),
                      rawMonthsList: Array.from(monthsSet).sort()
                  });
              }, 50);
          }, [rawData]);

          // --- Derived Setup & Auto-Apply 5% Rules ---
          useEffect(() => {
              if (!processedDataCache) return;
              const initialDrafts = {};
              processedDataCache.uniqueGroups.forEach(g => {
                  initialDrafts[g] = { pct: 5, startMonth: '2026-08' };
              });
              setUnionDrafts(initialDrafts);

              // Instantly Auto-Apply 5% Rule if union rules are empty
              setAssumptions(prev => {
                  if (prev.union && prev.union.length === 0 && processedDataCache.uniqueGroups.length > 0) {
                      const autoRules = processedDataCache.uniqueGroups.map(g => ({
                          group: g,
                          percentage: 5,
                          startMonth: '2026-08',
                          id: Date.now() + Math.random()
                      }));
                      const newAssumptions = { ...prev, union: autoRules };
                      saveAssumptionsToDB(newAssumptions);
                      return newAssumptions;
                  }
                  return prev;
              });
          }, [processedDataCache]);

          const handleUnionDraftChange = (group, field, value) => {
              setUnionDrafts(prev => ({ ...prev, [group]: { ...prev[group], [field]: value } }));
          };

          const handleApplySingleUnion = (group) => {
              const draft = unionDrafts[group];
              if (!draft || draft.pct === '' || !draft.startMonth) return alert("Fill all fields for " + group);
              const newRule = { group, percentage: parseFloat(draft.pct), startMonth: draft.startMonth, id: Date.now() + Math.random() };
              saveAssumptionsState({ ...assumptions, union: [...(assumptions.union || []), newRule] });
              alert(`Applied ${draft.pct}% increase to ${group} starting ${formatMonthLabel(draft.startMonth)}`);
          };

          const handleApplyAllUnionDrafts = () => {
              const newRules = [];
              if (processedDataCache && processedDataCache.uniqueGroups) {
                  processedDataCache.uniqueGroups.forEach(g => {
                      const draft = unionDrafts[g];
                      if (draft && draft.pct !== '' && draft.startMonth) {
                          newRules.push({ group: g, percentage: parseFloat(draft.pct), startMonth: draft.startMonth, id: Date.now() + Math.random() });
                      }
                  });
              }
              if (newRules.length === 0) return alert("No valid rules to apply.");
              saveAssumptionsState({ ...assumptions, union: [...(assumptions.union || []), ...newRules] });
              alert(`Applied ${newRules.length} group increases!`);
          };

          const forecastMonthsList = useMemo(() => {
              if (!processedDataCache) return [];
              const allMonths = processedDataCache.rawMonthsList.filter(m => !assumptions.startMonthFilter || m >= assumptions.startMonthFilter);
              if(allMonths.length === 0) return [];
              const baseM = allMonths[allMonths.length - 1];
              const [y, m] = baseM.split('-');
              let curr = new Date(parseInt(y, 10), parseInt(m, 10), 1); 
              const end = new Date(2027, 6, 1);
              
              const list = [];
              while(curr <= end) {
                  const fy = curr.getFullYear();
                  const fm = String(curr.getMonth() + 1).padStart(2, '0');
                  list.push(`${fy}-${fm}`);
                  curr.setMonth(curr.getMonth() + 1);
              }
              return list;
          }, [processedDataCache, assumptions.startMonthFilter]);

          // --- Step 3: Core Engine Build (Highly Optimized & Scenario Tagged) ---
          useEffect(() => {
            if (!processedDataCache) return;
            setIsProcessing(true);
            
            setTimeout(() => {
              const pData = processedDataCache.data;
              const filteredData = pData.filter(d => d.month && (!assumptions.startMonthFilter || d.month >= assumptions.startMonthFilter));

              const allMonthsSet = new Set();
              const empInfoMap = {}; 

              for (let i=0; i < filteredData.length; i++) {
                  const d = filteredData[i];
                  allMonthsSet.add(d.month);
                  if (d.id) empInfoMap[d.id] = d.row;
              }

              const actualMonths = Array.from(allMonthsSet).sort();
              if (actualMonths.length === 0) { setIsProcessing(false); return; }

              const baseMonth = actualMonths[actualMonths.length - 1];

              const forecastMonths = [];
              const [baseY, baseM] = baseMonth.split('-');
              let currentForecast = new Date(parseInt(baseY, 10), parseInt(baseM, 10), 1);
              const endForecast = new Date(2027, 6, 1); 
              while (currentForecast <= endForecast) {
                const y = currentForecast.getFullYear();
                const m = String(currentForecast.getMonth() + 1).padStart(2, '0');
                forecastMonths.push(`${y}-${m}`);
                currentForecast.setMonth(currentForecast.getMonth() + 1);
              }

              const baseData = filteredData.filter(d => d.month === baseMonth);
              const combinedData = [];
              const allTimelineMonths = [...actualMonths, ...forecastMonths];

              // Pre-compute Union Multipliers
              const unionMultipliers = {}; 
              processedDataCache.uniqueGroups.forEach(grp => {
                  allTimelineMonths.forEach(m => {
                      let mult = 1;
                      if (scenarioFilters.union && assumptions.union) {
                          for (let i=0; i<assumptions.union.length; i++) {
                              const u = assumptions.union[i];
                              if (u.group === grp && m >= u.startMonth) mult *= (1 + (u.percentage / 100));
                          }
                      }
                      if (!unionMultipliers[m]) unionMultipliers[m] = {};
                      unionMultipliers[m][grp] = mult;
                  });
              });

              // Process Actuals (Tagged for Recon Walk)
              for (let i=0; i < filteredData.length; i++) {
                  const d = filteredData[i];
                  const mult = (unionMultipliers[d.month] && unionMultipliers[d.month][d.group]) ? unionMultipliers[d.month][d.group] : 1;
                  
                  if (scenarioFilters.base) { 
                      combinedData.push({ month: d.month, amount: d.amount, id: d.id, row: d.row, cleanOrgValue: d.cleanOrgValue, __Scenario: '1. Base (Actuals)' }); 
                  }
                  
                  if (mult > 1) {
                      const unionInc = (d.amount * mult) - d.amount;
                      combinedData.push({ month: d.month, amount: unionInc, id: d.id, row: d.row, cleanOrgValue: d.cleanOrgValue, __Scenario: '3. Union Increases' });
                  }
              }

              // Process Forecasts (Tagged for Recon Walk)
              for (let i=0; i < forecastMonths.length; i++) {
                  const fm = forecastMonths[i];
                  for (let j=0; j < baseData.length; j++) {
                      const bd = baseData[j];
                      const mult = (unionMultipliers[fm] && unionMultipliers[fm][bd.group]) ? unionMultipliers[fm][bd.group] : 1;
                      
                      if (scenarioFilters.base) { 
                          combinedData.push({ month: fm, amount: bd.amount, id: bd.id, row: bd.row, cleanOrgValue: bd.cleanOrgValue, __Scenario: '2. Base (Carried Forward)' }); 
                      }
                      
                      if (mult > 1) {
                          const unionInc = (bd.amount * mult) - bd.amount;
                          combinedData.push({ month: fm, amount: unionInc, id: bd.id, row: bd.row, cleanOrgValue: bd.cleanOrgValue, __Scenario: '3. Union Increases' });
                      }
                  }
              }

              // Process Flat Rules
              allTimelineMonths.forEach(fm => {
                  if (scenarioFilters.increments && assumptions.increments) {
                      for(let i=0; i<assumptions.increments.length; i++) {
                          const inc = assumptions.increments[i];
                          if (fm >= inc.startMonth) {
                              const info = empInfoMap[inc.id] || { 'Name': `New Hire (${inc.id})`, 'ID': inc.id, 'Department name': 'TBD / New Hires' };
                              combinedData.push({ month: fm, amount: parseFloat(inc.amount), id: inc.id, row: info, cleanOrgValue: null, __Scenario: '4. Flat Increments' });
                          }
                      }
                  }
                  
                  if (scenarioFilters.newHires && assumptions.newHires) {
                      for(let i=0; i<assumptions.newHires.length; i++) {
                          const nh = assumptions.newHires[i];
                          if (fm >= nh.startMonth) {
                              const row = { 'ID': nh.id, 'Name': nh.name, 'Mapped Department': nh.department, 'Mapped Faculty': nh.faculty, 'Posn Desc': nh.position, 'Group': nh.group };
                              combinedData.push({ month: fm, amount: parseFloat(nh.amount), id: nh.id, row, cleanOrgValue: null, __Scenario: '5. New Hires' });
                          }
                      }
                  }

                  if (scenarioFilters.oneOffs && assumptions.oneOffs) {
                      for(let i=0; i<assumptions.oneOffs.length; i++) {
                          const adj = assumptions.oneOffs[i];
                          const adjM = parseDateStrToMonthKey(adj.Month || adj.month);
                          if (adjM === fm) {
                              const mergedRow = { ...(empInfoMap[adj.ID] || {}), ...adj };
                              combinedData.push({ month: fm, amount: parseFloat(adj.Amount), id: adj.ID, row: mergedRow, cleanOrgValue: null, __Scenario: '6. One-Off Payments' });
                          }
                      }
                  }
              });

              // Pre-compute Labels & Hierarchy Fast Lookups
              const monthLabelCache = {};
              allTimelineMonths.forEach(m => {
                  const isFcst = forecastMonths.includes(m);
                  monthLabelCache[m] = `${formatMonthLabel(m)} ${isFcst ? '[FORECAST]' : '[ACTUAL]'}`;
              });

              const orgCache = {};
              const presetKeys = HIERARCHY_PRESETS[hierarchyIndex].keys;
              const tree = { id: 'root', name: 'Total UWI Mona', level: 0, children: {}, amounts: {}, empIds: {} };

              for (let i=0; i < combinedData.length; i++) {
                  const item = combinedData[i];
                  const { month, amount, id, row, cleanOrgValue } = item;
                  
                  let currentNode = tree;
                  currentNode.amounts[month] = (currentNode.amounts[month] || 0) + amount;
                  if (id && id !== 'undefined') {
                      if (!currentNode.empIds[month]) currentNode.empIds[month] = new Set();
                      currentNode.empIds[month].add(id);
                  }

                  let currentId = 'root';
                  let mappedFac = row['Mapped Faculty'];
                  let mappedDept = row['Mapped Department'];

                  if ((!mappedFac || !mappedDept) && cleanOrgValue) {
                      if (orgCache[cleanOrgValue] === undefined) {
                          const mappedInfo = mappingData && mappingData[cleanOrgValue];
                          orgCache[cleanOrgValue] = {
                              faculty: (mappedInfo && mappedInfo.faculty) ? mappedInfo.faculty : getFacultyFromOrg(cleanOrgValue),
                              dept: (mappedInfo && mappedInfo.dept) ? mappedInfo.dept : null
                          };
                      }
                      const cache = orgCache[cleanOrgValue];
                      if (!mappedFac) mappedFac = cache.faculty;
                      if (!mappedDept) mappedDept = cache.dept || (row['Department name'] || row['Department'] || row['Descr_1']);
                  } else if (!mappedDept) {
                      mappedDept = (row['Department name'] || row['Department'] || row['Descr_1']);
                  }

                  for (let k=0; k < presetKeys.length; k++) {
                    const key = presetKeys[k];
                    let val;
                    
                    if (key === '__Month') val = monthLabelCache[month];
                    else if (key === '__Scenario') val = item.__Scenario || 'Uncategorized';
                    else if (key === 'Mapped Faculty') val = mappedFac;
                    else if (key === 'Mapped Department') val = mappedDept;
                    else if (key === 'Acct. Description') val = row['Acct. Description'] || row['Account'] || row['__EMPTY'] || row['Descr'];
                    else if (key === 'Posn Desc') val = row['Posn Desc'] || row['Position'];
                    else if (key === 'Account #') val = row['Account #'] || row['Account Number'] || row['AccountNum'];
                    else val = row[key];
                    
                    val = val ? String(val).trim() : `Unknown ${key}`;
                    currentId += `|${val}`;
                    
                    if (!currentNode.children[val]) {
                      currentNode.children[val] = { id: currentId, name: val, level: k + 1, children: {}, amounts: {}, empIds: {} };
                    }
                    currentNode = currentNode.children[val];
                    
                    currentNode.amounts[month] = (currentNode.amounts[month] || 0) + amount;
                    if (id && id !== 'undefined') {
                        if (!currentNode.empIds[month]) currentNode.empIds[month] = new Set();
                        currentNode.empIds[month].add(id);
                    }
                  }
              }

              setDataModel({ tree, actualMonths, forecastMonths, baseMonth });
              if (!dashboardMonth || dashboardMonth < (assumptions.startMonthFilter||'')) setDashboardMonth(baseMonth);
              setExpandedRows(new Set(['root']));
              setIsProcessing(false);
            }, 10);
          }, [processedDataCache, assumptions, mappingData, hierarchyIndex, scenarioFilters]);

          const toggleRow = (id) => {
            setExpandedRows(prev => {
              const next = new Set(prev);
              if (next.has(id)) next.delete(id); else next.add(id);
              return next;
            });
          };

          const collapseAll = () => setExpandedRows(new Set(['root']));

          useEffect(() => {
              if (dataModel && dashboardMonth) {
                  const validMonths = scenarioFilters.forecasts 
                      ? [...dataModel.actualMonths, ...dataModel.forecastMonths] 
                      : dataModel.actualMonths;
                  if (!validMonths.includes(dashboardMonth)) {
                      setDashboardMonth(dataModel.baseMonth);
                  }
              }
          }, [scenarioFilters.forecasts, dataModel, dashboardMonth]);

          useEffect(() => {
              setWaterfallBaseIndex(-1);
              setWaterfallCompareIndex(-1);
          }, [timeGrouping, dataModel, scenarioFilters.forecasts]);

          // Display Periods (Filters out Forecasts if toggle is unchecked)
          const displayPeriods = useMemo(() => {
            if (!dataModel) return [];
            
            let allMonths = [...dataModel.actualMonths];
            if (scenarioFilters.forecasts) {
                allMonths.push(...dataModel.forecastMonths);
            }
            
            if (timeGrouping === 'ytd') {
                return allMonths.map(targetMonth => {
                    const [dYearStr, dMonthStr] = targetMonth.split('-');
                    const fyStartYear = parseInt(dMonthStr, 10) >= 8 ? parseInt(dYearStr, 10) : parseInt(dYearStr, 10) - 1;

                    const ytdMonths = allMonths.filter(m => {
                        const [yStr, mmStr] = m.split('-');
                        const mFyStartYear = parseInt(mmStr, 10) >= 8 ? parseInt(yStr, 10) : parseInt(yStr, 10) - 1;
                        return mFyStartYear === fyStartYear && m <= targetMonth;
                    });

                    const hasActual = ytdMonths.some(m => dataModel.actualMonths.includes(m));
                    const hasForecast = ytdMonths.some(m => dataModel.forecastMonths.includes(m));
                    return {
                        key: `YTD-${targetMonth}`,
                        label: `YTD (${formatMonthLabel(targetMonth)})`,
                        months: ytdMonths,
                        type: (hasActual && hasForecast) ? 'mixed' : (hasForecast ? 'forecast' : 'actual'),
                        containsBaseMonth: ytdMonths.includes(dataModel.baseMonth)
                    };
                });
            }

            const groups = {};
            allMonths.forEach(m => {
              const [y_str, mm_str] = m.split('-');
              const y = parseInt(y_str, 10);
              const mm = parseInt(mm_str, 10);
              let fyStartYear = mm >= 8 ? y : y - 1;
              let fyEndYear = fyStartYear + 1;
              
              let key, label;
              if (timeGrouping === 'annual') {
                key = `FY-${fyStartYear}`; 
                label = `FY ${fyStartYear}/${fyEndYear.toString().slice(2)}`;
              } else if (timeGrouping === 'quarter') {
                let q = (mm >= 8 && mm <= 10) ? 1 : ((mm === 11 || mm === 12 || mm === 1) ? 2 : ((mm >= 2 && mm <= 4) ? 3 : 4));
                key = `FY-${fyStartYear}-Q${q}`; 
                label = `Q${q} ${fyStartYear}/${fyEndYear.toString().slice(2)}`;
              } else {
                key = m; 
                label = formatMonthLabel(m);
              }

              if (!groups[key]) groups[key] = { key, label, months: [], type: 'actual', containsBaseMonth: false };
              groups[key].months.push(m);
              if (m === dataModel.baseMonth) groups[key].containsBaseMonth = true;
            });

            return Object.values(groups).sort((a,b) => a.key.localeCompare(b.key)).map(g => {
              const hasActual = g.months.some(m => dataModel.actualMonths.includes(m));
              const hasForecast = g.months.some(m => dataModel.forecastMonths.includes(m));
              g.type = (hasActual && hasForecast) ? 'mixed' : (hasForecast ? 'forecast' : 'actual');
              return g;
            });
          }, [dataModel, timeGrouping, scenarioFilters.forecasts]);

          const getMetricValue = useCallback((node, period) => {
            if (metric === 'amount') return period.months.reduce((sum, m) => sum + (node.amounts[m] || 0), 0);
            const combinedSet = new Set();
            period.months.forEach(m => { if (node.empIds[m]) node.empIds[m].forEach(id => combinedSet.add(id)); });
            return combinedSet.size;
          }, [metric]);
          
          const getRowTotal = useCallback((node) => {
            if (viewMode === 'variance') {
                let sum = 0;
                displayPeriods.forEach((p, i) => { if (i > 0) sum += (getMetricValue(node, p) - getMetricValue(node, displayPeriods[i-1])); });
                return sum;
            }
            if (metric === 'amount') return displayPeriods.reduce((sum, p) => sum + getMetricValue(node, p), 0);
            const combined = new Set();
            displayPeriods.forEach(p => p.months.forEach(m => { if (node.empIds[m]) node.empIds[m].forEach(id => combined.add(id)); }));
            return combined.size;
          }, [metric, viewMode, displayPeriods, getMetricValue]);

          const renderValueCell = useCallback((node, period, prevPeriod) => {
            const isVariance = viewMode === 'variance';
            
            if (isVariance) {
              if (!prevPeriod) return <td key={period.key} className="px-3 py-2 text-right text-gray-400">-</td>;
              const currentVal = getMetricValue(node, period);
              const prevVal = getMetricValue(node, prevPeriod);
              const diff = currentVal - prevVal;
              
              let colorClass = "text-gray-700";
              if (diff > 0) colorClass = "text-red-600 font-medium"; 
              if (diff < 0) colorClass = "text-green-600 font-medium";
              if (metric === 'amount' && Math.abs(diff) < 0.01) colorClass = "text-gray-400";
              if (metric === 'headcount' && diff === 0) colorClass = "text-gray-400";

              const formattedDiff = metric === 'amount' ? formatCurrency(diff) : formatCount(diff);
              const displayDiff = diff > 0 ? `+${formattedDiff}` : formattedDiff;

              let pctString = "";
              if (prevVal !== 0) {
                  const pct = (diff / Math.abs(prevVal)) * 100;
                  pctString = `(${pct > 0 ? '+' : ''}${pct.toFixed(1)}%)`;
              } else if (diff > 0) {
                  pctString = `(+100.0%)`;
              } else if (diff < 0) {
                  pctString = `(-100.0%)`;
              }
              const showPct = Math.abs(diff) > (metric === 'amount' ? 0.01 : 0) && pctString !== "";

              return (
                <td key={period.key} className={`px-3 py-2 text-right ${colorClass} ${period.type === 'forecast' ? 'bg-indigo-50/30' : ''}`}>
                  <div className="flex flex-col items-end justify-center">
                      <span>{displayDiff}</span>
                      {showPct && <span className="text-[10px] opacity-70 mt-0.5">{pctString}</span>}
                  </div>
                </td>
              );
            }

            const val = getMetricValue(node, period);
            return (
              <td key={period.key} className={`px-3 py-2 text-right text-gray-800 ${period.type === 'forecast' ? 'bg-indigo-50/50' : ''}`}>
                {metric === 'amount' ? formatCurrency(val) : formatCount(val)}
              </td>
            );
          }, [metric, viewMode, getMetricValue]);

          const flatRows = useMemo(() => {
            if (!dataModel) return [];
            const rows = [];
            const flatten = (node) => {
              rows.push(node);
              if (node.children && Object.keys(node.children).length > 0 && expandedRows.has(node.id)) {
                Object.values(node.children)
                  .sort((a, b) => String(a.name).localeCompare(String(b.name)))
                  .forEach(flatten);
              }
            };
            flatten(dataModel.tree);
            return rows;
          }, [dataModel, expandedRows]);

          const dashboardStats = useMemo(() => {
            if (!dataModel || !dashboardMonth) return null;
            
            let allMonths = [...dataModel.actualMonths];
            if (scenarioFilters.forecasts) allMonths.push(...dataModel.forecastMonths);
            if (!allMonths.includes(dashboardMonth)) return null;

            const mIdx = allMonths.indexOf(dashboardMonth);
            const prevMonth = mIdx > 0 ? allMonths[mIdx - 1] : null;

            const root = dataModel.tree;
            const currentAmt = root.amounts[dashboardMonth] || 0;
            const prevAmt = prevMonth ? (root.amounts[prevMonth] || 0) : 0;
            const currentHC = root.empIds[dashboardMonth] ? root.empIds[dashboardMonth].size : 0;
            const prevHC = prevMonth && root.empIds[prevMonth] ? root.empIds[prevMonth].size : 0;

            const dYear = parseInt(dashboardMonth.split('-')[0], 10);
            const dMonth = parseInt(dashboardMonth.split('-')[1], 10);
            const fyStartYear = dMonth >= 8 ? dYear : dYear - 1;

            let ytdAmt = 0;
            const ytdIds = new Set();

            for (let i = 0; i <= mIdx; i++) {
                const m = allMonths[i];
                const [yStr, mmStr] = m.split('-');
                if ((parseInt(mmStr, 10) >= 8 ? parseInt(yStr, 10) : parseInt(yStr, 10) - 1) === fyStartYear && m <= dashboardMonth) {
                    ytdAmt += (root.amounts[m] || 0);
                    if (root.empIds[m]) root.empIds[m].forEach(id => ytdIds.add(id));
                }
            }

            let amountVarPct = 0;
            if (prevAmt !== 0) amountVarPct = ((currentAmt - prevAmt) / Math.abs(prevAmt)) * 100;
            else if (currentAmt - prevAmt !== 0) amountVarPct = (currentAmt - prevAmt > 0) ? 100 : -100;

            let hcVarPct = 0;
            if (prevHC !== 0) hcVarPct = ((currentHC - prevHC) / prevHC) * 100;
            else if (currentHC - prevHC !== 0) hcVarPct = (currentHC - prevHC > 0) ? 100 : -100;

            return {
              amount: currentAmt, amountVar: currentAmt - prevAmt, amountVarPct, ytdAmount: ytdAmt,
              hc: currentHC, hcVar: currentHC - prevHC, hcVarPct, ytdHc: ytdIds.size,
              hasPrev: !!prevMonth, isForecast: dataModel.forecastMonths.includes(dashboardMonth)
            };
          }, [dataModel, dashboardMonth, scenarioFilters.forecasts]);

          const waterfallData = useMemo(() => {
              if (displayPeriods.length < 2 || !dataModel) return null;
              
              let baseIdx = waterfallBaseIndex === -1 ? (displayPeriods.length >= 2 ? displayPeriods.length - 2 : 0) : waterfallBaseIndex;
              let compIdx = waterfallCompareIndex === -1 ? displayPeriods.length - 1 : waterfallCompareIndex;
              
              const wfBase = displayPeriods[baseIdx] || displayPeriods[0];
              const wfComp = displayPeriods[compIdx] || displayPeriods[displayPeriods.length - 1];

              const baseTotal = getMetricValue(dataModel.tree, wfBase);
              const compTotal = getMetricValue(dataModel.tree, wfComp);

              let deltas = [];
              Object.values(dataModel.tree.children).forEach(child => {
                  const diff = getMetricValue(child, wfComp) - getMetricValue(child, wfBase);
                  if (Math.abs(diff) > 0.01) deltas.push({ name: child.name, value: diff });
              });

              deltas.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));

              if (deltas.length > 7) {
                  const top = deltas.slice(0, 7);
                  const otherVal = deltas.slice(7).reduce((sum, d) => sum + d.value, 0);
                  if (Math.abs(otherVal) > 0.01) top.push({ name: 'Other Groupings', value: otherVal });
                  deltas = top;
              }

              const steps = [{ label: wfBase.label, value: baseTotal, isTotal: true, startY: 0, endY: baseTotal }];
              let runningTotal = baseTotal;
              deltas.forEach(d => {
                  steps.push({ label: d.name, value: d.value, isTotal: false, startY: runningTotal, endY: runningTotal + d.value });
                  runningTotal += d.value;
              });
              steps.push({ label: wfComp.label, value: compTotal, isTotal: true, startY: 0, endY: compTotal });
              return { steps, wfBase, wfComp };
          }, [displayPeriods, waterfallBaseIndex, waterfallCompareIndex, dataModel, getMetricValue]);

          const renderWaterfallSVG = () => {
              if (!waterfallData) {
                  return (
                      <div className="py-20 text-center text-gray-500">
                          <p className="text-lg font-semibold mb-2">Insufficient Data</p>
                          <p className="text-sm">The Waterfall chart requires at least two periods to compare.</p>
                      </div>
                  );
              }

              const { steps } = waterfallData;
              const maxVal = Math.max(...steps.map(d => Math.max(d.startY, d.endY)));
              const minVal = Math.min(0, ...steps.map(d => Math.min(d.startY, d.endY)));
              const padding = (maxVal - minVal) * 0.1 || 10;
              const yMax = maxVal + padding;
              const yMin = minVal - padding;
              const yRange = yMax - yMin;

              const width = 1000, chartHeight = 400, labelSpace = 120; 
              const getY = (val) => chartHeight - ((val - yMin) / yRange) * chartHeight;
              const barWidth = width / steps.length;
              const barPadding = barWidth * 0.15;

              return (
                  <div className="w-full overflow-x-auto pb-4">
                      <div className="min-w-[800px]">
                          <svg viewBox={`0 0 ${width} ${chartHeight + labelSpace}`} className="w-full h-auto text-xs font-sans select-none">
                              {[0, 0.25, 0.5, 0.75, 1].map(pct => {
                                  const val = yMin + (yRange * pct);
                                  const y = getY(val);
                                  return (
                                      <g key={`grid-${pct}`}>
                                          <line x1={0} y1={y} x2={width} y2={y} stroke="#e5e7eb" strokeDasharray="4 4" />
                                          <text x={0} y={y - 4} fill="#9ca3af" fontSize="10">{metric === 'amount' ? formatCurrency(val) : formatCount(val)}</text>
                                      </g>
                                  )
                              })}
                              {yMin < 0 && yMax > 0 && <line x1={0} y1={getY(0)} x2={width} y2={getY(0)} stroke="#6b7280" strokeWidth="1" />}
                              {steps.map((d, i) => {
                                  const x = i * barWidth + barPadding / 2;
                                  const w = barWidth - barPadding;
                                  const y = Math.min(getY(d.startY), getY(d.endY));
                                  const h = Math.max(2, Math.abs(getY(d.startY) - getY(d.endY)));
                                  let color = d.isTotal ? "#1e3a8a" : (d.value > 0 ? "#dc2626" : "#16a34a");
                                  const displayVal = metric === 'amount' ? formatCurrency(d.value) : formatCount(d.value);
                                  const labelStr = d.value > 0 && !d.isTotal ? '+' + displayVal : displayVal;
                                  const shortLabel = d.label.length > 25 ? d.label.substring(0, 23) + '...' : d.label;
                                  return (
                                      <g key={i} className="group cursor-default">
                                          <title>{d.label}&#10;{d.isTotal ? 'Balance' : 'Variance'}: {displayVal}</title>
                                          {i > 0 && <line x1={x - barPadding} y1={getY(steps[i-1].endY)} x2={x} y2={getY(steps[i-1].endY)} stroke="#9ca3af" strokeDasharray="3 3" strokeWidth="1" />}
                                          <rect x={x} y={y} width={w} height={h} fill={color} rx="2" className="transition-opacity group-hover:opacity-80" />
                                          <text x={x + w/2} y={d.value >= 0 ? y - 8 : y + h + 16} textAnchor="middle" fill={color} fontWeight="bold" fontSize="11">{labelStr}</text>
                                          <text x={x + w/2} y={chartHeight + 15} textAnchor="end" fill="#4b5563" fontSize="11" fontWeight={d.isTotal ? "bold" : "normal"} transform={`rotate(-35, ${x + w/2}, ${chartHeight + 15})`}>{shortLabel}</text>
                                      </g>
                                  )
                              })}
                          </svg>
                      </div>
                  </div>
              )
          };

          const exportToExcel = async () => {
            if (!dataModel) return;
            setIsProcessing(true);
            try {
              const XLSX = await loadExcelParser();
              const aoa = [];
              const headerRow = [HIERARCHY_PRESETS[hierarchyIndex].label];
              displayPeriods.forEach((period, idx) => {
                const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                if (viewMode === 'variance' && prevPeriod) {
                  headerRow.push(`${period.label} vs ${prevPeriod.label}`);
                } else if (viewMode !== 'variance') {
                  let suffix = '';
                  if (period.containsBaseMonth) suffix = ' (Base)';
                  else if (period.type === 'forecast') suffix = ' (FCST)';
                  else if (period.type === 'mixed') suffix = ' (Act+Fcst)';
                  headerRow.push(`${period.label}${suffix}`);
                }
              });
              headerRow.push("Total"); 
              aoa.push(headerRow);

              flatRows.forEach(node => {
                const indent = "   ".repeat(node.level);
                const row = [String(indent + node.name)]; 
                displayPeriods.forEach((period, idx) => {
                  const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                  if (viewMode === 'variance') {
                    if (!prevPeriod) row.push('-');
                    else row.push(getMetricValue(node, period) - getMetricValue(node, prevPeriod)); 
                  } else {
                    row.push(getMetricValue(node, period)); 
                  }
                });
                row.push(getRowTotal(node)); 
                aoa.push(row);
              });

              const ws = XLSX.utils.aoa_to_sheet(aoa);
              const wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, "Report View");
              XLSX.writeFile(wb, `UWI_Report_${timeGrouping}_${viewMode}.xlsx`);
            } catch (err) {
              console.error(err);
              alert("Failed to export to Excel.");
            }
            setIsProcessing(false);
          };

          const handleUnionUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return; 
              processFile(file, async (parsed) => {
                  const newRules = parsed.map(r => {
                      let group = '', pct = 0, sm = '2026-08';
                      for (const [k, v] of Object.entries(r)) {
                          const c = String(k).toLowerCase().trim();
                          if (c==='group' || c==='union group') group = String(v).trim();
                          if (c==='percentage' || c==='pct' || c==='%') pct = parseFloat(v);
                          if (c==='start month' || c==='month') {
                              const parsedDate = parseDateStrToMonthKey(v);
                              if (parsedDate) sm = parsedDate;
                          }
                      }
                      return { group, percentage: pct, startMonth: sm, id: Date.now() + Math.random() };
                  }).filter(r => r.group && !isNaN(r.percentage));

                  if (newRules.length === 0) return alert("Could not find valid columns.");
                  saveAssumptionsState({ ...assumptions, union: [...(assumptions.union||[]), ...newRules] });
                  if (unionInputRef.current) unionInputRef.current.value = null;
                  alert(`Added ${newRules.length} Union increases.`);
              });
          };

          const handleIncrementUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return; 
              processFile(file, async (parsed) => {
                  const newRules = parsed.map(r => {
                      let id = '', amt = 0, sm = incMonth;
                      for (const [k, v] of Object.entries(r)) {
                          const c = String(k).toLowerCase().trim();
                          if (c==='id' || c==='id number') id = String(v).trim();
                          if (c==='amount' || c==='value') amt = parseAmount(v);
                          if (c==='start month' || c==='month') {
                              const parsedDate = parseDateStrToMonthKey(v);
                              if (parsedDate) sm = parsedDate;
                          }
                      }
                      return { id, amount: amt, startMonth: sm, uid: Date.now() + Math.random() };
                  }).filter(r => r.id && r.amount !== 0);

                  if (newRules.length === 0) return alert("Could not find valid columns.");
                  saveAssumptionsState({ ...assumptions, increments: [...(assumptions.increments||[]), ...newRules] });
                  if (incInputRef.current) incInputRef.current.value = null;
                  alert(`Added ${newRules.length} flat increments.`);
              });
          };

          const handleNewHireUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return; 
              processFile(file, async (parsed) => {
                  const newRules = parsed.map(r => {
                      let id = `NH-${Math.floor(Math.random()*100000)}`, amt = 0, sm = nhMonth, name = 'New Hire', dept = 'TBD Dept', fac = 'TBD Faculty', pos = 'TBD Position', grp = '';
                      for (const [k, v] of Object.entries(r)) {
                          const c = String(k).toLowerCase().trim();
                          if (c==='id' || c==='employee id') id = String(v).trim() || id;
                          if (c==='amount' || c==='salary') amt = parseAmount(v);
                          if (c==='start month' || c==='month') {
                              const parsedDate = parseDateStrToMonthKey(v);
                              if (parsedDate) sm = parsedDate;
                          }
                          if (c==='name' || c==='employee name') name = String(v).trim();
                          if (c==='department' || c==='dept') dept = String(v).trim();
                          if (c==='faculty') fac = String(v).trim();
                          if (c==='position' || c==='title') pos = String(v).trim();
                          if (c==='group' || c==='union') grp = String(v).trim();
                      }
                      return { id, amount: amt, startMonth: sm, name, department: dept, faculty: fac, position: pos, group: grp, uid: Date.now() + Math.random() };
                  }).filter(r => r.amount !== 0);

                  if (newRules.length === 0) return alert("Could not find valid columns. Need 'Amount' and 'Start Month' (or select Start Month from dropdown).");
                  saveAssumptionsState({ ...assumptions, newHires: [...(assumptions.newHires||[]), ...newRules] });
                  if (newHireInputRef.current) newHireInputRef.current.value = null;
                  alert(`Added ${newRules.length} new hires.`);
              });
          };

          const handleOneOffUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return; 
              processFile(file, async (parsed) => {
                  const newRules = parsed.map(r => {
                      let id = '', amt = 0, m = '';
                      for (const [k, v] of Object.entries(r)) {
                          const c = String(k).toLowerCase().trim();
                          if (c==='id') id = String(v).trim();
                          if (c==='amount') amt = parseAmount(v);
                          if (c==='month') m = parseDateStrToMonthKey(v) || String(v).trim();
                      }
                      return { ID: id, Amount: amt, Month: m, uid: Date.now() + Math.random() };
                  }).filter(r => r.ID && r.Amount && r.Month);

                  if (newRules.length === 0) return alert("Could not find valid columns.");
                  saveAssumptionsState({ ...assumptions, oneOffs: [...(assumptions.oneOffs||[]), ...newRules] });
                  if (oneOffInputRef.current) oneOffInputRef.current.value = null;
                  alert(`Added ${newRules.length} one-off payments.`);
              });
          };

          const handleMappingUpload = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              processFile(file, async (parsed) => {
                  const map = {};
                  parsed.forEach(r => {
                      let org = '', fac = '', dept = '';
                      for (const [k, v] of Object.entries(r)) {
                          const c = String(k).toLowerCase().trim();
                          if (c === 'org' || c === 'org.' || c === 'org. #') org = String(v).trim();
                          if (c === 'faculty') fac = String(v).trim();
                          if (c === 'department') dept = String(v).trim();
                      }
                      if (org) map[org] = { faculty: fac, dept: dept };
                  });
                  setMappingData(map);
                  await saveMappingToDB(parsed);
                  alert("Organizational Mapping successfully updated!");
                  if (mappingInputRef.current) mappingInputRef.current.value = null;
              });
          };

          if (!dataModel) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 font-sans">
                <div className="max-w-xl w-full bg-white rounded-xl shadow-lg p-10 text-center relative border border-gray-200">
                  {isProcessing ? (
                     <div className="py-12">
                       <svg className="animate-spin h-12 w-12 text-blue-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                       <h2 className="text-xl font-semibold text-gray-700">Loading Data Engine...</h2>
                     </div>
                  ) : (
                    <>
                      <img src={logoSrc} alt="UWI Logo" className="h-20 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display='none'} />
                      <h1 className="text-3xl font-bold text-blue-900 mb-2">UWI Payroll Analytics</h1>
                      <p className="text-gray-500 mb-8">Upload your raw transactional data (.csv, .xlsx, or .zip) to initialize the dashboard.</p>
                      <label className="block w-full border-2 border-dashed border-gray-300 rounded-xl p-10 cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-colors">
                        <UploadIcon />
                        <span className="text-blue-600 font-medium text-lg">Click to select Raw Data File</span>
                        <input type="file" accept=".csv, .xlsx, .xls, .zip" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />
                      </label>
                    </>
                  )}
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen p-4 md:p-8 font-sans text-sm flex flex-col">
              
              <div className="bg-white rounded-t-xl shadow-sm border-b border-gray-200 p-6 flex flex-col xl:flex-row xl:items-end justify-between gap-6 relative">
                <div className="absolute top-4 right-6 flex items-center gap-4">
                  <button onClick={() => setActiveTab('admin')} className="text-xs text-indigo-600 hover:text-indigo-800 font-bold flex items-center bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-200 shadow-sm hover:bg-indigo-100 transition-colors">
                    <SettingsIcon /> Settings & Rules
                  </button>
                  <button onClick={handleClearData} className="text-xs text-red-600 hover:text-red-800 hover:underline font-medium">Clear DB</button>
                </div>

                <div className="flex items-center gap-4 mt-6 xl:mt-0">
                  <img src={logoSrc} alt="UWI Logo" className="h-16 w-auto object-contain hidden sm:block" onError={(e) => e.target.style.display='none'} />
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-3">UWI Cost & Headcount Report</h1>
                    <p className="text-gray-500 mt-1 flex items-center">
                      {`Actuals through ${formatMonthLabel(dataModel.baseMonth)}`} {scenarioFilters.forecasts && '• Projected through Jul-27'}
                      {((assumptions.union?.length||0) + (assumptions.increments?.length||0) + (assumptions.oneOffs?.length||0) + (assumptions.newHires?.length||0) > 0 || assumptions.startMonthFilter) && (
                         <span className="ml-3 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-indigo-100 text-indigo-800">Custom Rules Active</span>
                      )}
                    </p>
                  </div>
                </div>

                {activeTab !== 'admin' && (
                <div className="flex flex-wrap items-center gap-4 mt-2 xl:mt-0">
                  <label className="bg-blue-50 border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-md font-medium text-xs shadow-sm cursor-pointer transition-colors flex items-center gap-1">
                     <ExcelIcon /> Append Raw Data
                     <input type="file" accept=".csv, .xlsx, .xls, .zip" className="hidden" onChange={handleFileUpload} />
                  </label>

                  <div className="flex items-center bg-gray-50 border border-gray-200 p-1 rounded-lg">
                      <span className="text-[10px] font-bold text-gray-400 ml-2 mr-2 uppercase tracking-wider">Include:</span>
                      <FilterCheckbox label="Base" checked={scenarioFilters.base} onChange={() => setScenarioFilters(p => ({...p, base: !p.base}))} />
                      <FilterCheckbox label="Union" checked={scenarioFilters.union} onChange={() => setScenarioFilters(p => ({...p, union: !p.union}))} />
                      <FilterCheckbox label="Incr." checked={scenarioFilters.increments} onChange={() => setScenarioFilters(p => ({...p, increments: !p.increments}))} />
                      <FilterCheckbox label="Hires" checked={scenarioFilters.newHires} onChange={() => setScenarioFilters(p => ({...p, newHires: !p.newHires}))} />
                      <FilterCheckbox label="One-Offs" checked={scenarioFilters.oneOffs} onChange={() => setScenarioFilters(p => ({...p, oneOffs: !p.oneOffs}))} />
                      <div className="w-px h-4 bg-gray-300 mx-1"></div>
                      <FilterCheckbox label="Future Projections" checked={scenarioFilters.forecasts} onChange={() => setScenarioFilters(p => ({...p, forecasts: !p.forecasts}))} isIndigo={true} />
                  </div>

                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 p-1 rounded-lg">
                     <div className="relative">
                        <select className="appearance-none bg-white border border-gray-300 py-1.5 pl-3 pr-8 rounded text-xs font-medium focus:border-blue-500" value={hierarchyIndex} onChange={(e) => setHierarchyIndex(parseInt(e.target.value, 10))} disabled={isProcessing}>
                          {HIERARCHY_PRESETS.map((p, i) => <option key={i} value={i}>Hierarchy: {p.label}</option>)}
                        </select>
                        <ChevronDown className="absolute right-2 top-2 text-gray-400" />
                     </div>
                     <div className="relative">
                        <select className="appearance-none bg-white border border-gray-300 py-1.5 pl-3 pr-8 rounded text-xs font-medium focus:border-blue-500" value={timeGrouping} onChange={(e) => setTimeGrouping(e.target.value)} disabled={isProcessing}>
                          <option value="month">Group: Monthly</option>
                          <option value="quarter">Group: Quarterly (FY)</option>
                          <option value="annual">Group: Annually (FY)</option>
                          <option value="ytd">Group: YTD</option>
                        </select>
                        <ChevronDown className="absolute right-2 top-2 text-gray-400" />
                     </div>
                  </div>
                  <div className="bg-gray-100 p-1 rounded-lg inline-flex">

                                    <h2 className="text-2xl font-bold mb-2">Organizational Mapping</h2>
                                    <p className="text-gray-600 mb-8">Upload an Excel/CSV file to map Org numbers to distinct Faculties and Departments. Your file should have columns for <b>Org</b>, <b>Faculty</b>, and <b>Department</b>.</p>
                                    
                                    <div className="bg-gray-50 border border-gray-200 rounded-xl p-6">
                                        <label className="block w-full border-2 border-dashed border-indigo-300 rounded-xl p-8 text-center cursor-pointer hover:bg-indigo-50 transition-colors bg-white">
                                            <UploadIcon />
                                            <span className="text-indigo-600 font-medium text-sm">Select Mapping File</span>
                                            <input type="file" accept=".csv, .xlsx, .xls" className="hidden" onChange={handleMappingUpload} ref={mappingInputRef} />
                                        </label>
                                        <button onClick={()=>downloadTemplate('mapping')} className="mt-4 text-sm text-indigo-600 font-semibold flex items-center hover:underline"><DownloadIcon /> Download Template</button>
                                    </div>
                                </div>
                            )}

                            {activeAdminTab === 'active' && (
                                <div className="max-w-3xl">
                                    <h2 className="text-2xl font-bold mb-6">Manage Active Rules</h2>
                                    
                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2">Union Increases</h3>
                                    {(!assumptions.union || assumptions.union.length === 0) ? <p className="text-gray-400 italic text-sm mb-8">None active</p> : (
                                        <ul className="mb-8 space-y-2">
                                            {assumptions.union.map(u => (
                                                <li key={u.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-200 text-sm">
                                                    <span><b>{u.group}</b> gets <b>+{u.percentage}%</b> starting <b>{formatMonthLabel(u.startMonth)}</b></span>
                                                    <button onClick={() => saveAssumptionsState({...assumptions, union: assumptions.union.filter(x=>x.id!==u.id)})} className="text-red-500 hover:text-red-700 p-1"><TrashIcon/></button>
                                                </li>
                                            ))}
                                        </ul>
                                    )}

                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2">Flat Increments</h3>
                                    {(!assumptions.increments || assumptions.increments.length === 0) ? <p className="text-gray-400 italic text-sm mb-8">None active</p> : (
                                        <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-lg border border-indigo-200 mb-8 text-sm">
                                            <span><b>{assumptions.increments.length}</b> employee flat increments active.</span>
                                            <button onClick={() => { if(window.confirm('Delete ALL flat increments?')) saveAssumptionsState({...assumptions, increments: []}) }} className="bg-red-100 text-red-700 px-3 py-1.5 rounded font-bold hover:bg-red-200 transition-colors">Clear All Increments</button>
                                        </div>
                                    )}
                                    
                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2">New Hires</h3>
                                    {(!assumptions.newHires || assumptions.newHires.length === 0) ? <p className="text-gray-400 italic text-sm mb-8">None active</p> : (
                                        <div className="flex justify-between items-center bg-emerald-50 p-4 rounded-lg border border-emerald-200 mb-8 text-sm">
                                            <span><b>{assumptions.newHires.length}</b> new hire projections active.</span>
                                            <button onClick={() => { if(window.confirm('Delete ALL new hires?')) saveAssumptionsState({...assumptions, newHires: []}) }} className="bg-red-100 text-red-700 px-3 py-1.5 rounded font-bold hover:bg-red-200 transition-colors">Clear All New Hires</button>
                                        </div>
                                    )}

                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2">One-Off Payments</h3>
                                    {(!assumptions.oneOffs || assumptions.oneOffs.length === 0) ? <p className="text-gray-400 italic text-sm mb-8">None active</p> : (
                                        <div className="flex justify-between items-center bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm">
                                            <span><b>{assumptions.oneOffs.length}</b> one-off adjustments active.</span>
                                            <button onClick={() => { if(window.confirm('Delete ALL one-offs?')) saveAssumptionsState({...assumptions, oneOffs: []}) }} className="bg-red-100 text-red-700 px-3 py-1.5 rounded font-bold hover:bg-red-200 transition-colors">Clear All One-Offs</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeAdminTab === 'filters' && (
                                <div className="max-w-2xl">
                                    <h2 className="text-2xl font-bold mb-2">Data Filters</h2>
                                    <p className="text-gray-600 mb-8">Crop out unwanted historical data to ensure accurate baselines.</p>
                                    
                                    <div className="bg-gray-50 border border-gray-200 rounded-xl p-6">
                                      <label className="block text-sm font-bold text-gray-700 mb-2">Start Dashboard From:</label>
                                      <select value={assumptions.startMonthFilter || ''} onChange={e => saveAssumptionsState({...assumptions, startMonthFilter: e.target.value})} className="w-full border border-gray-300 rounded-lg p-3 text-sm bg-white mb-4 shadow-sm">
                                          <option value="">-- Show All Uploaded Data --</option>
                                          {rawMonthsList.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
                                      </select>
                                      <div className="bg-blue-50 p-4 rounded border border-blue-100 text-sm text-blue-800">
                                          <p><b>Pro Tip:</b> If your Excel file contains late adjustments from previous months (like retro-pay recorded on July 31st), setting this to <b>August 2025</b> will force the dashboard to completely ignore those July rows and treat August as the true baseline.</p>
                                          <p className="mt-2"><b>Seeing a month you didn't expect?</b> Go to the main <b>Report Builder View</b> tab and change the Hierarchy to <b>"🔍 AUDIT: Month &gt; ID &gt; Name"</b>. This lets you expand the rogue month and see exactly which employees/rows are causing it!</p>
                                      </div>
                                    </div>
                                </div>
                            )}

                            {activeAdminTab === 'glossary' && (
                                <div className="max-w-3xl">
                                    <h2 className="text-2xl font-bold mb-6">Glossary & Definitions</h2>
                                    <div className="space-y-6">
                                        <div><h4 className="font-bold text-gray-800 text-lg">Base Month</h4><p className="text-gray-600 text-sm mt-1">The most recent month of actual data provided in your raw CSV/Excel upload. All forecasts are built by carrying this month forward.</p></div>
                                        <div><h4 className="font-bold text-gray-800 text-lg">Headcount (Unique IDs)</h4><p className="text-gray-600 text-sm mt-1">The system counts the unique Employee IDs within a timeframe. If an employee is split across two accounts, they only count as <b>1</b> Headcount. In YTD views, an employee who existed in Jan and Feb is still only counted as <b>1</b> for the YTD Total.</p></div>
                                        <div><h4 className="font-bold text-gray-800 text-lg">Financial Year (FY)</h4><p className="text-gray-600 text-sm mt-1">The UWI Financial Year runs from <b>August 1st</b> through <b>July 31st</b>. YTD and Annual groupings automatically conform to this schedule.</p></div>
                                        <div><h4 className="font-bold text-gray-800 text-lg">Variance</h4><p className="text-gray-600 text-sm mt-1">Calculated as `Current Period - Previous Period`. A positive variance (Red) indicates higher costs or more employees. A negative variance (Green) indicates lower costs or fewer employees.</p></div>
                                        <div><h4 className="font-bold text-gray-800 text-lg">Flat Increment vs One-Off</h4><p className="text-gray-600 text-sm mt-1">A Flat Increment adds a specific dollar amount to an employee's pay from the chosen start month <b>onwards forever</b>. A One-Off payment adds a dollar amount to <b>only that specific month</b>.</p></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
