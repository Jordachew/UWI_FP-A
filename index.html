                        {dashboardStats.hasPrev ? (
                          <>
                            {dashboardStats.hcVar > 0 ? <span className="text-red-600"><TrendingUp /></span> : dashboardStats.hcVar < 0 ? <span className="text-green-600"><TrendingDown /></span> : null}
                            <p className={`text-lg font-bold truncate ${dashboardStats.hcVar > 0 ? 'text-red-700' : dashboardStats.hcVar < 0 ? 'text-green-700' : 'text-gray-700'}`}>
                              {dashboardStats.hcVar > 0 ? '+' : ''}{formatCount(dashboardStats.hcVar)}
                            </p>
                          </>
                        ) : <p className="text-lg font-bold text-gray-400">-</p>}
                      </div>
                    </div>
                    {/* YTD Headcount Card */}
                    <div className="bg-violet-50/50 border border-violet-200 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-violet-700 mb-1 truncate">YTD Unique HC</p>
                      <p className="text-xl font-bold text-gray-900 truncate">{formatCount(dashboardStats.ytdHc)} <span className="text-[10px] font-normal text-gray-500 uppercase tracking-wide ml-0.5">IDs</span></p>
                    </div>
                  </div>
                </div>
              )}

              {/* --- Tabs Navigation --- */}
              <div className="bg-white border-x border-b border-gray-200 px-6 pt-4 flex gap-6 border-t-4 border-t-gray-50">
                  <button 
                      onClick={() => setActiveTab('table')}
                      className={`pb-3 font-semibold text-sm transition-colors border-b-2 ${activeTab === 'table' ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                  >
                      <TableIcon /> Report Builder View
                  </button>
                  <button 
                      onClick={() => setActiveTab('waterfall')}
                      className={`pb-3 font-semibold text-sm transition-colors border-b-2 ${activeTab === 'waterfall' ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                  >
                      <ChartIcon /> Movement Waterfall Chart
                  </button>
              </div>

              {/* --- Main Content Area --- */}
              <div className="bg-white shadow-sm rounded-b-xl flex-grow overflow-hidden flex flex-col border-x border-b border-gray-200 relative">
                {isProcessing && (
                  <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-20 flex items-center justify-center">
                    <div className="text-blue-600 font-semibold text-lg animate-pulse flex items-center bg-white px-6 py-3 rounded-full shadow-lg border border-blue-100">
                      <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                      Updating Engine...
                    </div>
                  </div>
                )}

                {/* --- TABLE TAB --- */}
                {activeTab === 'table' && (
                    <div className="overflow-x-auto overflow-y-auto max-h-[60vh]">
                      {dataModel && (
                        <table className="w-full text-left border-collapse">
                          <thead className="bg-gray-100 sticky top-0 z-10 shadow-sm">
                            <tr>
                              <th className="px-4 py-3 font-semibold text-gray-700 border-b border-gray-200 min-w-[350px]">
                                {HIERARCHY_PRESETS[hierarchyIndex].label}
                              </th>
                              
                              {displayPeriods.map((period, idx) => {
                                const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                                const isFcst = period.type === 'forecast';
                                const isMixed = period.type === 'mixed';
                                const headerStyle = isFcst ? 'bg-indigo-50/80 text-indigo-900' : isMixed ? 'bg-blue-50/50 text-blue-900' : 'text-gray-700';

                                return (
                                  <th key={period.key} className={`px-3 py-3 font-semibold text-right border-b border-gray-200 whitespace-nowrap ${headerStyle}`}>
                                    {viewMode === 'variance' && prevPeriod ? (
                                      <span className="text-xs">{period.label} vs<br/>{prevPeriod.label}</span>
                                    ) : (
                                      <>
                                        {period.label}
                                        {period.containsBaseMonth && <span className="ml-1 text-[10px] uppercase tracking-wider text-blue-600" title="Contains Base Month">(Base)</span>}
                                        {isFcst && <span className="ml-1 text-[10px] uppercase opacity-70">(FCST)</span>}
                                        {isMixed && <span className="ml-1 text-[10px] uppercase opacity-70">(Act+Fcst)</span>}
                                      </>
                                    )}
                                  </th>
                                );
                              })}
                              
                              <th className="px-4 py-3 font-bold text-right border-b border-l-2 border-gray-300 whitespace-nowrap bg-gray-200 text-gray-900 shadow-sm">
                                Total
                              </th>
                            </tr>
                          </thead>
                          
                          <tbody className="divide-y divide-gray-100">
                            {flatRows.map((node) => {
                              const isExpanded = expandedRows.has(node.id);
                              const hasChildren = node.children && Object.keys(node.children).length > 0;
                              
                              let rowStyle = "hover:bg-gray-50 transition-colors group";
                              let indentPx = node.level * 24 + 16; 
                              let fontStyle = "text-gray-700";
                              
                              if (node.level === 0) {
                                rowStyle = "bg-gray-50 hover:bg-gray-100 border-t-2 border-gray-300";
                                fontStyle = "font-bold text-gray-900";
                              } else if (node.level === 1) {
                                fontStyle = "font-semibold text-gray-800";
                              } else if (!hasChildren) {
                                fontStyle = "text-gray-500 text-xs";
                              }

                              const rowTotal = getRowTotal(node);
                              let totalColorClass = "text-gray-900";
                              if (viewMode === 'variance') {
                                 if (rowTotal > 0) totalColorClass = "text-red-700";
                                 if (rowTotal < 0) totalColorClass = "text-green-700";
                              }

                              return (
                                <tr key={node.id} className={rowStyle}>
                                  <td className={`py-2 border-r border-gray-100 whitespace-nowrap ${fontStyle}`} style={{ paddingLeft: `${indentPx}px`, paddingRight: '16px' }}>
                                    <div className="flex items-center">
                                      {hasChildren ? (
                                        <button 
                                          onClick={() => toggleRow(node.id)} 
                                          className="mr-2 text-gray-400 hover:text-blue-600 focus:outline-none p-1 rounded hover:bg-blue-50 transition-colors"
                                        >
                                          {isExpanded ? <ChevronDown /> : <ChevronRight />}
                                        </button>
                                      ) : (
                                        <span className="w-7 mr-2 inline-block"></span>
                                      )}
                                      <span className="truncate max-w-md" title={node.name}>{node.name}</span>
                                    </div>
                                  </td>

                                  {displayPeriods.map((period, idx) => {
                                    const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                                    return renderValueCell(node, period, prevPeriod);
                                  })}
                                  
                                  <td className={`px-4 py-2 text-right font-bold border-l-2 border-gray-200 bg-gray-50/50 ${totalColorClass}`}>
                                    {viewMode === 'variance' && rowTotal > 0 ? '+' : ''}
                                    {metric === 'amount' ? formatCurrency(rowTotal) : formatCount(rowTotal)}
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      )}
                    </div>
                )}
                
                {/* --- WATERFALL TAB --- */}
                {activeTab === 'waterfall' && (
                    <div className="p-8 h-full bg-gray-50/50">
                        {displayPeriods.length < 2 ? (
                            <div className="py-20 text-center text-gray-500 bg-white rounded-xl shadow-sm border border-gray-200">
                                <ChartIcon />
                                <p className="text-xl font-bold mt-4 mb-2 text-gray-800">Insufficient Data for Waterfall</p>
                                <p className="text-sm max-w-md mx-auto">The Waterfall Chart requires at least two periods to compare movement. Ensure your filters provide multiple periods.</p>
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800">Movement Variance Analysis</h3>
                                        <p className="text-sm text-gray-500">Grouped by: {HIERARCHY_PRESETS[hierarchyIndex].keys[0]}</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-gray-100 p-1 rounded-lg inline-flex mr-4">
                                          <button 
                                            onClick={() => setMetric('amount')}
                                            className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'amount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                                          >
                                            $ Amount
                                          </button>
                                          <button 
                                            onClick={() => setMetric('headcount')}
                                            className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'headcount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                                          >
                                            Headcount
                                          </button>
                                        </div>
                                        
                                        <div className="flex flex-col items-end gap-2">
                                            <div className="flex items-center gap-2">
                                                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider w-16 text-right">Base:</label>
                                                <div className="relative">
                                                    <select 
                                                        className="appearance-none bg-gray-50 border border-gray-300 text-gray-900 py-1.5 pl-3 pr-8 rounded-lg text-sm font-semibold shadow-sm outline-none focus:border-blue-500"
                                                        value={waterfallBaseIndex === -1 ? (displayPeriods.length >= 2 ? displayPeriods.length - 2 : 0) : waterfallBaseIndex}
                                                        onChange={(e) => setWaterfallBaseIndex(parseInt(e.target.value, 10))}
                                                    >
                                                        {displayPeriods.map((p, i) => (
                                                            <option key={`base-${i}`} value={i}>{p.label}</option>
                                                        ))}
                                                    </select>
                                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                                        <ChevronDown />
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider w-16 text-right">Target:</label>
                                                <div className="relative">
                                                    <select 
                                                        className="appearance-none bg-gray-50 border border-gray-300 text-gray-900 py-1.5 pl-3 pr-8 rounded-lg text-sm font-semibold shadow-sm outline-none focus:border-blue-500"
                                                        value={waterfallCompareIndex === -1 ? displayPeriods.length - 1 : waterfallCompareIndex}
                                                        onChange={(e) => setWaterfallCompareIndex(parseInt(e.target.value, 10))}
                                                    >
                                                        {displayPeriods.map((p, i) => (
                                                            <option key={`comp-${i}`} value={i}>{p.label}</option>
                                                        ))}
                                                    </select>
                                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                                        <ChevronDown />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                {renderWaterfallSVG()}
                            </div>
                        )}
                    </div>
                )}
              </div>
            </div>
          );
        }

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
