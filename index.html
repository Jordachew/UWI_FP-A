    <!-- Load Babel for JSX compiling in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        // --- SVGs ---

        const UploadIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mx-auto mb-4 text-blue-400">

        const ExcelIcon = () => (

        const TrendingUp = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1">

          </svg>
        );

        const TrendingDown = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
            <polyline points="17 18 23 18 23 12"></polyline>
          </svg>
        );

        // --- Browser IndexedDB Storage Engine ---
        const DB_NAME = 'UWIPayrollDB';
        const STORE_NAME = 'csvData';

        function saveToDB(storeKey, data) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              const tx = db.transaction(STORE_NAME, 'readwrite');
              tx.objectStore(STORE_NAME).put(data, storeKey);
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function loadFromDB(storeKey) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) return resolve(null);
              const tx = db.transaction(STORE_NAME, 'readonly');
              const store = tx.objectStore(STORE_NAME);
              const getReq = store.get(storeKey);
              getReq.onsuccess = () => resolve(getReq.result);
              getReq.onerror = () => reject(getReq.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function clearDB() {
          return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (db.objectStoreNames.contains(STORE_NAME)) {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).clear();
                tx.oncomplete = () => resolve();
              } else {
                resolve();
              }
            };
          });
        }

        // --- Data Parsers ---
        const loadExcelParser = async () => {
          if (window.XLSX) return window.XLSX;
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            script.onload = () => resolve(window.XLSX);
            script.onerror = () => {
              alert("Failed to load Excel parsing engine. Please check your internet connection or ad-blocker.");
              reject(new Error("CDN Load Failed"));
            };
            document.head.appendChild(script);
          });
        };

        // --- Formatting Helpers ---
        function parseDateStrToMonthKey(dateStr) {
          if (dateStr === null || dateStr === undefined || dateStr === '') return null;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-'))) {
            const serial = parseFloat(dateStr);
            const dateObj = new Date(Math.round((serial - 25569) * 86400 * 1000));
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
          }

          const str = String(dateStr).trim();
          
          if (str.includes('-')) {
            const parts = str.split('-');
            if (parts.length >= 2 && parts[0].length === 4) {
              return `${parts[0]}-${parts[1].padStart(2, '0')}`;
            }
          }

          if (str.includes('/')) {
            const parts = str.split('/');
            if (parts.length === 3) {
              let m = parts[1];
              let y = parts[2];
              if (parts[0].length === 4) {
                y = parts[0];
                m = parts[1];
              } else if (parts[2].length === 2) {
                y = `20${parts[2]}`;
              }
              return `${y}-${m.padStart(2, '0')}`;
            }
          }
          
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          
          const dateObj = new Date(yearNum, monthNum - 1, 1);
          return dateObj.toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        };

        const formatCount = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US').format(val);
        };

        function parseAmount(val) {
          if (val === null || val === undefined || val === '') return 0;
          if (typeof val === 'number') return val;
          
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          
          let num = parseFloat(strVal);
          if (isNaN(num)) return 0;
          return isNegative ? -num : num;
        }

        // Relative path for simple HTML hosting
        const getLogoSrc = () => './logo_uwi_lrg.jpg';

        // --- Configurations ---
        const HIERARCHY_PRESETS = [
          { label: 'Faculty/Dept > Account > Position > Employee', keys: ['Department name', 'Acct. Description', 'Posn Desc', 'Name'] },
          { label: 'Faculty/Dept > Position > Employee', keys: ['Department name', 'Posn Desc', 'Name'] },
          { label: 'Position > Faculty/Dept > Employee', keys: ['Posn Desc', 'Department name', 'Name'] },
          { label: 'Faculty / Department Only', keys: ['Department name'] },
          { label: 'Account Category > Faculty', keys: ['Acct. Description', 'Department name'] },
          { label: 'Position Only', keys: ['Posn Desc'] }
        ];

        function App() {
          const [rawData, setRawData] = useState(null);
          const [adjustmentsData, setAdjustmentsData] = useState(null);
          const [isProcessing, setIsProcessing] = useState(true); 
          
          const [dataModel, setDataModel] = useState(null);
          const [expandedRows, setExpandedRows] = useState(new Set(['root']));
          
          const [metric, setMetric] = useState('amount'); 
          const [viewMode, setViewMode] = useState('actuals'); 
          const [timeGrouping, setTimeGrouping] = useState('month');
          const [hierarchyIndex, setHierarchyIndex] = useState(0);
          
          // Dashboard State
          const [dashboardMonth, setDashboardMonth] = useState('');
          
          const fileInputRef = useRef(null);
          const adjInputRef = useRef(null);
          const logoSrc = useMemo(() => getLogoSrc(), []);

          useEffect(() => {
            Promise.all([loadFromDB('latestUpload'), loadFromDB('adjustments')])
              .then(([savedData, savedAdj]) => {
                if (savedAdj && savedAdj.length > 0) setAdjustmentsData(savedAdj);
                if (savedData && savedData.length > 0) {
                  setRawData(savedData);
                } else {
                  setIsProcessing(false);
                }
              })
              .catch(err => {
                console.error("Failed to load from DB", err);
                setIsProcessing(false);
              });
          }, []);

          const processFile = async (file, onComplete) => {
            setIsProcessing(true);
            try {
              const XLSX = await loadExcelParser();
              const reader = new FileReader();
              reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const parsed = XLSX.utils.sheet_to_json(worksheet, { raw: true, defval: "" }); 
                onComplete(parsed);
              };
              reader.readAsArrayBuffer(file);
            } catch (e) {
              alert("Error reading file. Please ensure the file is not password protected.");
              setIsProcessing(false);
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file, async (parsed) => {
              let finalData = parsed;
              if (rawData && rawData.length > 0) {
                  const doAppend = window.confirm(`Existing data found (${rawData.length} rows).\n\nClick [OK] to APPEND this new file's data to your existing history.\nClick [Cancel] to OVERWRITE everything with this new file.`);
                  if (doAppend) finalData = [...rawData, ...parsed];
              }
              await saveToDB('latestUpload', finalData).catch(console.error);
              setRawData(finalData);
              if (fileInputRef.current) fileInputRef.current.value = null;
            });
          };

          const handleAdjustmentsUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file, async (parsed) => {
              if (parsed.length > 0 && !parsed[0]['ID'] && !parsed[0]['Month'] && !parsed[0]['Amount']) {
                  alert("Invalid format. Ensure your file has columns named: ID, Month, Amount");
                  setIsProcessing(false);
                  if (adjInputRef.current) adjInputRef.current.value = null;
                  return;
              }

              let finalAdj = parsed;
              if (adjustmentsData && adjustmentsData.length > 0) {
                  const doAppend = window.confirm(`Existing Adjustments found.\n\nClick [OK] to APPEND these new adjustments.\nClick [Cancel] to OVERWRITE existing adjustments.`);
                  if (doAppend) finalAdj = [...adjustmentsData, ...parsed];
              }

              await saveToDB('adjustments', finalAdj).catch(console.error);
              setAdjustmentsData(finalAdj);
              if (adjInputRef.current) adjInputRef.current.value = null;
            });
          };

          const handleClearData = async () => {
            if (window.confirm("Are you sure you want to completely clear all saved raw data AND forecast adjustments?")) {
              setIsProcessing(true);
              await clearDB();
              setRawData(null);
              setAdjustmentsData(null);
              setDataModel(null);
              setDashboardMonth('');
              setIsProcessing(false);
            }
          };

          useEffect(() => {
            if (!rawData) return;
            
            setIsProcessing(true);
            
            setTimeout(() => {
              const presetKeys = HIERARCHY_PRESETS[hierarchyIndex].keys;
              const tree = { id: 'root', name: 'Total UWI Mona', level: 0, children: {}, amounts: {}, empIds: {} };
              const allMonthsSet = new Set();
              const knownEmpIds = new Set();

              rawData.forEach(row => {
                const dateStr = row['Pay Period End'];
                const monthKey = parseDateStrToMonthKey(dateStr);
                if (!monthKey) return; 
                
                allMonthsSet.add(monthKey);

                const empId = row['ID'] || 'Unknown ID';
                const amount = parseAmount(row['Amount']);
                
                knownEmpIds.add(String(empId).trim());

                const addStats = (node) => {
                  node.amounts[monthKey] = (node.amounts[monthKey] || 0) + amount;
                  if (!node.empIds[monthKey]) node.empIds[monthKey] = new Set();
                  node.empIds[monthKey].add(empId);
                };

                addStats(tree); 

                let currentNode = tree;
                let currentId = 'root';

                presetKeys.forEach((key, idx) => {
                  let val = row[key];
                  
                  // CRITICAL FIX: Safe Fallbacks for UWI Export formatting anomalies + Force String type to prevent .localeCompare crashes
                  if (!val && key === 'Department name') val = row['Department'] || row['Descr_1'];
                  if (!val && key === 'Acct. Description') val = row['Account'] || row['__EMPTY'] || row['Descr'];
                  if (!val && key === 'Posn Desc') val = row['Position'];
                  
                  // Force conversion to String to prevent React crashes when sorting number-only fields
                  val = String(val || `Unknown ${key}`).trim();
                  
                  currentId = `${currentId}|${val}`;
                  
                  if (!currentNode.children[val]) {
                    currentNode.children[val] = { 
                      id: currentId, 
                      name: val, 
                      level: idx + 1, 
                      children: {}, 
                      amounts: {}, 
                      empIds: {} 
                    };
                  }
                  
                  currentNode = currentNode.children[val];
                  addStats(currentNode);
                });
              });

              const actualMonths = Array.from(allMonthsSet).sort();
              if (actualMonths.length === 0) {
                alert("No valid dates found in the data. Please ensure your CSV has a column named 'Pay Period End' with valid dates.");
                setIsProcessing(false);
                return;
              }

              const baseMonth = actualMonths[actualMonths.length - 1];

              if (adjustmentsData) {
                adjustmentsData.forEach(adj => {
                  const adjId = String(adj['ID'] || adj['id']).trim();
                  
                  if (adjId && !knownEmpIds.has(adjId)) {
                    knownEmpIds.add(adjId); 
                    
                    const dept = String(adj['Department name'] || adj['Department'] || 'TBD / New Hires').trim();
                    const acct = String(adj['Acct. Description'] || adj['Account'] || 'TBD / New Hires').trim();
                    const posn = String(adj['Posn Desc'] || adj['Position'] || 'TBD Position').trim();
                    const empName = String(adj['Name'] || adj['name'] || `New Hire (${adjId})`).trim();

                    const virtualRow = {
                      'Department name': dept,
                      'Acct. Description': acct,
                      'Posn Desc': posn,
                      'Name': empName,
                      'ID': adjId
                    };

                    const addDummyStats = (node) => {
                      node.amounts[baseMonth] = (node.amounts[baseMonth] || 0) + 0; 
                      if (!node.empIds[baseMonth]) node.empIds[baseMonth] = new Set();
                      node.empIds[baseMonth].add(adjId);
                    };

                    addDummyStats(tree);

                    let currentNode = tree;
                    let currentId = 'root';

                    presetKeys.forEach((key, idx) => {
                      const val = String(virtualRow[key] || `Unknown ${key}`).trim();
                      currentId = `${currentId}|${val}`;
                      if (!currentNode.children[val]) {
                        currentNode.children[val] = { id: currentId, name: val, level: idx + 1, children: {}, amounts: {}, empIds: {} };
                      }
                      currentNode = currentNode.children[val];
                      addDummyStats(currentNode);
                    });
                  }
                });
              }

              const forecastMonths = [];
              const [baseY, baseM] = baseMonth.split('-');
              let currentForecast = new Date(parseInt(baseY, 10), parseInt(baseM, 10), 1);
              const endForecast = new Date(2027, 6, 1); 

              while (currentForecast <= endForecast) {
                const y = currentForecast.getFullYear();
                const m = String(currentForecast.getMonth() + 1).padStart(2, '0');
                forecastMonths.push(`${y}-${m}`);
                currentForecast.setMonth(currentForecast.getMonth() + 1);
              }

              const empLeafCount = {};
              const countLeaves = (node) => {
                  if (!node.children || Object.keys(node.children).length === 0) {
                      if (node.empIds[baseMonth]) {
                          node.empIds[baseMonth].forEach(id => {
                              empLeafCount[id] = (empLeafCount[id] || 0) + 1;
                          });
                      }
                  } else {
                      Object.values(node.children).forEach(countLeaves);
                  }
              };
              countLeaves(tree);

              const applyForecasts = (node) => {
                  const baseAmount = node.amounts[baseMonth] || 0;
                  const baseEmpSet = node.empIds[baseMonth] || new Set();
                  const hasChildren = node.children && Object.keys(node.children).length > 0;

                  if (hasChildren) {
                      Object.values(node.children).forEach(applyForecasts);

                      forecastMonths.forEach(fm => {
                          let sumAmount = 0;
                          let sumIds = new Set();
                          Object.values(node.children).forEach(child => {
                              sumAmount += child.amounts[fm];
                              if (child.empIds[fm]) {
                                  child.empIds[fm].forEach(id => sumIds.add(id));
                              }
                          });
                          node.amounts[fm] = sumAmount;
                          node.empIds[fm] = sumIds;
                      });
                  } else {
                      forecastMonths.forEach(fm => {
                          let adjAmount = 0;
                          if (adjustmentsData) {
                              adjustmentsData.forEach(adj => {
                                  let m = adj['Month'] || adj['month'];
                                  m = parseDateStrToMonthKey(m) || m; 
                                  
                                  const id = String(adj['ID'] || adj['id']).trim();
                                  const amt = parseAmount(adj['Amount'] || adj['amount']);

                                  if (m === fm && baseEmpSet.has(id)) {
                                      const splits = empLeafCount[id] || 1;
                                      adjAmount += (amt / splits);
                                  }
                              });
                          }
                          node.amounts[fm] = baseAmount + adjAmount;
                          node.empIds[fm] = new Set(baseEmpSet);
                      });
                  }
              };
              
              applyForecasts(tree);

              setDataModel({ tree, actualMonths, forecastMonths, baseMonth });
              if (!dashboardMonth) setDashboardMonth(baseMonth);
              setExpandedRows
