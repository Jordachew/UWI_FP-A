<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWI Payroll Analytics</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for JSX compiling in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        // --- SVGs ---
        const ChevronRight = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1 inline">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        );

        const ChevronDown = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1 inline">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        );

        const UploadIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mx-auto mb-4 text-blue-400">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        );

        const ExcelIcon = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1 inline">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="8" y1="13" x2="16" y2="13"></line>
            <line x1="8" y1="17" x2="16" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        );
        
        const TrendingUp = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
            <polyline points="17 6 23 6 23 12"></polyline>
          </svg>
        );

        const TrendingDown = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
            <polyline points="17 18 23 18 23 12"></polyline>
          </svg>
        );

        // --- Browser IndexedDB Storage Engine ---
        const DB_NAME = 'UWIPayrollDB';
        const STORE_NAME = 'csvData';

        function saveToDB(storeKey, data) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              const tx = db.transaction(STORE_NAME, 'readwrite');
              tx.objectStore(STORE_NAME).put(data, storeKey);
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function loadFromDB(storeKey) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) return resolve(null);
              const tx = db.transaction(STORE_NAME, 'readonly');
              const store = tx.objectStore(STORE_NAME);
              const getReq = store.get(storeKey);
              getReq.onsuccess = () => resolve(getReq.result);
              getReq.onerror = () => reject(getReq.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function clearDB() {
          return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (db.objectStoreNames.contains(STORE_NAME)) {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).clear();
                tx.oncomplete = () => resolve();
              } else {
                resolve();
              }
            };
          });
        }

        // --- Data Parsers ---
        const loadExcelParser = async () => {
          if (window.XLSX) return window.XLSX;
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            script.onload = () => resolve(window.XLSX);
            script.onerror = () => {
              alert("Failed to load Excel parsing engine. Please check your internet connection or ad-blocker.");
              reject(new Error("CDN Load Failed"));
            };
            document.head.appendChild(script);
          });
        };

        // --- Formatting Helpers ---
        function parseDateStrToMonthKey(dateStr) {
          if (dateStr === null || dateStr === undefined || dateStr === '') return null;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-'))) {
            const serial = parseFloat(dateStr);
            const dateObj = new Date(Math.round((serial - 25569) * 86400 * 1000));
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
          }

          const str = String(dateStr).trim();
          
          if (str.includes('-')) {
            const parts = str.split('-');
            if (parts.length >= 2 && parts[0].length === 4) {
              return `${parts[0]}-${parts[1].padStart(2, '0')}`;
            }
          }

          if (str.includes('/')) {
            const parts = str.split('/');
            if (parts.length === 3) {
              let m = parts[1];
              let y = parts[2];
              if (parts[0].length === 4) {
                y = parts[0];
                m = parts[1];
              } else if (parts[2].length === 2) {
                y = `20${parts[2]}`;
              }
              return `${y}-${m.padStart(2, '0')}`;
            }
          }
          
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          
          const dateObj = new Date(yearNum, monthNum - 1, 1);
          return dateObj.toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        };

        const formatCount = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US').format(val);
        };

        function parseAmount(val) {
          if (val === null || val === undefined || val === '') return 0;
          if (typeof val === 'number') return val;
          
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          
          let num = parseFloat(strVal);
          if (isNaN(num)) return 0;
          return isNegative ? -num : num;
        }

        // Relative path for simple HTML hosting
        const getLogoSrc = () => './logo_uwi_lrg.jpg';

        // --- Configurations ---
        const HIERARCHY_PRESETS = [
          { label: 'Faculty/Dept > Account > Position > Employee', keys: ['Department name', 'Acct. Description', 'Posn Desc', 'Name'] },
          { label: 'Faculty/Dept > Position > Employee', keys: ['Department name', 'Posn Desc', 'Name'] },
          { label: 'Position > Faculty/Dept > Employee', keys: ['Posn Desc', 'Department name', 'Name'] },
          { label: 'Faculty / Department Only', keys: ['Department name'] },
          { label: 'Account Category > Faculty', keys: ['Acct. Description', 'Department name'] },
          { label: 'Position Only', keys: ['Posn Desc'] },
          { label: 'Group Only', keys: ['Group'] },
          { label: 'Sal Plan Only', keys: ['Sal Plan'] }
        ];

        function App() {
          const [rawData, setRawData] = useState(null);
          const [adjustmentsData, setAdjustmentsData] = useState(null);
          const [isProcessing, setIsProcessing] = useState(true); 
          
          const [dataModel, setDataModel] = useState(null);
          const [expandedRows, setExpandedRows] = useState(new Set(['root']));
          
          const [metric, setMetric] = useState('amount'); 
          const [viewMode, setViewMode] = useState('actuals'); 
          const [timeGrouping, setTimeGrouping] = useState('month');
          const [hierarchyIndex, setHierarchyIndex] = useState(0);
          
          // Dashboard State
          const [dashboardMonth, setDashboardMonth] = useState('');
          
          const fileInputRef = useRef(null);
          const adjInputRef = useRef(null);
          const logoSrc = useMemo(() => getLogoSrc(), []);

          useEffect(() => {
            Promise.all([loadFromDB('latestUpload'), loadFromDB('adjustments')])
              .then(([savedData, savedAdj]) => {
                if (savedAdj && savedAdj.length > 0) setAdjustmentsData(savedAdj);
                if (savedData && savedData.length > 0) {
                  setRawData(savedData);
                } else {
                  setIsProcessing(false);
                }
              })
              .catch(err => {
                console.error("Failed to load from DB", err);
                setIsProcessing(false);
              });
          }, []);

          const processFile = async (file, onComplete) => {
            setIsProcessing(true);
            try {
              const XLSX = await loadExcelParser();
              const reader = new FileReader();
              reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const parsed = XLSX.utils.sheet_to_json(worksheet, { raw: true, defval: "" }); 
                onComplete(parsed);
              };
              reader.readAsArrayBuffer(file);
            } catch (e) {
              alert("Error reading file. Please ensure the file is not password protected.");
              setIsProcessing(false);
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file, async (parsed) => {
              let finalData = parsed;
              if (rawData && rawData.length > 0) {
                  const doAppend = window.confirm(`Existing data found (${rawData.length} rows).\n\nClick [OK] to APPEND this new file's data to your existing history.\nClick [Cancel] to OVERWRITE everything with this new file.`);
                  if (doAppend) finalData = [...rawData, ...parsed];
              }
              await saveToDB('latestUpload', finalData).catch(console.error);
              setRawData(finalData);
              if (fileInputRef.current) fileInputRef.current.value = null;
            });
          };

          const handleAdjustmentsUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file, async (parsed) => {
              if (parsed.length > 0 && !parsed[0]['ID'] && !parsed[0]['Month'] && !parsed[0]['Amount']) {
                  alert("Invalid format. Ensure your file has columns named: ID, Month, Amount");
                  setIsProcessing(false);
                  if (adjInputRef.current) adjInputRef.current.value = null;
                  return;
              }

              let finalAdj = parsed;
              if (adjustmentsData && adjustmentsData.length > 0) {
                  const doAppend = window.confirm(`Existing Adjustments found.\n\nClick [OK] to APPEND these new adjustments.\nClick [Cancel] to OVERWRITE existing adjustments.`);
                  if (doAppend) finalAdj = [...adjustmentsData, ...parsed];
              }

              await saveToDB('adjustments', finalAdj).catch(console.error);
              setAdjustmentsData(finalAdj);
              if (adjInputRef.current) adjInputRef.current.value = null;
            });
          };

          const handleClearData = async () => {
            if (window.confirm("Are you sure you want to completely clear all saved raw data AND forecast adjustments?")) {
              setIsProcessing(true);
              await clearDB();
              setRawData(null);
              setAdjustmentsData(null);
              setDataModel(null);
              setDashboardMonth('');
              setIsProcessing(false);
            }
          };

          useEffect(() => {
            if (!rawData) return;
            
            setIsProcessing(true);
            
            setTimeout(() => {
              const presetKeys = HIERARCHY_PRESETS[hierarchyIndex].keys;
              const tree = { id: 'root', name: 'Total UWI Mona', level: 0, children: {}, amounts: {}, empIds: {} };
              const allMonthsSet = new Set();
              const knownEmpIds = new Set();

              rawData.forEach(row => {
                const dateStr = row['Pay Period End'];
                const monthKey = parseDateStrToMonthKey(dateStr);
                if (!monthKey) return; 
                
                allMonthsSet.add(monthKey);

                const empId = row['ID'] || 'Unknown ID';
                const amount = parseAmount(row['Amount']);
                
                knownEmpIds.add(String(empId).trim());

                const addStats = (node) => {
                  node.amounts[monthKey] = (node.amounts[monthKey] || 0) + amount;
                  if (!node.empIds[monthKey]) node.empIds[monthKey] = new Set();
                  node.empIds[monthKey].add(empId);
                };

                addStats(tree); 

                let currentNode = tree;
                let currentId = 'root';

                presetKeys.forEach((key, idx) => {
                  let val = row[key];
                  
                  // CRITICAL FIX: Safe Fallbacks for UWI Export formatting anomalies + Force String type to prevent .localeCompare crashes
                  if (!val && key === 'Department name') val = row['Department'] || row['Descr_1'];
                  if (!val && key === 'Acct. Description') val = row['Account'] || row['__EMPTY'] || row['Descr'];
                  if (!val && key === 'Posn Desc') val = row['Position'];
                  
                  // Force conversion to String to prevent React crashes when sorting number-only fields
                  val = String(val || `Unknown ${key}`).trim();
                  
                  currentId = `${currentId}|${val}`;
                  
                  if (!currentNode.children[val]) {
                    currentNode.children[val] = { 
                      id: currentId, 
                      name: val, 
                      level: idx + 1, 
                      children: {}, 
                      amounts: {}, 
                      empIds: {} 
                    };
                  }
                  
                  currentNode = currentNode.children[val];
                  addStats(currentNode);
                });
              });

              const actualMonths = Array.from(allMonthsSet).sort();
              if (actualMonths.length === 0) {
                alert("No valid dates found in the data. Please ensure your CSV has a column named 'Pay Period End' with valid dates.");
                setIsProcessing(false);
                return;
              }

              const baseMonth = actualMonths[actualMonths.length - 1];

              if (adjustmentsData) {
                adjustmentsData.forEach(adj => {
                  const adjId = String(adj['ID'] || adj['id']).trim();
                  
                  if (adjId && !knownEmpIds.has(adjId)) {
                    knownEmpIds.add(adjId); 
                    
                    const dept = String(adj['Department name'] || adj['Department'] || 'TBD / New Hires').trim();
                    const acct = String(adj['Acct. Description'] || adj['Account'] || 'TBD / New Hires').trim();
                    const posn = String(adj['Posn Desc'] || adj['Position'] || 'TBD Position').trim();
                    const empName = String(adj['Name'] || adj['name'] || `New Hire (${adjId})`).trim();
                    const grp = String(adj['Group'] || 'TBD Group').trim();
                    const salPlan = String(adj['Sal Plan'] || adj['sal plan'] || 'TBD Plan').trim();

                    const virtualRow = {
                      'Department name': dept,
                      'Acct. Description': acct,
                      'Posn Desc': posn,
                      'Name': empName,
                      'ID': adjId,
                      'Group': grp,
                      'Sal Plan': salPlan
                    };

                    const addDummyStats = (node) => {
                      node.amounts[baseMonth] = (node.amounts[baseMonth] || 0) + 0; 
                      if (!node.empIds[baseMonth]) node.empIds[baseMonth] = new Set();
                      node.empIds[baseMonth].add(adjId);
                    };

                    addDummyStats(tree);

                    let currentNode = tree;
                    let currentId = 'root';

                    presetKeys.forEach((key, idx) => {
                      const val = String(virtualRow[key] || `Unknown ${key}`).trim();
                      currentId = `${currentId}|${val}`;
                      if (!currentNode.children[val]) {
                        currentNode.children[val] = { id: currentId, name: val, level: idx + 1, children: {}, amounts: {}, empIds: {} };
                      }
                      currentNode = currentNode.children[val];
                      addDummyStats(currentNode);
                    });
                  }
                });
              }

              const forecastMonths = [];
              const [baseY, baseM] = baseMonth.split('-');
              let currentForecast = new Date(parseInt(baseY, 10), parseInt(baseM, 10), 1);
              const endForecast = new Date(2027, 6, 1); 

              while (currentForecast <= endForecast) {
                const y = currentForecast.getFullYear();
                const m = String(currentForecast.getMonth() + 1).padStart(2, '0');
                forecastMonths.push(`${y}-${m}`);
                currentForecast.setMonth(currentForecast.getMonth() + 1);
              }

              const empLeafCount = {};
              const countLeaves = (node) => {
                  if (!node.children || Object.keys(node.children).length === 0) {
                      if (node.empIds[baseMonth]) {
                          node.empIds[baseMonth].forEach(id => {
                              empLeafCount[id] = (empLeafCount[id] || 0) + 1;
                          });
                      }
                  } else {
                      Object.values(node.children).forEach(countLeaves);
                  }
              };
              countLeaves(tree);

              const applyForecasts = (node) => {
                  const baseAmount = node.amounts[baseMonth] || 0;
                  const baseEmpSet = node.empIds[baseMonth] || new Set();
                  const hasChildren = node.children && Object.keys(node.children).length > 0;

                  if (hasChildren) {
                      Object.values(node.children).forEach(applyForecasts);

                      forecastMonths.forEach(fm => {
                          let sumAmount = 0;
                          let sumIds = new Set();
                          Object.values(node.children).forEach(child => {
                              sumAmount += child.amounts[fm];
                              if (child.empIds[fm]) {
                                  child.empIds[fm].forEach(id => sumIds.add(id));
                              }
                          });
                          node.amounts[fm] = sumAmount;
                          node.empIds[fm] = sumIds;
                      });
                  } else {
                      forecastMonths.forEach(fm => {
                          let adjAmount = 0;
                          if (adjustmentsData) {
                              adjustmentsData.forEach(adj => {
                                  let m = adj['Month'] || adj['month'];
                                  m = parseDateStrToMonthKey(m) || m; 
                                  
                                  const id = String(adj['ID'] || adj['id']).trim();
                                  const amt = parseAmount(adj['Amount'] || adj['amount']);

                                  if (m === fm && baseEmpSet.has(id)) {
                                      const splits = empLeafCount[id] || 1;
                                      adjAmount += (amt / splits);
                                  }
                              });
                          }
                          node.amounts[fm] = baseAmount + adjAmount;
                          node.empIds[fm] = new Set(baseEmpSet);
                      });
                  }
              };
              
              applyForecasts(tree);

              setDataModel({ tree, actualMonths, forecastMonths, baseMonth });
              if (!dashboardMonth) setDashboardMonth(baseMonth);
              setExpandedRows(new Set(['root']));
              setIsProcessing(false);
            }, 50);

          }, [rawData, adjustmentsData, hierarchyIndex]);

          const toggleRow = (id) => {
            setExpandedRows(prev => {
              const next = new Set(prev);
              if (next.has(id)) next.delete(id);
              else next.add(id);
              return next;
            });
          };

          const collapseAll = () => setExpandedRows(new Set(['root']));

          // Calculate Display Periods based on August-July Financial Year and YTD
          const displayPeriods = useMemo(() => {
            if (!dataModel) return [];
            const allMonths = [...dataModel.actualMonths, ...dataModel.forecastMonths];
            
            // --- YTD Logic ---
            if (timeGrouping === 'ytd') {
                if (!dashboardMonth) return [];
                const [dYearStr, dMonthStr] = dashboardMonth.split('-');
                const dYear = parseInt(dYearStr, 10);
                const dMonth = parseInt(dMonthStr, 10);
                const fyStartYear = dMonth >= 8 ? dYear : dYear - 1;

                const ytdMonths = allMonths.filter(m => {
                    const [yStr, mmStr] = m.split('-');
                    const y = parseInt(yStr, 10);
                    const mm = parseInt(mmStr, 10);
                    const mFyStartYear = mm >= 8 ? y : y - 1;
                    return mFyStartYear === fyStartYear && m <= dashboardMonth;
                });

                const hasActual = ytdMonths.some(m => dataModel.actualMonths.includes(m));
                const hasForecast = ytdMonths.some(m => dataModel.forecastMonths.includes(m));
                let type = 'actual';
                if (hasActual && hasForecast) type = 'mixed';
                else if (hasForecast) type = 'forecast';

                return [{
                    key: `YTD-${dashboardMonth}`,
                    label: `YTD (${formatMonthLabel(dashboardMonth)})`,
                    months: ytdMonths,
                    type,
                    containsBaseMonth: ytdMonths.includes(dataModel.baseMonth)
                }];
            }

            // --- Regular Grouping Logic ---
            const groups = {};

            allMonths.forEach(m => {
              const [y_str, mm_str] = m.split('-');
              const y = parseInt(y_str, 10);
              const mm = parseInt(mm_str, 10);
              
              // Financial Year Math (Aug - Jul)
              let fyStartYear = mm >= 8 ? y : y - 1;
              let fyEndYear = fyStartYear + 1;
              let fyLabel = `FY ${fyStartYear}/${fyEndYear.toString().slice(2)}`;

              let key, label;
              
              if (timeGrouping === 'annual') {
                key = `FY-${fyStartYear}`; 
                label = fyLabel;
              } else if (timeGrouping === 'quarter') {
                // FY Quarters: Q1 (Aug-Oct), Q2 (Nov-Jan), Q3 (Feb-Apr), Q4 (May-Jul)
                let q;
                if (mm >= 8 && mm <= 10) q = 1;
                else if (mm === 11 || mm === 12 || mm === 1) q = 2;
                else if (mm >= 2 && mm <= 4) q = 3;
                else q = 4;
                
                key = `FY-${fyStartYear}-Q${q}`; 
                label = `Q${q} ${fyStartYear}/${fyEndYear.toString().slice(2)}`;
              } else {
                key = m; 
                label = formatMonthLabel(m);
              }

              if (!groups[key]) groups[key] = { key, label, months: [], type: 'actual', containsBaseMonth: false };
              groups[key].months.push(m);
              if (m === dataModel.baseMonth) groups[key].containsBaseMonth = true;
            });

            return Object.values(groups).sort((a,b) => a.key.localeCompare(b.key)).map(g => {
              const hasActual = g.months.some(m => dataModel.actualMonths.includes(m));
              const hasForecast = g.months.some(m => dataModel.forecastMonths.includes(m));
              
              if (hasActual && hasForecast) g.type = 'mixed';
              else if (hasForecast) g.type = 'forecast';
              else g.type = 'actual';
              
              return g;
            });
          }, [dataModel, timeGrouping, dashboardMonth]);

          const getMetricValue = useCallback((node, period) => {
            if (metric === 'amount') {
              return period.months.reduce((sum, m) => sum + (node.amounts[m] || 0), 0);
            }
            if (metric === 'headcount') {
              const combinedSet = new Set();
              period.months.forEach(m => {
                if (node.empIds[m]) node.empIds[m].forEach(id => combinedSet.add(id));
              });
              return combinedSet.size;
            }
            return 0;
          }, [metric]);
          
          const getRowTotal = useCallback((node) => {
            if (metric === 'amount') {
              if (viewMode === 'variance') {
                let sum = 0;
                displayPeriods.forEach((p, i) => {
                  if (i > 0) {
                     const curr = getMetricValue(node, p);
                     const prev = getMetricValue(node, displayPeriods[i-1]);
                     sum += (curr - prev);
                  }
                });
                return sum;
              } else {
                return displayPeriods.reduce((sum, p) => sum + getMetricValue(node, p), 0);
              }
            } else {
              if (viewMode === 'variance') {
                let sum = 0;
                displayPeriods.forEach((p, i) => {
                  if (i > 0) {
                     const curr = getMetricValue(node, p);
                     const prev = getMetricValue(node, displayPeriods[i-1]);
                     sum += (curr - prev);
                  }
                });
                return sum;
              } else {
                const combined = new Set();
                displayPeriods.forEach(p => {
                    p.months.forEach(m => {
                        if (node.empIds[m]) node.empIds[m].forEach(id => combined.add(id));
                    });
                });
                return combined.size;
              }
            }
          }, [metric, viewMode, displayPeriods, getMetricValue]);

          const renderValueCell = useCallback((node, period, prevPeriod) => {
            const isVariance = viewMode === 'variance';
            
            if (isVariance) {
              if (!prevPeriod) return <td key={period.key} className="px-3 py-2 text-right text-gray-400">-</td>;
              const currentVal = getMetricValue(node, period);
              const prevVal = getMetricValue(node, prevPeriod);
              const diff = currentVal - prevVal;
              
              let colorClass = "text-gray-700";
              if (diff > 0) colorClass = "text-red-600 font-medium"; 
              if (diff < 0) colorClass = "text-green-600 font-medium";
              if (metric === 'amount' && Math.abs(diff) < 0.01) colorClass = "text-gray-400";
              if (metric === 'headcount' && diff === 0) colorClass = "text-gray-400";

              const formattedDiff = metric === 'amount' ? formatCurrency(diff) : formatCount(diff);
              const displayDiff = diff > 0 ? `+${formattedDiff}` : formattedDiff;

              return (
                <td key={period.key} className={`px-3 py-2 text-right ${colorClass} ${period.type === 'forecast' ? 'bg-indigo-50/30' : ''}`}>
                  {displayDiff}
                </td>
              );
            }

            const val = getMetricValue(node, period);
            return (
              <td key={period.key} className={`px-3 py-2 text-right text-gray-800 ${period.type === 'forecast' ? 'bg-indigo-50/50' : ''}`}>
                {metric === 'amount' ? formatCurrency(val) : formatCount(val)}
              </td>
            );
          }, [metric, viewMode, getMetricValue]);

          const flatRows = useMemo(() => {
            if (!dataModel) return [];
            const rows = [];
            const flatten = (node) => {
              rows.push(node);
              const hasChildrenToRender = node.children && Object.keys(node.children).length > 0;
              if (hasChildrenToRender && expandedRows.has(node.id)) {
                Object.values(node.children)
                  // CRITICAL FIX: Explicit String cast to prevent crash on numeric strings like Position "00103711"
                  .sort((a, b) => String(a.name).localeCompare(String(b.name)))
                  .forEach(flatten);
              }
            };
            flatten(dataModel.tree);
            return rows;
          }, [dataModel, expandedRows]);

          // Dashboard Summary Metrics with YTD Logic
          const dashboardStats = useMemo(() => {
            if (!dataModel || !dashboardMonth) return null;
            const allMonths = [...dataModel.actualMonths, ...dataModel.forecastMonths];
            const mIdx = allMonths.indexOf(dashboardMonth);
            const prevMonth = mIdx > 0 ? allMonths[mIdx - 1] : null;

            const root = dataModel.tree;
            const currentAmt = root.amounts[dashboardMonth] || 0;
            const prevAmt = prevMonth ? (root.amounts[prevMonth] || 0) : 0;
            const currentHC = root.empIds[dashboardMonth] ? root.empIds[dashboardMonth].size : 0;
            const prevHC = prevMonth && root.empIds[prevMonth] ? root.empIds[prevMonth].size : 0;

            // YTD Calculation for the selected month's Financial Year
            const [dYearStr, dMonthStr] = dashboardMonth.split('-');
            const dYear = parseInt(dYearStr, 10);
            const dMonth = parseInt(dMonthStr, 10);
            const fyStartYear = dMonth >= 8 ? dYear : dYear - 1;

            let ytdAmt = 0;
            const ytdIds = new Set();

            for (let i = 0; i <= mIdx; i++) {
                const m = allMonths[i];
                const [yStr, mmStr] = m.split('-');
                const y = parseInt(yStr, 10);
                const mm = parseInt(mmStr, 10);
                const mFyStartYear = mm >= 8 ? y : y - 1;

                if (mFyStartYear === fyStartYear && m <= dashboardMonth) {
                    ytdAmt += (root.amounts[m] || 0);
                    if (root.empIds[m]) {
                        root.empIds[m].forEach(id => ytdIds.add(id));
                    }
                }
            }

            return {
              amount: currentAmt,
              amountVar: currentAmt - prevAmt,
              ytdAmount: ytdAmt,
              hc: currentHC,
              hcVar: currentHC - prevHC,
              ytdHc: ytdIds.size,
              hasPrev: !!prevMonth,
              isForecast: dataModel.forecastMonths.includes(dashboardMonth)
            };
          }, [dataModel, dashboardMonth]);

          // --- Export to Excel Function ---
          const exportToExcel = async () => {
            if (!dataModel) return;
            setIsProcessing(true);
            try {
              const XLSX = await loadExcelParser();
              const aoa = [];
              
              // 1. Build Header Row
              const headerRow = [HIERARCHY_PRESETS[hierarchyIndex].label];
              displayPeriods.forEach((period, idx) => {
                const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                if (viewMode === 'variance' && prevPeriod) {
                  headerRow.push(`${period.label} vs ${prevPeriod.label}`);
                } else if (viewMode !== 'variance') {
                  let suffix = '';
                  if (period.containsBaseMonth) suffix = ' (Base)';
                  else if (period.type === 'forecast') suffix = ' (FCST)';
                  else if (period.type === 'mixed') suffix = ' (Act+Fcst)';
                  headerRow.push(`${period.label}${suffix}`);
                }
              });
              headerRow.push("Total"); 
              aoa.push(headerRow);

              // 2. Build Data Rows
              flatRows.forEach(node => {
                const indent = "   ".repeat(node.level);
                const row = [String(indent + node.name)]; // Force string export
                
                displayPeriods.forEach((period, idx) => {
                  const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                  if (viewMode === 'variance') {
                    if (!prevPeriod) {
                      row.push('-');
                    } else {
                      const currentVal = getMetricValue(node, period);
                      const prevVal = getMetricValue(node, prevPeriod);
                      row.push(currentVal - prevVal); 
                    }
                  } else {
                    row.push(getMetricValue(node, period)); 
                  }
                });
                row.push(getRowTotal(node)); 
                aoa.push(row);
              });

              // 3. Create Workbook and Trigger Download
              const ws = XLSX.utils.aoa_to_sheet(aoa);
              const wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, "Report View");
              
              const fileName = `UWI_Report_${timeGrouping}_${viewMode}.xlsx`;
              XLSX.writeFile(wb, fileName);
            } catch (err) {
              console.error(err);
              alert("Failed to export to Excel.");
            }
            setIsProcessing(false);
          };

          if (!dataModel) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 font-sans">
                <div className="max-w-xl w-full bg-white rounded-xl shadow-lg p-10 text-center relative">
                  
                  {isProcessing ? (
                     <div className="py-12">
                       <svg className="animate-spin h-12 w-12 text-blue-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                       <h2 className="text-xl font-semibold text-gray-700">Loading Data Engine...</h2>
                     </div>
                  ) : (
                    <>
                      <img src={logoSrc} alt="UWI Logo" className="h-20 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display='none'} />
                      <h1 className="text-3xl font-bold text-blue-900 mb-2">UWI Payroll Analytics</h1>
                      <p className="text-gray-500 mb-8">Upload your raw transactional data (.csv or .xlsx) to generate hierarchical reports, variance analyses, and projections.</p>
                      
                      <label className="block w-full border-2 border-dashed border-gray-300 rounded-xl p-10 cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-colors">
                        <UploadIcon />
                        <span className="text-blue-600 font-medium text-lg">Click to select Raw Data File</span>
                        <p className="text-xs text-gray-400 mt-2 font-semibold">Supports .CSV and .XLSX</p>
                        <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />
                      </label>
                    </>
                  )}

                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-sm flex flex-col">
              <div className="bg-white rounded-t-xl shadow-sm border-b border-gray-200 p-6 flex flex-col xl:flex-row xl:items-end justify-between gap-6 relative">
                
                <div className="absolute top-4 right-6 flex items-center gap-4">
                  <label className="text-xs text-indigo-600 hover:text-indigo-800 font-medium cursor-pointer flex items-center bg-indigo-50 px-2 py-1 rounded">
                     <ExcelIcon />
                     Upload Adjustments (.csv/.xlsx)
                     <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" className="hidden" onChange={handleAdjustmentsUpload} ref={adjInputRef} />
                  </label>
                  <button 
                    onClick={handleClearData} 
                    className="text-xs text-red-600 hover:text-red-800 hover:underline font-medium"
                  >
                    Clear All Data
                  </button>
                </div>

                <div className="flex items-center gap-4 mt-6 xl:mt-0">
                  <img src={logoSrc} alt="UWI Logo" className="h-16 w-auto object-contain hidden sm:block" onError={(e) => e.target.style.display='none'} />
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-3">
                       UWI Cost & Headcount Report
                    </h1>
                    <p className="text-gray-500 mt-1 flex items-center">
                      {dataModel ? `Actuals through ${formatMonthLabel(dataModel.baseMonth)} • Projected through Jul-27` : 'Processing Data...'}
                      {adjustmentsData && adjustmentsData.length > 0 && (
                         <span className="ml-3 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-100 text-indigo-800">
                            {adjustmentsData.length} Adjustments / New Hires Active
                         </span>
                      )}
                    </p>
                  </div>
                </div>

                <div className="flex flex-wrap items-center gap-4 mt-2 xl:mt-0">
                  
                  <label className="bg-blue-50 border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-md font-medium text-xs shadow-sm cursor-pointer transition-colors flex items-center gap-1">
                     <ExcelIcon />
                     Add / Update Raw Data
                     <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />
                  </label>

                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 p-1 rounded-lg">
                     <div className="relative">
                        <select 
                          className="appearance-none bg-white border border-gray-300 text-gray-700 py-1.5 pl-3 pr-8 rounded text-xs font-medium shadow-sm outline-none focus:border-blue-500"
                          value={hierarchyIndex} 
                          onChange={(e) => setHierarchyIndex(parseInt(e.target.value, 10))}
                          disabled={isProcessing}
                        >
                          {HIERARCHY_PRESETS.map((preset, idx) => (
                            <option key={idx} value={idx}>View: {preset.label}</option>
                          ))}
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                          <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                     </div>

                     <div className="relative">
                        <select 
                          className="appearance-none bg-white border border-gray-300 text-gray-700 py-1.5 pl-3 pr-8 rounded text-xs font-medium shadow-sm outline-none focus:border-blue-500"
                          value={timeGrouping} 
                          onChange={(e) => setTimeGrouping(e.target.value)}
                          disabled={isProcessing}
                        >
                          <option value="month">Group: Monthly</option>
                          <option value="quarter">Group: Quarterly (FY)</option>
                          <option value="annual">Group: Annually (FY)</option>
                          <option value="ytd">Group: YTD (Syncs w/ Dashboard)</option>
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                          <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                     </div>
                  </div>

                  <div className="bg-gray-100 p-1 rounded-lg inline-flex">
                    <button 
                      onClick={() => setMetric('amount')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'amount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      $ Dollar Value
                    </button>
                    <button 
                      onClick={() => setMetric('headcount')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'headcount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      Headcount
                    </button>
                  </div>

                  <div className="bg-gray-100 p-1 rounded-lg inline-flex">
                    <button 
                      onClick={() => setViewMode('actuals')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${viewMode === 'actuals' ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      Actuals/FCST
                    </button>
                    <button 
                      onClick={() => setViewMode('variance')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${viewMode === 'variance' ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      Variance Mode
                    </button>
                  </div>

                  <button 
                    onClick={collapseAll}
                    disabled={isProcessing}
                    className="px-3 py-1.5 border border-gray-300 rounded-md bg-white hover:bg-gray-50 font-medium text-gray-700 text-xs shadow-sm"
                  >
                    Collapse All
                  </button>

                  <button 
                    onClick={exportToExcel}
                    disabled={isProcessing || !dataModel}
                    className="px-3 py-1.5 border border-emerald-600 text-emerald-700 hover:bg-emerald-50 rounded-md bg-white font-medium text-xs shadow-sm flex items-center gap-1 transition-colors"
                  >
                    <ExcelIcon />
                    Export to Excel
                  </button>
                </div>
              </div>
              
              {/* --- Dashboard Summary Section --- */}
              {dashboardStats && (
                <div className="bg-white shadow-sm border-b border-x border-gray-200 p-6 flex flex-col md:flex-row gap-6 items-center justify-between">
                  <div className="flex flex-col items-start min-w-[200px]">
                    <span className="text-xs font-semibold tracking-wider text-gray-400 uppercase mb-1">Executive Summary</span>
                    <div className="relative w-full">
                      <select 
                        className="appearance-none bg-gray-50 border border-gray-300 text-gray-900 py-2 pl-3 pr-8 rounded-lg text-sm font-bold shadow-sm outline-none focus:border-blue-500 w-full"
                        value={dashboardMonth} 
                        onChange={(e) => setDashboardMonth(e.target.value)}
                      >
                        {[...dataModel.actualMonths, ...dataModel.forecastMonths].map(m => (
                          <option key={m} value={m}>
                            {formatMonthLabel(m)} {m === dataModel.baseMonth ? '(Base)' : dataModel.forecastMonths.includes(m) ? '(Forecast)' : '(Actual)'}
                          </option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                        <ChevronDown />
                      </div>
                    </div>
                    <span className="text-[10px] text-gray-400 mt-1">* Drives the YTD columns & cards</span>
                  </div>

                  <div className="flex-1 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4">
                    {/* Amount Card */}
                    <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-blue-600 mb-1 truncate">Monthly Cost</p>
                      <p className="text-xl font-bold text-gray-900 truncate" title={formatCurrency(dashboardStats.amount)}>{formatCurrency(dashboardStats.amount)}</p>
                    </div>
                    {/* Amount Variance Card */}
                    <div className={`border rounded-xl p-3 ${dashboardStats.amountVar > 0 ? 'bg-red-50/50 border-red-100' : dashboardStats.amountVar < 0 ? 'bg-green-50/50 border-green-100' : 'bg-gray-50 border-gray-100'}`}>
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1 truncate">MoM Cost Var.</p>
                      <div className="flex items-center">
                        {dashboardStats.hasPrev ? (
                          <>
                            {dashboardStats.amountVar > 0 ? <span className="text-red-600"><TrendingUp /></span> : dashboardStats.amountVar < 0 ? <span className="text-green-600"><TrendingDown /></span> : null}
                            <p className={`text-lg font-bold truncate ${dashboardStats.amountVar > 0 ? 'text-red-700' : dashboardStats.amountVar < 0 ? 'text-green-700' : 'text-gray-700'}`} title={formatCurrency(dashboardStats.amountVar)}>
                              {dashboardStats.amountVar > 0 ? '+' : ''}{formatCurrency(dashboardStats.amountVar)}
                            </p>
                          </>
                        ) : <p className="text-lg font-bold text-gray-400">-</p>}
                      </div>
                    </div>
                    {/* YTD Amount Card */}
                    <div className="bg-sky-50/50 border border-sky-200 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-sky-700 mb-1 truncate">YTD Cost</p>
                      <p className="text-xl font-bold text-gray-900 truncate" title={formatCurrency(dashboardStats.ytdAmount)}>{formatCurrency(dashboardStats.ytdAmount)}</p>
                    </div>

                    {/* Headcount Card */}
                    <div className="bg-indigo-50/50 border border-indigo-100 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-indigo-600 mb-1 truncate">Monthly HC</p>
                      <p className="text-xl font-bold text-gray-900 truncate">{formatCount(dashboardStats.hc)} <span className="text-[10px] font-normal text-gray-500 uppercase tracking-wide ml-0.5">IDs</span></p>
                    </div>
                    {/* Headcount Variance Card */}
                    <div className={`border rounded-xl p-3 ${dashboardStats.hcVar > 0 ? 'bg-red-50/50 border-red-100' : dashboardStats.hcVar < 0 ? 'bg-green-50/50 border-green-100' : 'bg-gray-50 border-gray-100'}`}>
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1 truncate">MoM HC Var.</p>
                      <div className="flex items-center">
                        {dashboardStats.hasPrev ? (
                          <>
                            {dashboardStats.hcVar > 0 ? <span className="text-red-600"><TrendingUp /></span> : dashboardStats.hcVar < 0 ? <span className="text-green-600"><TrendingDown /></span> : null}
                            <p className={`text-lg font-bold truncate ${dashboardStats.hcVar > 0 ? 'text-red-700' : dashboardStats.hcVar < 0 ? 'text-green-700' : 'text-gray-700'}`}>
                              {dashboardStats.hcVar > 0 ? '+' : ''}{formatCount(dashboardStats.hcVar)}
                            </p>
                          </>
                        ) : <p className="text-lg font-bold text-gray-400">-</p>}
                      </div>
                    </div>
                    {/* YTD Headcount Card */}
                    <div className="bg-violet-50/50 border border-violet-200 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-violet-700 mb-1 truncate">YTD Unique HC</p>
                      <p className="text-xl font-bold text-gray-900 truncate">{formatCount(dashboardStats.ytdHc)} <span className="text-[10px] font-normal text-gray-500 uppercase tracking-wide ml-0.5">IDs</span></p>
                    </div>
                  </div>
                </div>
              )}

              <div className="bg-white shadow-sm rounded-b-xl flex-grow overflow-hidden flex flex-col border border-gray-200 relative">
                {isProcessing && (
                  <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-20 flex items-center justify-center">
                    <div className="text-blue-600 font-semibold text-lg animate-pulse flex items-center bg-white px-6 py-3 rounded-full shadow-lg border border-blue-100">
                      <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                      Updating Engine & Re-calculating Forecasts...
                    </div>
                  </div>
                )}

                <div className="overflow-x-auto overflow-y-auto max-h-[60vh]">
                  {dataModel && (
                    <table className="w-full text-left border-collapse">
                      <thead className="bg-gray-100 sticky top-0 z-10 shadow-sm">
                        <tr>
                          <th className="px-4 py-3 font-semibold text-gray-700 border-b border-gray-200 min-w-[350px]">
                            {HIERARCHY_PRESETS[hierarchyIndex].label}
                          </th>
                          
                          {displayPeriods.map((period, idx) => {
                            const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                            const isFcst = period.type === 'forecast';
                            const isMixed = period.type === 'mixed';
                            const headerStyle = isFcst ? 'bg-indigo-50/80 text-indigo-900' : isMixed ? 'bg-blue-50/50 text-blue-900' : 'text-gray-700';

                            return (
                              <th key={period.key} className={`px-3 py-3 font-semibold text-right border-b border-gray-200 whitespace-nowrap ${headerStyle}`}>
                                {viewMode === 'variance' && prevPeriod ? (
                                  <span className="text-xs">{period.label} vs<br/>{prevPeriod.label}</span>
                                ) : (
                                  <>
                                    {period.label}
                                    {period.containsBaseMonth && <span className="ml-1 text-[10px] uppercase tracking-wider text-blue-600" title="Contains Base Month">(Base)</span>}
                                    {isFcst && <span className="ml-1 text-[10px] uppercase opacity-70">(FCST)</span>}
                                    {isMixed && <span className="ml-1 text-[10px] uppercase opacity-70">(Act+Fcst)</span>}
                                  </>
                                )}
                              </th>
                            );
                          })}
                          
                          {/* --- Row Total Header --- */}
                          <th className="px-4 py-3 font-bold text-right border-b border-l-2 border-gray-300 whitespace-nowrap bg-gray-200 text-gray-900 shadow-sm">
                            Total
                          </th>
                        </tr>
                      </thead>
                      
                      <tbody className="divide-y divide-gray-100">
                        {flatRows.map((node) => {
                          const isExpanded = expandedRows.has(node.id);
                          const hasChildren = node.children && Object.keys(node.children).length > 0;
                          
                          let rowStyle = "hover:bg-gray-50 transition-colors group";
                          let indentPx = node.level * 24 + 16; 
                          let fontStyle = "text-gray-700";
                          
                          if (node.level === 0) {
                            rowStyle = "bg-gray-50 hover:bg-gray-100 border-t-2 border-gray-300";
                            fontStyle = "font-bold text-gray-900";
                          } else if (node.level === 1) {
                            fontStyle = "font-semibold text-gray-800";
                          } else if (!hasChildren) {
                            fontStyle = "text-gray-500 text-xs";
                          }

                          const rowTotal = getRowTotal(node);
                          let totalColorClass = "text-gray-900";
                          if (viewMode === 'variance') {
                             if (rowTotal > 0) totalColorClass = "text-red-700";
                             if (rowTotal < 0) totalColorClass = "text-green-700";
                          }

                          return (
                            <tr key={node.id} className={rowStyle}>
                              <td className={`py-2 border-r border-gray-100 whitespace-nowrap ${fontStyle}`} style={{ paddingLeft: `${indentPx}px`, paddingRight: '16px' }}>
                                <div className="flex items-center">
                                  {hasChildren ? (
                                    <button 
                                      onClick={() => toggleRow(node.id)} 
                                      className="mr-2 text-gray-400 hover:text-blue-600 focus:outline-none p-1 rounded hover:bg-blue-50 transition-colors"
                                    >
                                      {isExpanded ? <ChevronDown /> : <ChevronRight />}
                                    </button>
                                  ) : (
                                    <span className="w-7 mr-2 inline-block"></span>
                                  )}
                                  <span className="truncate max-w-md" title={node.name}>{node.name}</span>
                                </div>
                              </td>

                              {displayPeriods.map((period, idx) => {
                                const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                                return renderValueCell(node, period, prevPeriod);
                              })}
                              
                              {/* --- Row Total Cell --- */}
                              <td className={`px-4 py-2 text-right font-bold border-l-2 border-gray-200 bg-gray-50/50 ${totalColorClass}`}>
                                {viewMode === 'variance' && rowTotal > 0 ? '+' : ''}
                                {metric === 'amount' ? formatCurrency(rowTotal) : formatCount(rowTotal)}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            </div>
          );
        }

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
