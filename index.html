        // ─── Error Boundary ──────────────────────────────────────────────────
        class ErrorBoundary extends React.Component {
          constructor(props) { super(props); this.state = { hasError: false, error: null }; }
          static getDerivedStateFromError(error) { return { hasError: true, error }; }
          componentDidCatch(error, info) { console.error('UWI App Error:', error, info); }
          render() {
            if (this.state.hasError) {
              return (
                <div className="min-h-screen flex items-center justify-center bg-red-50 p-8">
                  <div className="bg-white rounded-2xl shadow-lg border border-red-200 p-8 max-w-lg w-full text-center">

                    <h2 className="text-xl font-bold text-red-800 mb-2">Something went wrong</h2>
                    <p className="text-gray-600 text-sm mb-6">{this.state.error?.message || 'An unexpected error occurred.'}</p>
                    <button onClick={() => this.setState({ hasError: false, error: null })}
                      className="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2 rounded-lg text-sm">
                      Try Again
                    </button>
                  </div>
                </div>
              );
            }
            return this.props.children;
          }
        }

        // ─── Toast notification (replaces alert() calls) ─────────────────────
        const ToastContext = React.createContext(null);
        function ToastProvider({ children }) {
          const [toasts, setToasts] = useState([]);
          const addToast = useCallback((message, type = 'info') => {
            const id = Date.now();
            setToasts(prev => [...prev, { id, message, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
          }, []);
          const colors = { info: 'bg-blue-600', success: 'bg-green-600', error: 'bg-red-600', warn: 'bg-amber-500' };
          return (
            <ToastContext.Provider value={addToast}>
              {children}
              <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                {toasts.map(t => (
                  <div key={t.id} className={`${colors[t.type] || colors.info} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-lg max-w-xs animate-pulse`}>
                    {t.message}
                  </div>
                ))}
              </div>
            </ToastContext.Provider>
          );
        }

        // --- Payroll Data ---
        async function loadPayrollFromDB() {
          // Raw fetch to PostgREST RPC — returns 26 rows (one per month with JSON employee arrays)
          // This bypasses the Supabase JS client row limit completely
          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/rpc/get_payroll_by_month`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey':        SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
              },
              body: '{}',
            }
          );

          if (!res.ok) {
            const err = await res.text();
            console.error('loadPayroll error:', res.status, err);
            throw new Error(`Failed to load payroll data (${res.status}): ${err}`);
          }

          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) {
            console.warn('loadPayroll: no data returned');
            return null;
          }

          // Unpack each month's employee JSON array into flat rows
          const rows = [];
          data.forEach(monthRow => {
            const month = monthRow.calendar_month;
            const employees = Array.isArray(monthRow.employees) ? monthRow.employees : [];
            employees.forEach(e => {
              rows.push({
                'Pay Period End':    month,
                'ID':                e.id,
                'Name':              e.name,
                'Amount':            e.amt != null ? parseFloat(e.amt) : 0,
                'Group':             e.grp,
                'Org. #':            e.org,
                'Acct. Description': e.acc,
                'Posn Desc':         e.pos,
                'Department name':   e.dep,
                'Sal Plan':          e.sal,
              });
            });
          });
          console.log(`✓ Loaded ${rows.length} employee-month rows across ${data.length} months`);
          return rows;
        }

        // Parse UWI pay period date: format is DD/MM/YYYY (e.g. "1/8/2025" = 1st Aug 2025)
        // Returns YYYY-MM string
        function fiscalPeriodToCalendarMonth(rawVal) {
          if (!rawVal) return null;
          const str = String(rawVal).trim();

          // Handle DD/MM/YYYY or D/M/YYYY (UWI source format)
          const slashParts = str.split('/');
          if (slashParts.length === 3) {
            const day  = parseInt(slashParts[0], 10);
            const mon  = parseInt(slashParts[1], 10);
            const year = parseInt(slashParts[2], 10);
            if (!isNaN(day) && !isNaN(mon) && !isNaN(year) && mon >= 1 && mon <= 12 && year > 2000) {
              return `${year}-${String(mon).padStart(2, '0')}`;
            }
          }

          // Handle Excel serial number
          if (typeof rawVal === 'number' || (!isNaN(rawVal) && !str.includes('/') && !str.includes('-'))) {
            const serial = parseFloat(rawVal);
            const d = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
          }

          // Handle YYYY-MM-DD (already stored ISO)
          if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            // Was stored as YYYY-01-MM (Postgres misread DD/MM/YYYY as MM/DD/YYYY)
            // So actual month = DAY part, actual year = YEAR part
            const parts = str.split('-');
            return `${parts[0]}-${parts[2]}`;
          }

          // Fall back to standard parser
          return parseDateStrToMonthKey(rawVal);
        }

        async function savePayrollToDB(parsedRows, filename) {
          const records = parsedRows.map(row => {
            const orgKey = Object.keys(row).find(k => {
              const c = String(k).replace(/\s+/g, '').toLowerCase();
              return c === 'org.#' || c === 'org#' || c === 'org' || c === 'orgnum';
            });
            // Store actual pay period end date from source
            const rawDate = row['Pay Period End'];
            let payDate = null;
            if (rawDate) {
              if (typeof rawDate === 'number') {
                const d = new Date(Date.UTC(1970, 0, Math.round(rawDate) - 25569 + 1));
                payDate = d.toISOString().split('T')[0];
              } else {
                const d = new Date(rawDate);
                if (!isNaN(d.getTime())) {
                  payDate = d.toISOString().split('T')[0];
                } else {
                  const mk = parseDateStrToMonthKey(rawDate);
                  payDate = mk ? `${mk}-01` : null;
                }
              }
            }
            return {
              pay_period_end:  payDate,
              // Derive calendar_month from the resolved payDate — reliable regardless of source format
              // DB trigger also handles this as a safety net
              calendar_month:  payDate ? payDate.substring(0, 7) : null,
              employee_id:     String(row['ID'] || '').trim() || null,
              employee_name:   String(row['Name'] || '').trim() || null,
              amount:          parseAmount(row['Amount']),
              group_name:      String(row['Group'] || '').trim() || null,
              org_number:      orgKey ? String(row[orgKey]).trim() : null,
              account_number:  String(row['Account #'] || row['Account Number'] || '').trim() || null,
              account_desc:    String(row['Acct. Description'] || row['Account'] || '').trim() || null,
              position_desc:   String(row['Posn Desc'] || row['Position'] || '').trim() || null,
              department_name: String(row['Department name'] || row['Department'] || row['Descr_1'] || '').trim() || null,
              sal_plan:        String(row['Sal Plan'] || '').trim() || null,
              // raw_row intentionally omitted - structured columns are sufficient
            };
          });

          // Batch insert in chunks of 500
          const CHUNK = 500;
          for (let i = 0; i < records.length; i += CHUNK) {
            const chunk = records.slice(i, i + CHUNK);
            const { error } = await sb.from('payroll_data').insert(chunk);
            if (error) { console.error('savePayroll error', error); throw error; }
          }

          // Refresh the materialized view cache so new data is visible
          await sb.rpc('refresh_payroll_cache');

          // Log the upload
          await sb.from('upload_log').insert({
            filename:      filename || 'manual_upload',
            rows_inserted: records.length,
            rows_in_file:  parsedRows.length,
            notes:         'Uploaded via app'
          });
        }

        async function clearPayrollFromDB() {
          const { error } = await sb.from('payroll_data').delete().neq('id', 0);
          if (error) console.error('clearPayroll error', error);
          // Refresh cache after clear
          await sb.rpc('refresh_payroll_cache').catch(e => console.warn('cache refresh failed', e));
        }

        // --- Org Mapping ---
        async function loadMappingFromDB() {
          const { data, error } = await sb.from('org_mapping').select('org_number, faculty, department');
          if (error) { console.error('loadMapping error', error); return null; }
          if (!data || data.length === 0) return null;
          const map = {};
          data.forEach(r => { map[r.org_number] = { faculty: r.faculty, dept: r.department }; });
          return map;
        }

        async function saveMappingToDB(parsedRows) {
          const records = parsedRows.map(r => {
            let org = '', fac = '', dept = '';
            for (const [k, v] of Object.entries(r)) {
              const c = String(k).toLowerCase().trim();
              if (c === 'org' || c === 'org.' || c === 'org. #') org = String(v).trim();
              if (c === 'faculty') fac = String(v).trim();
              if (c === 'department') dept = String(v).trim();
            }
            return org ? { org_number: org, faculty: fac, department: dept } : null;
          }).filter(Boolean);

          if (records.length === 0) return;
          const { error } = await sb.from('org_mapping')
            .upsert(records, { onConflict: 'org_number' });
          if (error) console.error('saveMapping error', error);
        }

        // --- Assumptions ---
        async function loadAssumptionsFromDB() {
          // Load union, new_hires, one_offs, filters from assumptions JSONB table
          // Load increments from dedicated increments table
          const [{ data: aData, error: aErr }, { data: iData, error: iErr }] = await Promise.all([
            sb.from('assumptions').select('assumption_type, data'),
            sb.from('increments').select('id, employee_id, amount, start_month, notes').order('start_month'),
          ]);
          if (aErr) { console.error('loadAssumptions error', aErr); return null; }

          const out = { oneOffs: [], increments: [], union: [], newHires: [], startMonthFilter: '' };
          if (aData) {
            aData.forEach(r => {
              if (r.assumption_type === 'union')     out.union     = r.data || [];
              if (r.assumption_type === 'new_hires') out.newHires  = r.data || [];
              if (r.assumption_type === 'one_offs')  out.oneOffs   = r.data || [];
              if (r.assumption_type === 'filters')   out.startMonthFilter = (r.data && r.data.startMonthFilter) || '';
            });
          }
          // Map increments table rows to the format the engine expects
          if (iData && iData.length > 0) {
            out.increments = iData.map(r => ({
              uid:        r.id,
              id:         r.employee_id,
              amount:     parseFloat(r.amount),
              startMonth: r.start_month,
              notes:      r.notes || '',
            }));
          }
          return out;
        }

        async function saveAssumptionsToDB(assumptions) {
          // Save union, new_hires, one_offs, filters to assumptions JSONB table
          // Increments are saved separately via saveIncrementsToDB
          const rows = [
            { assumption_type: 'union',     data: assumptions.union     || [], updated_at: new Date().toISOString() },
            { assumption_type: 'new_hires', data: assumptions.newHires  || [], updated_at: new Date().toISOString() },
            { assumption_type: 'one_offs',  data: assumptions.oneOffs   || [], updated_at: new Date().toISOString() },
            { assumption_type: 'filters',   data: { startMonthFilter: assumptions.startMonthFilter || '' }, updated_at: new Date().toISOString() },
          ];
          const { error } = await sb.from('assumptions').upsert(rows, { onConflict: 'assumption_type' });
          if (error) console.error('saveAssumptions error', error);

          // Also sync increments to their dedicated table
          if (assumptions.increments !== undefined) {
            await saveIncrementsToDB(assumptions.increments);
          }
        }

        async function saveIncrementsToDB(increments) {
          // Clear and replace all increments
          await sb.from('increments').delete().neq('id', 0);
          if (!increments || increments.length === 0) return;
          const records = increments.map(inc => ({
            employee_id: String(inc.id || '').trim(),
            amount:      parseFloat(inc.amount) || 0,
            start_month: inc.startMonth || '',
            notes:       inc.notes || '',
          })).filter(r => r.employee_id && r.amount && r.start_month);
          if (records.length === 0) return;
          const { error } = await sb.from('increments').insert(records);
          if (error) console.error('saveIncrements error', error);
        }

        async function clearAllDB() {
          await clearPayrollFromDB();
          await sb.from('org_mapping').delete().neq('id', 0);
          await sb.from('increments').delete().neq('id', 0);
          await sb.from('assumptions').upsert([
            { assumption_type: 'union',     data: [] },
            { assumption_type: 'new_hires', data: [] },
            { assumption_type: 'one_offs',  data: [] },
            { assumption_type: 'filters',   data: { startMonthFilter: '' } },
          ], { onConflict: 'assumption_type' });
        }

        // --- Data Parsers ---
        const loadExcelParser = async () => {
          if (window.XLSX) return window.XLSX;
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            script.onload = () => resolve(window.XLSX);
            script.onerror = () => {
              toast("Excel parser failed to load. Check your internet connection.", "error");
              reject(new Error("CDN Load Failed"));
            };
            document.head.appendChild(script);
          });
        };

        const loadJSZipParser = async () => {
          if (window.JSZip) return window.JSZip;
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
            script.onload = () => resolve(window.JSZip);
            script.onerror = () => {
              toast("JSZip failed to load. Check your internet connection.", "error");
              reject(new Error("CDN Load Failed"));
            };
            document.head.appendChild(script);
          });
        };

        // --- Iron-Clad Date Parser ---
        function parseDateStrToMonthKey(dateStr) {
          if (!dateStr) return null;

          // Handle DD/MM/YYYY or D/M/YYYY (UWI source format e.g. "1/8/2025" = Aug 2025)
          if (typeof dateStr === 'string' && dateStr.includes('/')) {
            const parts = dateStr.trim().split('/');
            if (parts.length === 3) {
              const d = parseInt(parts[0], 10);
              const m = parseInt(parts[1], 10);
              const y = parseInt(parts[2], 10);
              if (!isNaN(d) && !isNaN(m) && !isNaN(y) && m >= 1 && m <= 12 && y > 2000) {
                return `${y}-${String(m).padStart(2, '0')}`;
              }
            }
          }

          // Handle YYYY-MM (already a month key)
          if (typeof dateStr === 'string' && /^\d{4}-\d{2}$/.test(dateStr.trim())) {
            return dateStr.trim();
          }

          let y, m;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-') && !/[a-zA-Z]/.test(String(dateStr)))) {
            const serial = parseFloat(dateStr);
            const dateObj = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            y = dateObj.getUTCFullYear();
            m = dateObj.getUTCMonth() + 1;
          } else {
            const str = String(dateStr).trim().toLowerCase();
            let foundMonth = false;
            
            const months = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
            for (const [mName, mNum] of Object.entries(months)) {
                if (str.includes(mName)) {
                    m = mNum;
                    foundMonth = true;
                    
                    let year4Match = str.match(/\b(20\d{2})\b/);
                    if (year4Match) {
                        y = parseInt(year4Match[1], 10);
                    } else {
                        let endYearMatch = str.match(/(?:[-/\s]|^)(\d{2})\s*$/);
                        if (endYearMatch) {
                            y = parseInt(endYearMatch[1], 10);
                        } else {
                            let allNumbers = str.match(/\b\d{2}\b/g);
                            if (allNumbers && allNumbers.length > 0) {
                                y = parseInt(allNumbers[allNumbers.length - 1], 10);
                            }
                        }
                    }
                    break;
                }
            }

            if (!foundMonth) {
                const parts = str.split(/[-/]/);
                if (parts.length >= 2) {
                    let p0 = parseInt(parts[0], 10);
                    let p1 = parseInt(parts[1], 10);
                    let p2 = parts.length === 3 ? parseInt(parts[2], 10) : null;

                    if (parts.length === 2) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[1].length === 4) { y = p1; m = p0; }
                        else { y = p1; m = p0; } 
                    } else if (parts.length === 3) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[2].length === 4 || String(p2).length === 2) { 
                            y = p2;
                            if (p0 > 12) { m = p1; } 
                            else if (p1 > 12) { m = p0; } 
                            else { m = p0; } 
                        }
                    }
                }
            }
          }

          if (y && m) {
              if (y < 100) y += 2000;
              return `${y}-${String(m).padStart(2, '0')}`;
          }

          // Handle ISO date strings (YYYY-MM-DD) directly — avoids timezone trap
          if (/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr).trim())) {
            const parts = String(dateStr).trim().split('-');
            return `${parts[0]}-${parts[1]}`;
          }

          const parsedDate = new Date(dateStr);
          if (!isNaN(parsedDate.getTime())) {
              return `${parsedDate.getFullYear()}-${String(parsedDate.getMonth() + 1).padStart(2, '0')}`;
          }
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          return new Date(yearNum, monthNum - 1, 1).toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        const formatCount = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US').format(val);

        function parseAmount(val) {
          if (val == null || val === '') return 0;
          if (typeof val === 'number') return val;
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          let num = parseFloat(strVal);
          return isNaN(num) ? 0 : (isNegative ? -num : num);
        }

        function getOrgValue(row) {
            const orgKey = Object.keys(row).find(k => {
                const c = String(k).replace(/\s+/g, '').toLowerCase();
                return c === 'org.#' || c === 'org#' || c === 'org' || c === 'orgnum';
            });
            return orgKey ? row[orgKey] : null;
        }

        function getFacultyFromOrg(orgNum) {
          if (!orgNum) return 'Admin & Other Units';
          const match = String(orgNum).match(/\d+/);
          if (!match) return 'Admin & Other Units';
          const num = parseInt(match[0], 10);

          if (num >= 7100 && num <= 7199) return 'Faculty of Humanities & Education';
          if (num >= 7200 && num <= 7299) return 'Faculty of Law';
          if (num >= 7300 && num <= 7399) return 'Faculty of Engineering';
          if (num >= 7400 && num <= 7499) return 'Faculty of Medical Sciences';
          if (num >= 7500 && num <= 7599) return 'Faculty of Science & Technology';
          if (num >= 7600 && num <= 7699) return 'Faculty of Social Sciences';
          if (num >= 7700 && num <= 7799) return 'Faculty of Sport';
          if (num >= 7800 && num <= 7899) return 'Institute for Gender & Dev Studies';
          return 'Admin & Other Units';
        }

            processedDataCache.data.filter(d => d.month === dataModel.baseMonth).forEach(d => {
              const row = d.row; const orgVal = d.cleanOrgValue;
              let key;
              if (fteFilter==='faculty')   key = row['Mapped Faculty']||(mappingData&&orgVal&&mappingData[orgVal]?.faculty)||getFacultyFromOrg(orgVal)||'Unknown';
              else if (fteFilter==='dept') key = row['Mapped Department']||(mappingData&&orgVal&&mappingData[orgVal]?.dept)||row['Department name']||'Unknown';
              else if (fteFilter==='group') key = row['Group']||'Unknown';

        function SensitivityTab({ dataModel, processedDataCache }) {

                  <h4 className="text-sm font-bold text-gray-700 mb-3">Monthly Projection — Base Month Carry-Forward</h4>
