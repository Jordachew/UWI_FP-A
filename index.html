        // --- Browser IndexedDB Storage Engine ---
        const DB_NAME = 'UWIPayrollDB';
        const STORE_NAME = 'csvData';

        function saveToDB(storeKey, data) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              const tx = db.transaction(STORE_NAME, 'readwrite');
              tx.objectStore(STORE_NAME).put(data, storeKey);
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function loadFromDB(storeKey) {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) return resolve(null);
              const tx = db.transaction(STORE_NAME, 'readonly');
              const store = tx.objectStore(STORE_NAME);
              const getReq = store.get(storeKey);
              getReq.onsuccess = () => resolve(getReq.result);
              getReq.onerror = () => reject(getReq.error);
            };
            request.onerror = () => reject(request.error);
          });
        }

        function clearDB() {
          return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = (e) => {
              const db = e.target.result;
              if (db.objectStoreNames.contains(STORE_NAME)) {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).clear();
                tx.oncomplete = () => resolve();
              } else {
                resolve();
              }
            };
          });
        }

        // --- Data Parsers ---
        const loadExcelParser = async () => {
          if (window.XLSX) return window.XLSX;
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            script.onload = () => resolve(window.XLSX);
            script.onerror = () => {
              alert("Failed to load Excel parsing engine. Please check your internet connection or ad-blocker.");
              reject(new Error("CDN Load Failed"));
            };
            document.head.appendChild(script);
          });
        };

        // --- Formatting Helpers ---
        function parseDateStrToMonthKey(dateStr) {
          if (dateStr === null || dateStr === undefined || dateStr === '') return null;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-'))) {
            const serial = parseFloat(dateStr);
            // Strict UTC offset prevents local timezone anomalies from shifting midnight to previous day
            const dateObj = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            const y = dateObj.getUTCFullYear();
            const m = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
          }

          const str = String(dateStr).trim();
          
          if (str.includes('-')) {
            const parts = str.split('-');
            if (parts.length >= 2 && parts[0].length === 4) {
              return `${parts[0]}-${parts[1].padStart(2, '0')}`;
            }
          }

          if (str.includes('/')) {
            const parts = str.split('/');
            if (parts.length === 3) {
              let m = parts[1];
              let y = parts[2];
              if (parts[0].length === 4) {
                y = parts[0];
                m = parts[1];
              } else if (parts[2].length === 2) {
                y = `20${parts[2]}`;
              }
              return `${y}-${m.padStart(2, '0')}`;
            }
          }
          
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          
          const dateObj = new Date(yearNum, monthNum - 1, 1);
          return dateObj.toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        };

        const formatCount = (val) => {
          if (val === undefined || val === null || isNaN(val)) return '-';
          return new Intl.NumberFormat('en-US').format(val);
        };

        function parseAmount(val) {
          if (val === null || val === undefined || val === '') return 0;
          if (typeof val === 'number') return val;
          
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          
          let num = parseFloat(strVal);
          if (isNaN(num)) return 0;
          return isNegative ? -num : num;
        }
        
        function getOrgValue(row) {
            if (row['Org. #'] !== undefined) return row['Org. #'];
            if (row['Org #'] !== undefined) return row['Org #'];
            if (row['Org.'] !== undefined) return row['Org.'];
            if (row['Org'] !== undefined) return row['Org'];
            
            const orgKey = Object.keys(row).find(k => {
                const clean = String(k).replace(/\s+/g, '').toLowerCase();
                return clean === 'org.#' || clean === 'org#' || clean === 'org' || clean === 'orgnum';
            });
            
            return orgKey ? row[orgKey] : null;
        }

        function getFacultyFromOrg(orgNum) {
          if (orgNum === null || orgNum === undefined || orgNum === '') return 'Admin & Other Units';
          
          const match = String(orgNum).match(/\d+/);
          if (!match) return 'Admin & Other Units';

          const num = parseInt(match[0], 10);

          if (num >= 7100 && num <= 7199) return 'Faculty of Humanities & Education';
          if (num >= 7200 && num <= 7299) return 'Faculty of Law';
          if (num >= 7300 && num <= 7399) return 'Faculty of Engineering';
          if (num >= 7400 && num <= 7499) return 'Faculty of Medical Sciences';
          if (num >= 7500 && num <= 7599) return 'Faculty of Science & Technology';
          if (num >= 7600 && num <= 7699) return 'Faculty of Social Sciences';
          if (num >= 7700 && num <= 7799) return 'Faculty of Sport';
          if (num >= 7800 && num <= 7899) return 'Institute for Gender & Dev Studies';

          return 'Admin & Other Units';
        }

        // --- Configurations ---
        const HIERARCHY_PRESETS = [
          { label: 'Faculty > Dept > Account > Position > Emp', keys: ['Mapped Faculty', 'Department name', 'Acct. Description', 'Posn Desc', 'Name'] },

          { label: 'Dept > Account > Position > Emp', keys: ['Department name', 'Acct. Description', 'Posn Desc', 'Name'] },
          { label: 'Position > Dept > Emp', keys: ['Posn Desc', 'Department name', 'Name'] },
          { label: 'Department Only', keys: ['Department name'] },
          { label: 'Account Category > Dept', keys: ['Acct. Description', 'Department name'] },
          { label: 'Account # > Faculty > Dept > Emp', keys: ['Account #', 'Mapped Faculty', 'Department name', 'Name'] },
          { label: 'Account # > Account Category', keys: ['Account #', 'Acct. Description'] },
          { label: 'Position Only', keys: ['Posn Desc'] },

        function App() {
          const [rawData, setRawData] = useState(null);
          const [isProcessing, setIsProcessing] = useState(true); 
          
          // Unified Assumptions State
          const [assumptions, setAssumptions] = useState({ oneOffs: [], increments: [], union: [], startMonthFilter: '' });
          const [showAssumptions, setShowAssumptions] = useState(false);
          const [activeAssumptionTab, setActiveAssumptionTab] = useState('union');
          
          // Navigation & UI States
          const [activeTab, setActiveTab] = useState('table'); 
          const [waterfallBaseIndex, setWaterfallBaseIndex] = useState(-1);
          const [waterfallCompareIndex, setWaterfallCompareIndex] = useState(-1);
          
          const [dataModel, setDataModel] = useState(null);
          const [expandedRows, setExpandedRows] = useState(new Set(['root']));
          
          const [metric, setMetric] = useState('amount'); 
          const [viewMode, setViewMode] = useState('actuals'); 
          const [timeGrouping, setTimeGrouping] = useState('month');
          const [hierarchyIndex, setHierarchyIndex] = useState(0);
          
          // Dashboard & Modals
          const [dashboardMonth, setDashboardMonth] = useState('');
          const fileInputRef = useRef(null);
          const incInputRef = useRef(null);
          const logoSrc = useMemo(() => getLogoSrc(), []);

          // --- ZIP & File Processing Engine ---
          const processFile = async (file, onComplete) => {
            setIsProcessing(true);
            try {
              let actualFile = file;

              if (file.name.toLowerCase().endsWith('.zip')) {
                  const zip = await JSZip.loadAsync(file);
                  const filename = Object.keys(zip.files).find(name => !name.startsWith('__MACOSX') && !name.startsWith('.') && !zip.files[name].dir);
                  if (!filename) throw new Error("No valid Excel or CSV file found inside the ZIP archive.");
                  
                  const fileData = await zip.files[filename].async("blob");
                  actualFile = new File([fileData], filename);
              }

              const isExcel = actualFile.name.toLowerCase().endsWith('.xlsx') || actualFile.name.toLowerCase().endsWith('.xls');
              
              if (isExcel) {
                  const XLSX = await loadExcelParser();
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const parsed = XLSX.utils.sheet_to_json(worksheet, { raw: true, defval: "" }); 
                    onComplete(parsed);
                  };
                  reader.readAsArrayBuffer(actualFile);
              } else {
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                      const text = evt.target.result;
                      let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
                      for (l of text) {
                          if ('"' === l) {
                              if (s && l === p) row[i] += l;
                              s = !s;
                          } else if (',' === l && s) l = row[++i] = '';
                          else if ('\n' === l && s) {
                              row = ret[++r] = [l = '']; i = 0;
                          } else row[i] += l;
                          p = l;
                      }
                      
                      const filtered = ret.filter(r => r.length > 1 || r[0].trim() !== '');
                      const headers = filtered[0].map(h => h.trim());
                      const parsed = [];
                      for (let j = 1; j < filtered.length; j++) {
                          const obj = {};
                          filtered[j].forEach((val, index) => {
                              if (headers[index]) obj[headers[index]] = (val || '').trim();
                          });
                          parsed.push(obj);
                      }
                      onComplete(parsed);
                  };
                  reader.readAsText(actualFile);
              }
            } catch (e) {
              console.error(e);
              alert("Error reading file. If using a ZIP file, please ensure it contains a valid CSV or XLSX.");
              setIsProcessing(false);
            }
          };

          useEffect(() => {
            const initApp = async () => {
              try {
                const savedAdj = await loadFromDB('assumptions');
                if (savedAdj) {
                    if (Array.isArray(savedAdj)) {
                        setAssumptions({ oneOffs: savedAdj, increments: [], union: [], startMonthFilter: '' });
                    } else {
                        setAssumptions({ startMonthFilter: '', ...savedAdj });
                    }
                }

                const savedData = await loadFromDB('latestUpload');
                if (savedData && savedData.length > 0) {
                    setRawData(savedData);
                } else {
                    try {
                        const resZip = await fetch('./default_data.zip');
                        if (resZip.ok) {
                            const blob = await resZip.blob();
                            const file = new File([blob], 'default_data.zip', { type: 'application/zip' });
                            processFile(file, async (parsed) => {
                                await saveToDB('latestUpload', parsed);
                                setRawData(parsed);
                            });
                            return; 
                        }
                    } catch (zipErr) {}

                    try {
                        const resXlsx = await fetch('./default_data.xlsx');
                        if (resXlsx.ok) {
                            const blob = await resXlsx.blob();
                            const file = new File([blob], 'default_data.xlsx', { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                            processFile(file, async (parsed) => {
                                await saveToDB('latestUpload', parsed);
                                setRawData(parsed);
                            });
                            return; 
                        }
                    } catch (xlsxErr) {}
                    
                    try {
                        const resCsv = await fetch('./default_data.csv');
                        if (resCsv.ok) {
                            const blob = await resCsv.blob();
                            const file = new File([blob], 'default_data.csv', { type: 'text/csv' });
                            processFile(file, async (parsed) => {
                                await saveToDB('latestUpload', parsed);
                                setRawData(parsed);
                            });
                            return; 
                        }
                    } catch (csvErr) {}

                    setIsProcessing(false);
                }
              } catch (err) {
                console.error("Database initialization failed", err);
                setIsProcessing(false);
              }
            };
            initApp();
          }, []);


          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file, async (parsed) => {
              let finalData = parsed;
              if (rawData && rawData.length > 0) {
                  const doAppend = window.confirm(`Existing data found (${rawData.length} rows).\n\nClick [OK] to APPEND this new file's data to your existing history.\nClick [Cancel] to OVERWRITE everything with this new file.`);
                  if (doAppend) finalData = [...rawData, ...parsed];
              }
              await saveToDB('latestUpload', finalData).catch(console.error);
              setRawData(finalData);
              if (fileInputRef.current) fileInputRef.current.value = null;
            });
          };

          const handleClearData = async () => {
            if (window.confirm("Are you sure you want to completely clear all saved raw data AND forecast assumptions?")) {
              setIsProcessing(true);
              await clearDB();
              setRawData(null);
              setAssumptions({ oneOffs: [], increments: [], union: [], startMonthFilter: '' });
              setDataModel(null);
              setDashboardMonth('');
              setShowAssumptions(false);
              setActiveTab('table');
              setWaterfallBaseIndex(-1);
              setWaterfallCompareIndex(-1);
              setIsProcessing(false);
            }
          };

          const saveAssumptionsState = async (newAssumptions) => {
              setAssumptions(newAssumptions);
              await saveToDB('assumptions', newAssumptions).catch(console.error);
          };

          // --- Derived Data for Assumptions ---
          const uniqueGroups = useMemo(() => {
              if (!rawData) return [];
              const groups = new Set();
              rawData.forEach(r => {
                  const g = String(r['Group'] || '').trim();
                  if (g && g !== 'undefined') groups.add(g);
              });
              return Array.from(groups).sort();
          }, [rawData]);

          const rawMonthsList = useMemo(() => {
              if (!rawData) return [];
              return Array.from(new Set(rawData.map(r => parseDateStrToMonthKey(r['Pay Period End'])))).filter(Boolean).sort();
          }, [rawData]);

          const forecastMonthsList = useMemo(() => {
              if (!rawData) return [];
              
              const allMonths = Array.from(new Set(rawData.map(r => parseDateStrToMonthKey(r['Pay Period End']))))
                  .filter(Boolean)
                  .filter(m => !assumptions.startMonthFilter || m >= assumptions.startMonthFilter)
                  .sort();
              
              if(allMonths.length === 0) return [];
              
              const baseM = allMonths[allMonths.length - 1];
              const [y, m] = baseM.split('-');
              let curr = new Date(parseInt(y, 10), parseInt(m, 10), 1); 
              const end = new Date(2027, 6, 1);
              
              const list = [];
              while(curr <= end) {
                  const fy = curr.getFullYear();
                  const fm = String(curr.getMonth() + 1).padStart(2, '0');
                  list.push(`${fy}-${fm}`);
                  curr.setMonth(curr.getMonth() + 1);
              }
              return list;
          }, [rawData, assumptions.startMonthFilter]);

          // --- Build Unified Data Engine & Tree ---
          useEffect(() => {
            if (!rawData) return;
            
            setIsProcessing(true);
            
            setTimeout(() => {
              const allMonthsSet = new Set();
              const empInfoMap = {}; 

              // 1. First Pass: Get actual months
              rawData.forEach(row => {
                const monthKey = parseDateStrToMonthKey(row['Pay Period End']);
                if (!monthKey) return; 
                if (assumptions.startMonthFilter && monthKey < assumptions.startMonthFilter) return; // Discard filtered months
                
                allMonthsSet.add(monthKey);

                const id = String(row['ID'] || '').trim();
                if (id) empInfoMap[id] = row; 
              });

              const actualMonths = Array.from(allMonthsSet).sort();
              if (actualMonths.length === 0) {
                setIsProcessing(false);
                return;
              }

              const baseMonth = actualMonths[actualMonths.length - 1];

              const forecastMonths = [];
              const [baseY, baseM] = baseMonth.split('-');
              let currentForecast = new Date(parseInt(baseY, 10), parseInt(baseM, 10), 1);
              const endForecast = new Date(2027, 6, 1); 

              while (currentForecast <= endForecast) {
                const y = currentForecast.getFullYear();
                const m = String(currentForecast.getMonth() + 1).padStart(2, '0');
                forecastMonths.push(`${y}-${m}`);
                currentForecast.setMonth(currentForecast.getMonth() + 1);
              }

              const baseRows = rawData.filter(r => parseDateStrToMonthKey(r['Pay Period End']) === baseMonth);
              const combinedData = [];

              // Add Actuals
              rawData.forEach(row => {
                  const m = parseDateStrToMonthKey(row['Pay Period End']);
                  if (!m) return;
                  if (assumptions.startMonthFilter && m < assumptions.startMonthFilter) return;
                  combinedData.push({ month: m, amount: parseAmount(row['Amount']), id: String(row['ID']).trim(), row });
              });

              // Generate Forecasts
              forecastMonths.forEach(fm => {
                  
                  // 1. Carry forward base rows & apply Union compounding
                  baseRows.forEach(row => {
                      let amt = parseAmount(row['Amount']);
                      const group = String(row['Group']).trim();
                      
                      if (assumptions.union && assumptions.union.length > 0) {
                          let multiplier = 1;
                          assumptions.union.forEach(u => {
                              if (u.group === group && fm >= u.startMonth) {
                                  multiplier *= (1 + (parseFloat(u.percentage) / 100));
                              }
                          });
                          amt *= multiplier;
                      }

                      combinedData.push({ month: fm, amount: amt, id: String(row['ID']).trim(), row });
                  });

                  // 2. Apply Flat Increments
                  if (assumptions.increments && assumptions.increments.length > 0) {
                      assumptions.increments.forEach(inc => {
                          if (fm >= inc.startMonth) {
                              const amt = parseFloat(inc.amount);
                              const id = String(inc.id).trim();
                              const info = empInfoMap[id] || { 'Name': `New Hire (${id})`, 'ID': id, 'Department name': 'TBD / New Hires' };
                              combinedData.push({ month: fm, amount: amt, id, row: info });
                          }
                      });
                  }

                  // 3. Apply Legacy One-Off Adjustments
                  if (assumptions.oneOffs && assumptions.oneOffs.length > 0) {
                      assumptions.oneOffs.forEach(adj => {
                          let adjM = parseDateStrToMonthKey(adj.Month || adj.month);
                          if (adjM === fm) {
                              const id = String(adj.ID || adj.id).trim();
                              const amt = parseAmount(adj.Amount || adj.amount);
                              const info = empInfoMap[id] || adj; 
                              const mergedRow = { ...info, ...adj };
                              combinedData.push({ month: fm, amount: amt, id, row: mergedRow });
                          }
                      });
                  }
              });

              // Build UI Tree
              const presetKeys = HIERARCHY_PRESETS[hierarchyIndex].keys;
              const tree = { id: 'root', name: 'Total UWI Mona', level: 0, children: {}, amounts: {}, empIds: {} };

              combinedData.forEach(item => {
                  const { month, amount, id, row } = item;

                  const addStats = (node) => {
                    node.amounts[month] = (node.amounts[month] || 0) + amount;
                    if (id && id !== 'undefined') {
                        if (!node.empIds[month]) node.empIds[month] = new Set();
                        node.empIds[month].add(id);
                    }
                  };

                  addStats(tree); 

                  let currentNode = tree;
                  let currentId = 'root';

                  presetKeys.forEach((key, idx) => {
                    let val = row[key];
                    if (!val && key === 'Department name') val = row['Department'] || row['Descr_1'];
                    if (!val && key === 'Acct. Description') val = row['Account'] || row['__EMPTY'] || row['Descr'];
                    if (!val && key === 'Posn Desc') val = row['Position'];
                    if (!val && key === 'Account #') val = row['Account Number'] || row['AccountNum'];
                    if (key === 'Mapped Faculty') val = getFacultyFromOrg(getOrgValue(row));
                    
                    val = String(val || `Unknown ${key}`).trim();
                    currentId = `${currentId}|${val}`;
                    
                    if (!currentNode.children[val]) {
                      currentNode.children[val] = { id: currentId, name: val, level: idx + 1, children: {}, amounts: {}, empIds: {} };
                    }
                    currentNode = currentNode.children[val];
                    addStats(currentNode);
                  });
              });

              setDataModel({ tree, actualMonths, forecastMonths, baseMonth });
              if (!dashboardMonth || dashboardMonth < (assumptions.startMonthFilter||'')) {
                  setDashboardMonth(baseMonth);
              }
              setExpandedRows(new Set(['root']));
              setIsProcessing(false);
            }, 50);

          }, [rawData, assumptions, hierarchyIndex]);

          const toggleRow = (id) => {
            setExpandedRows(prev => {
              const next = new Set(prev);
              if (next.has(id)) next.delete(id);
              else next.add(id);
              return next;
            });
          };

          const collapseAll = () => setExpandedRows(new Set(['root']));

          useEffect(() => {
              setWaterfallBaseIndex(-1);
              setWaterfallCompareIndex(-1);
          }, [timeGrouping, dataModel]);

          // Calculate Display Periods based on August-July Financial Year and YTD
          const displayPeriods = useMemo(() => {
            if (!dataModel) return [];
            const allMonths = [...dataModel.actualMonths, ...dataModel.forecastMonths];
            
            if (timeGrouping === 'ytd') {
                return allMonths.map(targetMonth => {
                    const [dYearStr, dMonthStr] = targetMonth.split('-');
                    const dYear = parseInt(dYearStr, 10);
                    const dMonth = parseInt(dMonthStr, 10);
                    const fyStartYear = dMonth >= 8 ? dYear : dYear - 1;

                    const ytdMonths = allMonths.filter(m => {
                        const [yStr, mmStr] = m.split('-');
                        const y = parseInt(yStr, 10);
                        const mm = parseInt(mmStr, 10);
                        const mFyStartYear = mm >= 8 ? y : y - 1;
                        return mFyStartYear === fyStartYear && m <= targetMonth;
                    });

                    const hasActual = ytdMonths.some(m => dataModel.actualMonths.includes(m));
                    const hasForecast = ytdMonths.some(m => dataModel.forecastMonths.includes(m));
                    let type = 'actual';
                    if (hasActual && hasForecast) type = 'mixed';
                    else if (hasForecast) type = 'forecast';

                    return {
                        key: `YTD-${targetMonth}`,
                        label: `YTD (${formatMonthLabel(targetMonth)})`,
                        months: ytdMonths,
                        type,
                        containsBaseMonth: ytdMonths.includes(dataModel.baseMonth)
                    };
                });
            }

            const groups = {};

            allMonths.forEach(m => {
              const [y_str, mm_str] = m.split('-');
              const y = parseInt(y_str, 10);
              const mm = parseInt(mm_str, 10);
              
              let fyStartYear = mm >= 8 ? y : y - 1;
              let fyEndYear = fyStartYear + 1;
              let fyLabel = `FY ${fyStartYear}/${fyEndYear.toString().slice(2)}`;

              let key, label;
              
              if (timeGrouping === 'annual') {
                key = `FY-${fyStartYear}`; 
                label = fyLabel;
              } else if (timeGrouping === 'quarter') {
                let q;
                if (mm >= 8 && mm <= 10) q = 1;
                else if (mm === 11 || mm === 12 || mm === 1) q = 2;
                else if (mm >= 2 && mm <= 4) q = 3;
                else q = 4;
                
                key = `FY-${fyStartYear}-Q${q}`; 
                label = `Q${q} ${fyStartYear}/${fyEndYear.toString().slice(2)}`;
              } else {
                key = m; 
                label = formatMonthLabel(m);
              }

              if (!groups[key]) groups[key] = { key, label, months: [], type: 'actual', containsBaseMonth: false };
              groups[key].months.push(m);
              if (m === dataModel.baseMonth) groups[key].containsBaseMonth = true;
            });

            return Object.values(groups).sort((a,b) => a.key.localeCompare(b.key)).map(g => {
              const hasActual = g.months.some(m => dataModel.actualMonths.includes(m));
              const hasForecast = g.months.some(m => dataModel.forecastMonths.includes(m));
              
              if (hasActual && hasForecast) g.type = 'mixed';
              else if (hasForecast) g.type = 'forecast';
              else g.type = 'actual';
              
              return g;
            });
          }, [dataModel, timeGrouping, dashboardMonth]);

          const getMetricValue = useCallback((node, period) => {
            if (metric === 'amount') {
              return period.months.reduce((sum, m) => sum + (node.amounts[m] || 0), 0);
            }
            if (metric === 'headcount') {
              const combinedSet = new Set();
              period.months.forEach(m => {
                if (node.empIds[m]) node.empIds[m].forEach(id => combinedSet.add(id));
              });
              return combinedSet.size;
            }
            return 0;
          }, [metric]);
          
          const getRowTotal = useCallback((node) => {
            if (metric === 'amount') {
              if (viewMode === 'variance') {
                let sum = 0;
                displayPeriods.forEach((p, i) => {
                  if (i > 0) {
                     const curr = getMetricValue(node, p);
                     const prev = getMetricValue(node, displayPeriods[i-1]);
                     sum += (curr - prev);
                  }
                });
                return sum;
              } else {
                return displayPeriods.reduce((sum, p) => sum + getMetricValue(node, p), 0);
              }
            } else {
              if (viewMode === 'variance') {
                let sum = 0;
                displayPeriods.forEach((p, i) => {
                  if (i > 0) {
                     const curr = getMetricValue(node, p);
                     const prev = getMetricValue(node, displayPeriods[i-1]);
                     sum += (curr - prev);
                  }
                });
                return sum;
              } else {
                const combined = new Set();
                displayPeriods.forEach(p => {
                    p.months.forEach(m => {
                        if (node.empIds[m]) node.empIds[m].forEach(id => combined.add(id));
                    });
                });
                return combined.size;
              }
            }
          }, [metric, viewMode, displayPeriods, getMetricValue]);

          const renderValueCell = useCallback((node, period, prevPeriod) => {
            const isVariance = viewMode === 'variance';
            
            if (isVariance) {
              if (!prevPeriod) return <td key={period.key} className="px-3 py-2 text-right text-gray-400">-</td>;
              const currentVal = getMetricValue(node, period);
              const prevVal = getMetricValue(node, prevPeriod);
              const diff = currentVal - prevVal;
              
              let colorClass = "text-gray-700";
              if (diff > 0) colorClass = "text-red-600 font-medium"; 
              if (diff < 0) colorClass = "text-green-600 font-medium";
              if (metric === 'amount' && Math.abs(diff) < 0.01) colorClass = "text-gray-400";
              if (metric === 'headcount' && diff === 0) colorClass = "text-gray-400";

              const formattedDiff = metric === 'amount' ? formatCurrency(diff) : formatCount(diff);
              const displayDiff = diff > 0 ? `+${formattedDiff}` : formattedDiff;

              return (
                <td key={period.key} className={`px-3 py-2 text-right ${colorClass} ${period.type === 'forecast' ? 'bg-indigo-50/30' : ''}`}>
                  {displayDiff}
                </td>
              );
            }

            const val = getMetricValue(node, period);
            return (
              <td key={period.key} className={`px-3 py-2 text-right text-gray-800 ${period.type === 'forecast' ? 'bg-indigo-50/50' : ''}`}>
                {metric === 'amount' ? formatCurrency(val) : formatCount(val)}
              </td>
            );
          }, [metric, viewMode, getMetricValue]);

          const flatRows = useMemo(() => {
            if (!dataModel) return [];
            const rows = [];
            const flatten = (node) => {
              rows.push(node);
              const hasChildrenToRender = node.children && Object.keys(node.children).length > 0;
              if (hasChildrenToRender && expandedRows.has(node.id)) {
                Object.values(node.children)
                  .sort((a, b) => String(a.name).localeCompare(String(b.name)))
                  .forEach(flatten);
              }
            };
            flatten(dataModel.tree);
            return rows;
          }, [dataModel, expandedRows]);

          // Dashboard Summary Metrics with YTD Logic
          const dashboardStats = useMemo(() => {
            if (!dataModel || !dashboardMonth) return null;
            const allMonths = [...dataModel.actualMonths, ...dataModel.forecastMonths];
            const mIdx = allMonths.indexOf(dashboardMonth);
            const prevMonth = mIdx > 0 ? allMonths[mIdx - 1] : null;

            const root = dataModel.tree;
            const currentAmt = root.amounts[dashboardMonth] || 0;
            const prevAmt = prevMonth ? (root.amounts[prevMonth] || 0) : 0;
            const currentHC = root.empIds[dashboardMonth] ? root.empIds[dashboardMonth].size : 0;
            const prevHC = prevMonth && root.empIds[prevMonth] ? root.empIds[prevMonth].size : 0;

            const [dYearStr, dMonthStr] = dashboardMonth.split('-');
            const dYear = parseInt(dYearStr, 10);
            const dMonth = parseInt(dMonthStr, 10);
            const fyStartYear = dMonth >= 8 ? dYear : dYear - 1;

            let ytdAmt = 0;
            const ytdIds = new Set();

            for (let i = 0; i <= mIdx; i++) {
                const m = allMonths[i];
                const [yStr, mmStr] = m.split('-');
                const y = parseInt(yStr, 10);
                const mm = parseInt(mmStr, 10);
                const mFyStartYear = mm >= 8 ? y : y - 1;

                if (mFyStartYear === fyStartYear && m <= dashboardMonth) {
                    ytdAmt += (root.amounts[m] || 0);
                    if (root.empIds[m]) {
                        root.empIds[m].forEach(id => ytdIds.add(id));
                    }
                }
            }

            return {
              amount: currentAmt,
              amountVar: currentAmt - prevAmt,
              ytdAmount: ytdAmt,
              hc: currentHC,
              hcVar: currentHC - prevHC,
              ytdHc: ytdIds.size,
              hasPrev: !!prevMonth,
              isForecast: dataModel.forecastMonths.includes(dashboardMonth)
            };
          }, [dataModel, dashboardMonth]);

          // --- Waterfall Chart Engine ---
          const waterfallData = useMemo(() => {
              if (displayPeriods.length < 2 || !dataModel) return null;
              
              let baseIdx = waterfallBaseIndex;
              let compIdx = waterfallCompareIndex;
              
              if (baseIdx === -1 || baseIdx >= displayPeriods.length) {
                  baseIdx = displayPeriods.length >= 2 ? displayPeriods.length - 2 : 0;
              }
              if (compIdx === -1 || compIdx >= displayPeriods.length) {
                  compIdx = displayPeriods.length - 1;
              }

              const wfBase = displayPeriods[baseIdx];
              const wfComp = displayPeriods[compIdx];

              const baseTotal = getMetricValue(dataModel.tree, wfBase);
              const compTotal = getMetricValue(dataModel.tree, wfComp);

              let deltas = [];
              Object.values(dataModel.tree.children).forEach(child => {
                  const pVal = getMetricValue(child, wfBase);
                  const cVal = getMetricValue(child, wfComp);
                  const diff = cVal - pVal;
                  if (Math.abs(diff) > 0.01) {
                      deltas.push({ name: child.name, value: diff });
                  }
              });

              deltas.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));

              if (deltas.length > 7) {
                  const top = deltas.slice(0, 7);
                  const otherVal = deltas.slice(7).reduce((sum, d) => sum + d.value, 0);
                  if (Math.abs(otherVal) > 0.01) {
                      top.push({ name: 'Other Groupings', value: otherVal });
                  }
                  deltas = top;
              }

              const steps = [];
              steps.push({ label: wfBase.label, value: baseTotal, isTotal: true, startY: 0, endY: baseTotal });

              let runningTotal = baseTotal;
              deltas.forEach(d => {
                  steps.push({
                      label: d.name,
                      value: d.value,
                      isTotal: false,
                      startY: runningTotal,
                      endY: runningTotal + d.value
                  });
                  runningTotal += d.value;
              });

              steps.push({ label: wfComp.label, value: compTotal, isTotal: true, startY: 0, endY: compTotal });
              return { steps, wfBase, wfComp };
          }, [displayPeriods, waterfallBaseIndex, waterfallCompareIndex, dataModel, getMetricValue]);

          const renderWaterfallSVG = () => {
              if (!waterfallData) {
                  return (
                      <div className="py-20 text-center text-gray-500">
                          <p className="text-lg font-semibold mb-2">Insufficient Data for Waterfall</p>
                          <p className="text-sm">The Waterfall chart requires at least two periods to compare. Ensure your filters provide multiple periods.</p>
                      </div>
                  );
              }

              const { steps } = waterfallData;
              const maxVal = Math.max(...steps.map(d => Math.max(d.startY, d.endY)));
              const minVal = Math.min(0, ...steps.map(d => Math.min(d.startY, d.endY)));

              const padding = (maxVal - minVal) * 0.1 || 10;
              const yMax = maxVal + padding;
              const yMin = minVal - padding;
              const yRange = yMax - yMin;

              const width = 1000;
              const chartHeight = 400;
              const labelSpace = 120; 

              const getY = (val) => chartHeight - ((val - yMin) / yRange) * chartHeight;
              const barWidth = width / steps.length;
              const barPadding = barWidth * 0.15;

              return (
                  <div className="w-full overflow-x-auto pb-4">
                      <div className="min-w-[800px]">
                          <svg viewBox={`0 0 ${width} ${chartHeight + labelSpace}`} className="w-full h-auto text-xs font-sans select-none">
                              {[0, 0.25, 0.5, 0.75, 1].map(pct => {
                                  const val = yMin + (yRange * pct);
                                  const y = getY(val);
                                  return (
                                      <g key={`grid-${pct}`}>
                                          <line x1={0} y1={y} x2={width} y2={y} stroke="#e5e7eb" strokeDasharray="4 4" />
                                          <text x={0} y={y - 4} fill="#9ca3af" fontSize="10">{metric === 'amount' ? formatCurrency(val) : formatCount(val)}</text>
                                      </g>
                                  )
                              })}

                              {yMin < 0 && yMax > 0 && <line x1={0} y1={getY(0)} x2={width} y2={getY(0)} stroke="#6b7280" strokeWidth="1" />}

                              {steps.map((d, i) => {
                                  const x = i * barWidth + barPadding / 2;
                                  const w = barWidth - barPadding;
                                  const y = Math.min(getY(d.startY), getY(d.endY));
                                  const h = Math.max(2, Math.abs(getY(d.startY) - getY(d.endY)));

                                  let color = d.isTotal ? "#1e3a8a" : (d.value > 0 ? "#dc2626" : "#16a34a");

                                  let connector = null;
                                  if (i > 0) {
                                      const prevY = getY(steps[i-1].endY);
                                      connector = <line x1={x - barPadding} y1={prevY} x2={x} y2={prevY} stroke="#9ca3af" strokeDasharray="3 3" strokeWidth="1" />;
                                  }

                                  const displayVal = metric === 'amount' ? formatCurrency(d.value) : formatCount(d.value);
                                  const labelStr = d.value > 0 && !d.isTotal ? '+' + displayVal : displayVal;
                                  
                                  const shortLabel = d.label.length > 25 ? d.label.substring(0, 23) + '...' : d.label;

                                  return (
                                      <g key={i} className="group cursor-default">
                                          <title>{d.label}&#10;{d.isTotal ? 'Balance' : 'Variance'}: {displayVal}</title>
                                          {connector}
                                          <rect x={x} y={y} width={w} height={h} fill={color} rx="2" className="transition-opacity group-hover:opacity-80" />
                                          
                                          <text x={x + w/2} y={d.value >= 0 ? y - 8 : y + h + 16} textAnchor="middle" fill={color} fontWeight="bold" fontSize="11">
                                              {labelStr}
                                          </text>
                                          
                                          <text 
                                            x={x + w/2} 
                                            y={chartHeight + 15} 
                                            textAnchor="end" 
                                            fill="#4b5563" 
                                            fontSize="11" 
                                            fontWeight={d.isTotal ? "bold" : "normal"}
                                            transform={`rotate(-35, ${x + w/2}, ${chartHeight + 15})`}
                                          >
                                              {shortLabel}
                                          </text>
                                      </g>
                                  )
                              })}
                          </svg>
                      </div>
                  </div>
              )
          };

          // --- Export to Excel Function ---
          const exportToExcel = async () => {
            if (!dataModel) return;
            setIsProcessing(true);
            try {
              const XLSX = await loadExcelParser();
              const aoa = [];
              
              const headerRow = [HIERARCHY_PRESETS[hierarchyIndex].label];
              displayPeriods.forEach((period, idx) => {
                const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                if (viewMode === 'variance' && prevPeriod) {
                  headerRow.push(`${period.label} vs ${prevPeriod.label}`);
                } else if (viewMode !== 'variance') {
                  let suffix = '';
                  if (period.containsBaseMonth) suffix = ' (Base)';
                  else if (period.type === 'forecast') suffix = ' (FCST)';
                  else if (period.type === 'mixed') suffix = ' (Act+Fcst)';
                  headerRow.push(`${period.label}${suffix}`);
                }
              });
              headerRow.push("Total"); 
              aoa.push(headerRow);

              flatRows.forEach(node => {
                const indent = "   ".repeat(node.level);
                const row = [String(indent + node.name)]; 
                
                displayPeriods.forEach((period, idx) => {
                  const prevPeriod = idx > 0 ? displayPeriods[idx - 1] : null;
                  if (viewMode === 'variance') {
                    if (!prevPeriod) {
                      row.push('-');
                    } else {
                      const currentVal = getMetricValue(node, period);
                      const prevVal = getMetricValue(node, prevPeriod);
                      row.push(currentVal - prevVal); 
                    }
                  } else {
                    row.push(getMetricValue(node, period)); 
                  }
                });
                row.push(getRowTotal(node)); 
                aoa.push(row);
              });

              const ws = XLSX.utils.aoa_to_sheet(aoa);
              const wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, "Report View");
              
              const fileName = `UWI_Report_${timeGrouping}_${viewMode}.xlsx`;
              XLSX.writeFile(wb, fileName);
            } catch (err) {
              console.error(err);
              alert("Failed to export to Excel.");
            }
            setIsProcessing(false);
          };
          
          const handleIncrementUpload = (e) => {
              const file = e.target.files[0];
              if (!file || !incMonth) return; 

              processFile(file, async (parsed) => {
                  if (parsed.length === 0) {
                      alert("File is empty.");
                      if (incInputRef.current) incInputRef.current.value = null;
                      return;
                  }
                  
                  const newIncrements = parsed.map(r => {
                      let id = '', amount = 0;
                      for (const [key, value] of Object.entries(r)) {
                          const cleanKey = String(key).toLowerCase().trim();
                          if (cleanKey === 'id' || cleanKey === 'id number' || cleanKey === 'employee id') id = String(value).trim();
                          if (cleanKey === 'amount' || cleanKey === 'value' || cleanKey === 'increment') amount = parseAmount(value);
                      }
                      return {
                          id,
                          amount,
                          startMonth: incMonth,
                          uid: Date.now() + Math.random()
                      };
                  }).filter(r => r.id && r.amount !== 0 && r.id !== 'undefined');

                  if (newIncrements.length === 0) {
                      alert("Could not find valid 'ID' and 'Amount' columns in the file. Please check the file format.");
                      if (incInputRef.current) incInputRef.current.value = null;
                      return;
                  }

                  saveAssumptionsState({ ...assumptions, increments: [...(assumptions.increments||[]), ...newIncrements] });
                  if (incInputRef.current) incInputRef.current.value = null;
                  alert(`Successfully added ${newIncrements.length} increments starting ${formatMonthLabel(incMonth)}.`);
              });
          };

          if (!dataModel) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 font-sans">
                <div className="max-w-xl w-full bg-white rounded-xl shadow-lg p-10 text-center relative">
                  
                  {isProcessing ? (
                     <div className="py-12">
                       <svg className="animate-spin h-12 w-12 text-blue-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                       <h2 className="text-xl font-semibold text-gray-700">Loading Data Engine...</h2>
                     </div>
                  ) : (
                    <>
                      <img src={logoSrc} alt="UWI Logo" className="h-20 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display='none'} />
                      <h1 className="text-3xl font-bold text-blue-900 mb-2">UWI Payroll Analytics</h1>
                      <p className="text-gray-500 mb-8">Upload your raw transactional data (.csv, .xlsx, or .zip) to generate hierarchical reports, variance analyses, and projections.</p>
                      
                      <label className="block w-full border-2 border-dashed border-gray-300 rounded-xl p-10 cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-colors">
                        <UploadIcon />
                        <span className="text-blue-600 font-medium text-lg">Click to select Raw Data File</span>
                        <p className="text-xs text-gray-400 mt-2 font-semibold">Supports .CSV, .XLSX, and .ZIP</p>
                        <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, application/zip, application/x-zip-compressed" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />
                      </label>
                    </>
                  )}

                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-sm flex flex-col">
              {/* ASSUMPTIONS MODAL */}
              {showAssumptions && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                      <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                          <div className="flex justify-between items-center p-5 border-b border-gray-200 bg-gray-50 rounded-t-xl">
                              <div>
                                  <h2 className="text-xl font-bold text-gray-800">Forecast Assumptions & Filters</h2>
                                  <p className="text-xs text-gray-500 mt-1">Rules applied automatically to future forecasts and historical filters.</p>
                              </div>
                              <button onClick={()=>setShowAssumptions(false)} className="text-gray-400 hover:text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-full p-2 transition-colors">
                                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                              </button>
                          </div>
                          
                          <div className="flex px-6 pt-4 border-b border-gray-200">
                              <button onClick={()=>setActiveAssumptionTab('union')} className={`pb-3 px-4 font-semibold text-sm transition-colors border-b-2 ${activeAssumptionTab==='union'?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-800'}`}>Union Increases</button>
                              <button onClick={()=>setActiveAssumptionTab('increments')} className={`pb-3 px-4 font-semibold text-sm transition-colors border-b-2 ${activeAssumptionTab==='increments'?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-800'}`}>Flat Increments</button>
                              <button onClick={()=>setActiveAssumptionTab('active')} className={`pb-3 px-4 font-semibold text-sm transition-colors border-b-2 ${activeAssumptionTab==='active'?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-800'}`}>Active Rules</button>
                              <button onClick={()=>setActiveAssumptionTab('filters')} className={`pb-3 px-4 font-semibold text-sm transition-colors border-b-2 ${activeAssumptionTab==='filters'?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-800'}`}>Data Filters</button>
                          </div>
                          
                          <div className="p-6 overflow-y-auto flex-grow">
                              {activeAssumptionTab === 'union' && (
                                  <div className="space-y-4">
                                      <p className="text-gray-600 mb-4">Apply a flat percentage increase to a specific Union Group starting in a specific month.</p>
                                      <div>
                                          <label className="block text-xs font-bold text-gray-700 mb-1">Target Union Group</label>
                                          <select value={unionGroup} onChange={e=>setUnionGroup(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50">
                                              <option value="">-- Select Group --</option>
                                              {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                          </select>
                                      </div>
                                      <div className="flex gap-4">
                                          <div className="flex-1">
                                              <label className="block text-xs font-bold text-gray-700 mb-1">Percentage Increase (%)</label>
                                              <input type="number" placeholder="e.g. 5" value={unionPct} onChange={e=>setUnionPct(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50" />
                                          </div>
                                          <div className="flex-1">
                                              <label className="block text-xs font-bold text-gray-700 mb-1">Start Month</label>
                                              <select value={unionMonth} onChange={e=>setUnionMonth(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50">
                                                  <option value="">-- Select Month --</option>
                                                  {forecastMonthsList.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
                                              </select>
                                          </div>
                                      </div>
                                      <button onClick={() => {
                                          if(!unionGroup || !unionPct || !unionMonth) return alert("Please fill all fields.");
                                          const newRule = { group: unionGroup, percentage: parseFloat(unionPct), startMonth: unionMonth, id: Date.now() };
                                          saveAssumptionsState({ ...assumptions, union: [...(assumptions.union||[]), newRule] });
                                          setUnionPct('');
                                      }} className="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full transition-colors">Apply Union Increase</button>
                                  </div>
                              )}

                              {activeAssumptionTab === 'increments' && (
                                  <div className="space-y-4">
                                      <p className="text-gray-600 mb-4">Upload a CSV/Excel file containing exactly two columns: <b>ID</b> and <b>Amount</b>. The engine will map these flat monthly increments to the correct employees.</p>
                                      <div>
                                          <label className="block text-xs font-bold text-gray-700 mb-1">Start Month (Applies to all rows in file)</label>
                                          <select value={incMonth} onChange={e=>setIncMonth(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50 mb-4">
                                              <option value="">-- Select Month --</option>
                                              {forecastMonthsList.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
                                          </select>
                                      </div>
                                      <label className={`block w-full border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-400 transition-colors`}>
                                        <ExcelIcon />
                                        <span className="text-indigo-600 font-medium text-sm ml-2">Click to select Increments File</span>
                                        <input 
                                            type="file" 
                                            accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" 
                                            className="hidden" 
                                            onClick={(e) => {
                                                if (!incMonth) {
                                                    e.preventDefault();
                                                    alert("Please select a Start Month from the dropdown above before selecting your file.");
                                                }
                                            }}
                                            onChange={handleIncrementUpload} 
                                            ref={incInputRef} 
                                        />
                                      </label>
                                  </div>
                              )}

                              {activeAssumptionTab === 'active' && (
                                  <div>
                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2">Union Increases</h3>
                                    {(!assumptions.union || assumptions.union.length === 0) ? <p className="text-gray-400 italic text-xs mb-6">None active</p> : (
                                        <ul className="mb-6 space-y-2">
                                            {assumptions.union.map(u => (
                                                <li key={u.id} className="flex justify-between items-center bg-gray-50 p-2 rounded border border-gray-200">
                                                    <span><b>{u.group}</b> gets <b>+{u.percentage}%</b> starting <b>{formatMonthLabel(u.startMonth)}</b></span>
                                                    <button onClick={() => saveAssumptionsState({...assumptions, union: assumptions.union.filter(x=>x.id!==u.id)})} className="text-red-500 hover:text-red-700 p-1"><TrashIcon/></button>
                                                </li>
                                            ))}
                                        </ul>
                                    )}

                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2 mt-4">Flat Increments</h3>
                                    {(!assumptions.increments || assumptions.increments.length === 0) ? <p className="text-gray-400 italic text-xs mb-6">None active</p> : (
                                        <div className="flex justify-between items-center bg-indigo-50 p-3 rounded border border-indigo-200">
                                            <span><b>{assumptions.increments.length}</b> employee flat increments active.</span>
                                            <button onClick={() => { if(window.confirm('Delete ALL flat increments?')) saveAssumptionsState({...assumptions, increments: []}) }} className="text-xs bg-red-100 text-red-700 px-3 py-1 rounded font-bold hover:bg-red-200">Clear All Increments</button>
                                        </div>
                                    )}

                                    <h3 className="font-bold text-gray-800 border-b pb-2 mb-2 mt-6">Legacy Adjustments (One-Offs)</h3>
                                    {(!assumptions.oneOffs || assumptions.oneOffs.length === 0) ? <p className="text-gray-400 italic text-xs mb-2">None active</p> : (
                                        <div className="flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-200">
                                            <span><b>{assumptions.oneOffs.length}</b> legacy adjustments active.</span>
                                            <button onClick={() => { if(window.confirm('Delete ALL legacy adjustments?')) saveAssumptionsState({...assumptions, oneOffs: []}) }} className="text-xs bg-red-100 text-red-700 px-3 py-1 rounded font-bold hover:bg-red-200">Clear Old Adjustments</button>
                                        </div>
                                    )}
                                  </div>
                              )}

                              {activeAssumptionTab === 'filters' && (
                                  <div className="space-y-4">
                                      <p className="text-gray-600 mb-4">Crop out unwanted historical data (e.g., if a July payroll row is bleeding into your August report).</p>
                                      <div>
                                          <label className="block text-xs font-bold text-gray-700 mb-1">Start Dashboard From:</label>
                                          <select 
                                              value={assumptions.startMonthFilter || ''} 
                                              onChange={e => saveAssumptionsState({...assumptions, startMonthFilter: e.target.value})} 
                                              className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50"
                                          >
                                              <option value="">-- Show All Uploaded Data --</option>
                                              {rawMonthsList.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
                                          </select>
                                      </div>
                                      <div className="bg-blue-50 p-4 rounded border border-blue-100 mt-4">
                                          <p className="text-xs text-blue-800"><b>Pro Tip:</b> If your Excel file contains late adjustments from previous months (like retro-pay recorded on July 31st), setting this to <b>August 2025</b> will force the dashboard to completely ignore those July rows.</p>
                                      </div>
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
              )}

              <div className="bg-white rounded-t-xl shadow-sm border-b border-gray-200 p-6 flex flex-col xl:flex-row xl:items-end justify-between gap-6 relative">
                
                <div className="absolute top-4 right-6 flex items-center gap-4">
                  <button 
                    onClick={() => setShowAssumptions(true)} 
                    className="text-xs text-indigo-600 hover:text-indigo-800 font-bold flex items-center bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-200 shadow-sm transition-colors hover:bg-indigo-100"
                  >
                    <SettingsIcon />
                    Assumptions Engine
                  </button>
                  <button 
                    onClick={handleClearData} 
                    className="text-xs text-red-600 hover:text-red-800 hover:underline font-medium ml-2"
                  >
                    Clear DB
                  </button>
                </div>

                <div className="flex items-center gap-4 mt-6 xl:mt-0">
                  <img src={logoSrc} alt="UWI Logo" className="h-16 w-auto object-contain hidden sm:block" onError={(e) => e.target.style.display='none'} />
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-3">
                       UWI Cost & Headcount Report
                    </h1>
                    <p className="text-gray-500 mt-1 flex items-center">
                      {dataModel ? `Actuals through ${formatMonthLabel(dataModel.baseMonth)} • Projected through Jul-27` : 'Processing Data...'}
                      {((assumptions.union?.length||0) + (assumptions.increments?.length||0) > 0 || assumptions.startMonthFilter) && (
                         <span className="ml-3 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-indigo-100 text-indigo-800">
                            Custom Rules Active
                         </span>
                      )}
                    </p>
                  </div>
                </div>

                <div className="flex flex-wrap items-center gap-4 mt-2 xl:mt-0">
                  
                  <label className="bg-blue-50 border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-md font-medium text-xs shadow-sm cursor-pointer transition-colors flex items-center gap-1">
                     <ExcelIcon />
                     Append Raw Data
                     <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, application/zip, application/x-zip-compressed" className="hidden" onChange={handleFileUpload} ref={fileInputRef} />
                  </label>

                  <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 p-1 rounded-lg">
                     <div className="relative">
                        <select 
                          className="appearance-none bg-white border border-gray-300 text-gray-700 py-1.5 pl-3 pr-8 rounded text-xs font-medium shadow-sm outline-none focus:border-blue-500"
                          value={hierarchyIndex} 
                          onChange={(e) => setHierarchyIndex(parseInt(e.target.value, 10))}
                          disabled={isProcessing}
                        >
                          {HIERARCHY_PRESETS.map((preset, idx) => (
                            <option key={idx} value={idx}>Hierarchy: {preset.label}</option>
                          ))}
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                          <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                     </div>

                     <div className="relative">
                        <select 
                          className="appearance-none bg-white border border-gray-300 text-gray-700 py-1.5 pl-3 pr-8 rounded text-xs font-medium shadow-sm outline-none focus:border-blue-500"
                          value={timeGrouping} 
                          onChange={(e) => setTimeGrouping(e.target.value)}
                          disabled={isProcessing}
                        >
                          <option value="month">Group: Monthly</option>
                          <option value="quarter">Group: Quarterly (FY)</option>
                          <option value="annual">Group: Annually (FY)</option>
                          <option value="ytd">Group: YTD (Syncs w/ Dashboard)</option>
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                          <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                     </div>
                  </div>

                  <div className="bg-gray-100 p-1 rounded-lg inline-flex">
                    <button 
                      onClick={() => setMetric('amount')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'amount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      $ Dollar Value
                    </button>
                    <button 
                      onClick={() => setMetric('headcount')}
                      disabled={isProcessing}
                      className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${metric === 'headcount' ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:text-gray-900'}`}
                    >
                      Headcount
                    </button>
                  </div>

                  {activeTab === 'table' && (
                      <div className="bg-gray-100 p-1 rounded-lg inline-flex">
                        <button 
                          onClick={() => setViewMode('actuals')}
                          disabled={isProcessing}
                          className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${viewMode === 'actuals' ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                          Actuals/FCST
                        </button>
                        <button 
                          onClick={() => setViewMode('variance')}
                          disabled={isProcessing}
                          className={`px-3 py-1.5 rounded-md font-medium text-xs transition-colors ${viewMode === 'variance' ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                          Variance Mode
                        </button>
                      </div>
                  )}

                  {activeTab === 'table' && (
                      <button 
                        onClick={collapseAll}
                        disabled={isProcessing}
                        className="px-3 py-1.5 border border-gray-300 rounded-md bg-white hover:bg-gray-50 font-medium text-gray-700 text-xs shadow-sm"
                      >
                        Collapse All
                      </button>
                  )}

                  {activeTab === 'table' && (
                      <button 
                        onClick={exportToExcel}
                        disabled={isProcessing || !dataModel}
                        className="px-3 py-1.5 border border-emerald-600 text-emerald-700 hover:bg-emerald-50 rounded-md bg-white font-medium text-xs shadow-sm flex items-center gap-1 transition-colors"
                      >
                        <ExcelIcon />
                        Export to Excel
                      </button>
                  )}
                </div>
              </div>
              
              {/* --- Dashboard Summary Section --- */}
              {dashboardStats && (
                <div className="bg-white shadow-sm border-x border-gray-200 p-6 flex flex-col md:flex-row gap-6 items-center justify-between">
                  <div className="flex flex-col items-start min-w-[200px]">
                    <span className="text-xs font-semibold tracking-wider text-gray-400 uppercase mb-1">Executive Summary</span>
                    <div className="relative w-full">
                      <select 
                        className="appearance-none bg-gray-50 border border-gray-300 text-gray-900 py-2 pl-3 pr-8 rounded-lg text-sm font-bold shadow-sm outline-none focus:border-blue-500 w-full"
                        value={dashboardMonth} 
                        onChange={(e) => setDashboardMonth(e.target.value)}
                      >
                        {[...dataModel.actualMonths, ...dataModel.forecastMonths].map(m => (
                          <option key={m} value={m}>
                            {formatMonthLabel(m)} {m === dataModel.baseMonth ? '(Base)' : dataModel.forecastMonths.includes(m) ? '(Forecast)' : '(Actual)'}
                          </option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                        <ChevronDown />
                      </div>
                    </div>
                    <span className="text-[10px] text-gray-400 mt-1">* Drives the YTD columns & cards</span>
                  </div>

                  <div className="flex-1 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4">
                    {/* Amount Card */}
                    <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-blue-600 mb-1 truncate">Monthly Cost</p>
                      <p className="text-xl font-bold text-gray-900 truncate" title={formatCurrency(dashboardStats.amount)}>{formatCurrency(dashboardStats.amount)}</p>
                    </div>
                    {/* Amount Variance Card */}
                    <div className={`border rounded-xl p-3 ${dashboardStats.amountVar > 0 ? 'bg-red-50/50 border-red-100' : dashboardStats.amountVar < 0 ? 'bg-green-50/50 border-green-100' : 'bg-gray-50 border-gray-100'}`}>
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1 truncate">MoM Cost Var.</p>
                      <div className="flex items-center">
                        {dashboardStats.hasPrev ? (
                          <>
                            {dashboardStats.amountVar > 0 ? <span className="text-red-600"><TrendingUp /></span> : dashboardStats.amountVar < 0 ? <span className="text-green-600"><TrendingDown /></span> : null}
                            <p className={`text-lg font-bold truncate ${dashboardStats.amountVar > 0 ? 'text-red-700' : dashboardStats.amountVar < 0 ? 'text-green-700' : 'text-gray-700'}`} title={formatCurrency(dashboardStats.amountVar)}>
                              {dashboardStats.amountVar > 0 ? '+' : ''}{formatCurrency(dashboardStats.amountVar)}
                            </p>
                          </>
                        ) : <p className="text-lg font-bold text-gray-400">-</p>}
                      </div>
                    </div>
                    {/* YTD Amount Card */}
                    <div className="bg-sky-50/50 border border-sky-200 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-sky-700 mb-1 truncate">YTD Cost</p>
                      <p className="text-xl font-bold text-gray-900 truncate" title={formatCurrency(dashboardStats.ytdAmount)}>{formatCurrency(dashboardStats.ytdAmount)}</p>
                    </div>

                    {/* Headcount Card */}
                    <div className="bg-indigo-50/50 border border-indigo-100 rounded-xl p-3">
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-indigo-600 mb-1 truncate">Monthly HC</p>
                      <p className="text-xl font-bold text-gray-900 truncate">{formatCount(dashboardStats.hc)} <span className="text-[10px] font-normal text-gray-500 uppercase tracking-wide ml-0.5">IDs</span></p>
                    </div>
                    {/* Headcount Variance Card */}
                    <div className={`border rounded-xl p-3 ${dashboardStats.hcVar > 0 ? 'bg-red-50/50 border-red-100' : dashboardStats.hcVar < 0 ? 'bg-green-50/50 border-green-100' : 'bg-gray-50 border-gray-100'}`}>
                      <p className="text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1 truncate">MoM HC Var.</p>
                      <div className="flex items-center">
