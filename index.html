                    </button>
                  </div>
                </div>
              );
            }
            return this.props.children;
          }

        function ToastProvider({ children }) {
          const [toasts, setToasts] = useState([]);

            const id = Date.now();
            setToasts(prev => [...prev, { id, message, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
          }, []);
          const colors = { info: 'bg-blue-600', success: 'bg-green-600', error: 'bg-red-600', warn: 'bg-amber-500' };
          return (
            <ToastContext.Provider value={addToast}>
              {children}

                  </div>

        // --- Payroll Data ---
        async function loadPayrollFromDB() {
          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/rpc/get_payroll_by_month`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey':        SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
              },
              body: '{}',
            }
          );

          if (!res.ok) {
            const err = await res.text();
            console.error('loadPayroll RPC error:', res.status, err);
            throw new Error(`Failed to load payroll data (${res.status}): ${err}`);
          }

          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) {
            console.warn('loadPayroll: no data returned');
            return null;
          }

          const rows = [];
          data.forEach(monthRow => {
            const month = monthRow.calendar_month;
            const employees = Array.isArray(monthRow.employees) ? monthRow.employees : [];
            employees.forEach(e => {
              rows.push({
                'Pay Period End':    month,
                'ID':                e.id,
                'Name':              e.name,
                'Amount':            e.amt != null ? parseFloat(e.amt) : 0,
                'Group':             e.grp,
                'Org. #':            e.org,
                'Acct. Description': e.acc,
                'Posn Desc':         e.pos,
                'Department name':   e.dep,
                'Sal Plan':          e.sal,
              });
            });
          });
          console.log(`✓ Loaded ${rows.length} employee-month rows across ${data.length} months`);
          return rows;
        }

        // Parse UWI pay period date: format is DD/MM/YYYY (e.g. "1/8/2025" = 1st Aug 2025)
        // Returns YYYY-MM string
        function fiscalPeriodToCalendarMonth(rawVal) {
          if (!rawVal) return null;
          const str = String(rawVal).trim();

          // Handle DD/MM/YYYY or D/M/YYYY (UWI source format)
          const slashParts = str.split('/');
          if (slashParts.length === 3) {
            const day  = parseInt(slashParts[0], 10);
            const mon  = parseInt(slashParts[1], 10);
            const year = parseInt(slashParts[2], 10);
            if (!isNaN(day) && !isNaN(mon) && !isNaN(year) && mon >= 1 && mon <= 12 && year > 2000) {
              return `${year}-${String(mon).padStart(2, '0')}`;
            }
          }

          // Handle Excel serial number
          if (typeof rawVal === 'number' || (!isNaN(rawVal) && !str.includes('/') && !str.includes('-'))) {
            const serial = parseFloat(rawVal);
            const d = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
          }

          // Handle YYYY-MM-DD (already stored ISO)
          if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            // Was stored as YYYY-01-MM (Postgres misread DD/MM/YYYY as MM/DD/YYYY)
            // So actual month = DAY part, actual year = YEAR part
            const parts = str.split('-');
            return `${parts[0]}-${parts[2]}`;
          }

          // Fall back to standard parser
          return parseDateStrToMonthKey(rawVal);
        }

        async function savePayrollToDB(parsedRows, filename) {
          const records = parsedRows.map(row => {
            const orgKey = Object.keys(row).find(k => {
              const c = String(k).replace(/\s+/g, '').toLowerCase();
              return c === 'org.#' || c === 'org#' || c === 'org' || c === 'orgnum';
            });
            // Store actual pay period end date from source
            const rawDate = row['Pay Period End'];
            let payDate = null;
            if (rawDate) {
              if (typeof rawDate === 'number') {
                const d = new Date(Date.UTC(1970, 0, Math.round(rawDate) - 25569 + 1));
                payDate = d.toISOString().split('T')[0];
              } else {
                const d = new Date(rawDate);
                if (!isNaN(d.getTime())) {
                  payDate = d.toISOString().split('T')[0];
                } else {
                  const mk = parseDateStrToMonthKey(rawDate);
                  payDate = mk ? `${mk}-01` : null;
                }
              }
            }
            return {
              pay_period_end:  payDate,
              // Derive calendar_month from the resolved payDate — reliable regardless of source format
              // DB trigger also handles this as a safety net
              calendar_month:  payDate ? payDate.substring(0, 7) : null,
              employee_id:     String(row['ID'] || '').trim() || null,
              employee_name:   String(row['Name'] || '').trim() || null,
              amount:          parseAmount(row['Amount']),
              group_name:      String(row['Group'] || '').trim() || null,
              org_number:      orgKey ? String(row[orgKey]).trim() : null,
              account_number:  String(row['Account #'] || row['Account Number'] || '').trim() || null,
              account_desc:    String(row['Acct. Description'] || row['Account'] || '').trim() || null,
              position_desc:   String(row['Posn Desc'] || '').trim() || null,
              position_number: String(row['Position'] || '').trim() || null,
              department_name: String(row['Department name'] || row['Department'] || row['Descr_1'] || '').trim() || null,
              sal_plan:        String(row['Sal Plan'] || '').trim() || null,
              // raw_row intentionally omitted - structured columns are sufficient
            };
          });

          // Batch insert in chunks of 500
          const CHUNK = 500;
          for (let i = 0; i < records.length; i += CHUNK) {
            const chunk = records.slice(i, i + CHUNK);
            const { error } = await sb.from('payroll_data').insert(chunk);

        async function loadPositionMapFromDB() {
          // Paginate in chunks of 1000 to bypass PostgREST max_rows server cap
          const byNumber = {}, byDesc = {};
          let offset = 0;
          const PAGE = 1000;
          while (true) {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/position_mapping?select=position_number,position_desc&limit=${PAGE}&offset=${offset}`,
              { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
            );
            if (!res.ok) break;
            const page = await res.json();
            if (!Array.isArray(page) || page.length === 0) break;
            page.forEach(r => {
              byNumber[r.position_number] = r.position_desc;
              byDesc[r.position_desc]     = r.position_number;
            });
            if (page.length < PAGE) break; // last page
            offset += PAGE;
          }
          console.log(`✓ Loaded ${Object.keys(byNumber).length} positions`);
          return { byNumber, byDesc };
        }

        async function ensurePositionTableSeeded() {
          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/position_mapping?select=position_number&limit=1`,
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'count=exact' } }
          );
          if (!res.ok) { console.warn('position_mapping table not found'); return; }
          const count = res.headers.get('Content-Range');
          const total = count ? parseInt(count.split('/')[1]) : 0;
          if (total > 0) return; // already seeded
          // Seed in batches of 200
          const BATCH = 200;
          for (let i = 0; i < POSITION_SEED.length; i += BATCH) {
            const batch = POSITION_SEED.slice(i, i + BATCH).map(([pn, pd]) => ({ position_number: pn, position_desc: pd }));
            await fetch(`${SUPABASE_URL}/rest/v1/position_mapping`, {
              method: 'POST',
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
              body: JSON.stringify(batch),
            });
          }
          console.log('✓ Position mapping seeded:', POSITION_SEED.length, 'rows');
          return await loadPositionMapFromDB();
        }

        // --- Iron-Clad Date Parser ---
        function parseDateStrToMonthKey(dateStr) {
          if (!dateStr) return null;

          // Handle DD/MM/YYYY or D/M/YYYY (UWI source format e.g. "1/8/2025" = Aug 2025)
          if (typeof dateStr === 'string' && dateStr.includes('/')) {
            const parts = dateStr.trim().split('/');
            if (parts.length === 3) {
              const d = parseInt(parts[0], 10);
              const m = parseInt(parts[1], 10);
              const y = parseInt(parts[2], 10);
              if (!isNaN(d) && !isNaN(m) && !isNaN(y) && m >= 1 && m <= 12 && y > 2000) {
                return `${y}-${String(m).padStart(2, '0')}`;
              }
            }
          }

          // Handle YYYY-MM (already a month key)
          if (typeof dateStr === 'string' && /^\d{4}-\d{2}$/.test(dateStr.trim())) {
            return dateStr.trim();
          }

          let y, m;
          
          if (typeof dateStr === 'number' || (!isNaN(dateStr) && !String(dateStr).includes('/') && !String(dateStr).includes('-') && !/[a-zA-Z]/.test(String(dateStr)))) {
            const serial = parseFloat(dateStr);
            const dateObj = new Date(Date.UTC(1970, 0, Math.round(serial) - 25569 + 1));
            y = dateObj.getUTCFullYear();
            m = dateObj.getUTCMonth() + 1;
          } else {
            const str = String(dateStr).trim().toLowerCase();
            let foundMonth = false;
            
            const months = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
            for (const [mName, mNum] of Object.entries(months)) {
                if (str.includes(mName)) {
                    m = mNum;
                    foundMonth = true;
                    
                    let year4Match = str.match(/\b(20\d{2})\b/);
                    if (year4Match) {
                        y = parseInt(year4Match[1], 10);
                    } else {
                        let endYearMatch = str.match(/(?:[-/\s]|^)(\d{2})\s*$/);
                        if (endYearMatch) {
                            y = parseInt(endYearMatch[1], 10);
                        } else {
                            let allNumbers = str.match(/\b\d{2}\b/g);
                            if (allNumbers && allNumbers.length > 0) {
                                y = parseInt(allNumbers[allNumbers.length - 1], 10);
                            }
                        }
                    }
                    break;
                }
            }

            if (!foundMonth) {
                const parts = str.split(/[-/]/);
                if (parts.length >= 2) {
                    let p0 = parseInt(parts[0], 10);
                    let p1 = parseInt(parts[1], 10);
                    let p2 = parts.length === 3 ? parseInt(parts[2], 10) : null;

                    if (parts.length === 2) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[1].length === 4) { y = p1; m = p0; }
                        else { y = p1; m = p0; } 
                    } else if (parts.length === 3) {
                        if (parts[0].length === 4) { y = p0; m = p1; } 
                        else if (parts[2].length === 4 || String(p2).length === 2) { 
                            y = p2;
                            if (p0 > 12) { m = p1; } 
                            else if (p1 > 12) { m = p0; } 
                            else { m = p0; } 
                        }
                    }
                }
            }
          }

          if (y && m) {
              if (y < 100) y += 2000;
              return `${y}-${String(m).padStart(2, '0')}`;
          }

          // Handle ISO date strings (YYYY-MM-DD) directly — avoids timezone trap
          if (/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr).trim())) {
            const parts = String(dateStr).trim().split('-');
            return `${parts[0]}-${parts[1]}`;
          }

          const parsedDate = new Date(dateStr);
          if (!isNaN(parsedDate.getTime())) {
              return `${parsedDate.getFullYear()}-${String(parsedDate.getMonth() + 1).padStart(2, '0')}`;
          }
          return null;
        }

        function formatMonthLabel(monthKey) {
          if (!monthKey || typeof monthKey !== 'string') return '';
          const parts = monthKey.split('-');
          if (parts.length !== 2) return monthKey;
          const yearNum = parseInt(parts[0], 10);
          const monthNum = parseInt(parts[1], 10);
          if (isNaN(yearNum) || isNaN(monthNum)) return monthKey;
          return new Date(yearNum, monthNum - 1, 1).toLocaleString('en-US', { month: 'short', year: '2-digit' }).replace(' ', '-');
        }

        const formatCurrency = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
        const formatCount = (val) => val == null || isNaN(val) ? '-' : new Intl.NumberFormat('en-US').format(val);

        function parseAmount(val) {
          if (val == null || val === '') return 0;
          if (typeof val === 'number') return val;
          let strVal = String(val).trim();
          const isNegative = strVal.includes('-') || (strVal.includes('(') && strVal.includes(')'));
          strVal = strVal.replace(/[^0-9.]/g, '');
          let num = parseFloat(strVal);
          return isNaN(num) ? 0 : (isNegative ? -num : num);
        }

        function HCMovementTab({ dataModel, processedDataCache, scenarioFilters }) {
          const allMonths = useMemo(() => [...dataModel.actualMonths, ...(scenarioFilters.forecasts ? dataModel.forecastMonths : [])], [dataModel, scenarioFilters.forecasts]);
          const movementData = useMemo(() => {
            if (!processedDataCache) return [];
            return allMonths.slice(1).map((curr, idx) => {
              const prev = allMonths[idx];
              const prevIds = new Set(); const currIds = new Set();
              processedDataCache.data.filter(d => d.month === prev && d.id).forEach(d => prevIds.add(d.id));
              processedDataCache.data.filter(d => d.month === curr && d.id).forEach(d => currIds.add(d.id));
              const joiners = [...currIds].filter(id => !prevIds.has(id)).length;
              const leavers = [...prevIds].filter(id => !currIds.has(id)).length;
              return { month: curr, label: formatMonthLabel(curr), prevHC: prevIds.size, currHC: currIds.size, joiners, leavers, net: joiners - leavers, isForecast: dataModel.forecastMonths.includes(curr) };
            });
          }, [processedDataCache, allMonths, dataModel.forecastMonths]);
          const maxBar = Math.max(...movementData.map(r => Math.max(r.joiners, r.leavers)), 1);
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50 space-y-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 className="text-lg font-bold text-gray-800 mb-1">👥 Headcount Movement — Joiners vs Leavers</h3>
                <p className="text-xs text-gray-400 mb-6">Month-on-month unique employee ID changes.</p>
                <div className="overflow-x-auto">
                  <div className="flex items-end gap-2 min-w-max pb-2" style={{height:'220px'}}>
                    {movementData.map(r => (
                      <div key={r.month} className="flex flex-col items-center gap-1" style={{width:'52px'}}>
                        <div className="flex items-end gap-0.5" style={{height:'160px'}}>
                          <div className="w-5 rounded-t bg-green-500" style={{height:`${(r.joiners/maxBar)*140}px`}} title={`Joiners: ${r.joiners}`}></div>
                          <div className="w-5 rounded-t bg-red-500"   style={{height:`${(r.leavers/maxBar)*140}px`}} title={`Leavers: ${r.leavers}`}></div>
                        </div>
                        <span className={`text-[9px] font-medium ${r.net>0?'text-red-600':r.net<0?'text-green-600':'text-gray-400'}`}>{r.net>0?'+':''}{r.net}</span>
                        <span className={`text-[9px] text-center ${r.isForecast?'text-indigo-400':'text-gray-400'}`}>{r.label}</span>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-4 mt-2 text-xs">
                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-500 inline-block"></span>Joiners</span>
                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-500 inline-block"></span>Leavers</span>
                  </div>
                </div>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-base font-bold text-gray-800">Monthly Detail</h3>
                  <ExportBtn onClick={() => exportCSV(
                    'hc_movement.csv',
                    ['Month','Type','Prior HC','New HC','Joiners','Leavers','Net Change','Status'],
                    movementData.map(r => [r.label, r.isForecast?'Forecast':'Actual', r.prevHC, r.currHC, r.joiners, r.leavers, r.net, r.net>0?'Growing':r.net<0?'Shrinking':'Stable'])
                  )} />
                </div>
                <table className="w-full text-xs border-collapse">
                  <thead className="bg-gray-50"><tr>{['Month','Prior HC','New HC','Joiners','Leavers','Net Change','Status'].map(h=><th key={h} className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200">{h}</th>)}</tr></thead>
                  <tbody className="divide-y divide-gray-100">
                    {movementData.map(r => (
                      <tr key={r.month} className={r.isForecast?'bg-indigo-50/30':'hover:bg-gray-50'}>
                        <td className="px-3 py-2 font-semibold">{r.label}{r.isForecast&&<span className="ml-1 text-[9px] text-indigo-500 font-bold">FCST</span>}</td>
                        <td className="px-3 py-2 text-gray-600">{formatCount(r.prevHC)}</td>
                        <td className="px-3 py-2 font-bold">{formatCount(r.currHC)}</td>
                        <td className="px-3 py-2 text-green-600 font-semibold">+{r.joiners}</td>
                        <td className="px-3 py-2 text-red-600 font-semibold">-{r.leavers}</td>
                        <td className={`px-3 py-2 font-bold ${r.net>0?'text-red-600':r.net<0?'text-green-600':'text-gray-400'}`}>{r.net>0?'+':''}{r.net}</td>
                        <td className="px-3 py-2">{r.net>0?<span className="text-red-600 text-[10px] font-semibold">▲ Growing</span>:r.net<0?<span className="text-green-600 text-[10px] font-semibold">▼ Shrinking</span>:<span className="text-gray-400 text-[10px]">— Stable</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const CHART_COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#6366f1','#14b8a6','#f97316'];

        function CostByFacultyTab({ dataModel, processedDataCache, mappingData, scenarioFilters }) {
          const allMonths = useMemo(() => [...dataModel.actualMonths, ...(scenarioFilters.forecasts ? dataModel.forecastMonths : [])], [dataModel, scenarioFilters.forecasts]);
          const [cfMonth, setCfMonth] = useState(dataModel.baseMonth);
          const facultyData = useMemo(() => {
            if (!processedDataCache) return [];
            const map = {};
            processedDataCache.data.filter(d => d.month === cfMonth).forEach(d => {
              const orgVal = d.cleanOrgValue;
              const fac = d.row['Mapped Faculty'] || (mappingData&&orgVal&&mappingData[orgVal]?.faculty) || getFacultyFromOrg(orgVal) || 'Unknown';
              if (!map[fac]) map[fac] = { faculty: fac, amount: 0, empIds: new Set() };
              map[fac].amount += d.amount;
              if (d.id) map[fac].empIds.add(d.id);
            });
            const total = Object.values(map).reduce((s,v) => s+v.amount, 0);
            return Object.values(map).sort((a,b) => b.amount-a.amount).map(v => ({ ...v, hc: v.empIds.size, pct: total>0?(v.amount/total*100):0 }));
          }, [processedDataCache, cfMonth, mappingData]);
          const topFaculties = useMemo(() => facultyData.slice(0,6).map(f=>f.faculty), [facultyData]);
          const trendMonths  = useMemo(() => allMonths.slice(-6), [allMonths]);
          const trendData    = useMemo(() => {
            if (!processedDataCache) return [];
            return trendMonths.map(m => {
              const row = { month: m, label: formatMonthLabel(m) };
              topFaculties.forEach(fac => {
                row[fac] = 0;
                processedDataCache.data.filter(d => d.month === m).forEach(d => {
                  const orgVal = d.cleanOrgValue;
                  const f = d.row['Mapped Faculty'] || (mappingData&&orgVal&&mappingData[orgVal]?.faculty) || getFacultyFromOrg(orgVal) || 'Unknown';
                  if (f === fac) row[fac] += d.amount;
                });
              });
              return row;
            });
          }, [processedDataCache, trendMonths, topFaculties, mappingData]);
          const maxTrend = Math.max(...trendData.flatMap(r => topFaculties.map(f=>r[f]||0)), 1);
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50 space-y-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-4">
                  <div><h3 className="text-lg font-bold text-gray-800">🏛️ Cost by Faculty</h3><p className="text-xs text-gray-400">Payroll distribution across faculties</p></div>
                  <div className="flex items-center gap-2">
                    <ExportBtn onClick={() => exportCSV(
                      `cost_by_faculty_${cfMonth}.csv`,
                      ['Faculty','Headcount','Total Cost','% of Total'],
                      facultyData.map(f => [f.faculty, f.hc, f.amount.toFixed(2), f.pct.toFixed(2)+'%'])
                    )} />
                    <select value={cfMonth} onChange={e=>setCfMonth(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-xs bg-white">
                      {allMonths.map(m=><option key={m} value={m}>{formatMonthLabel(m)}</option>)}
                    </select>
                  </div>
                </div>
                <div className="space-y-3">
                  {facultyData.map((f,i) => (
                    <div key={f.faculty}>
                      <div className="flex items-center justify-between text-xs mb-1">
                        <span className="font-semibold text-gray-700 truncate max-w-xs">{f.faculty}</span>
                        <div className="flex gap-4 text-right ml-4">
                          <span className="text-gray-400">{formatCount(f.hc)} staff</span>
                          <span className="font-bold text-gray-800 w-24">{formatCurrency(f.amount)}</span>
                          <span className="text-gray-500 w-12">{f.pct.toFixed(1)}%</span>
                        </div>
                      </div>
                      <div className="bg-gray-100 rounded-full h-2.5"><div className="h-2.5 rounded-full" style={{width:`${f.pct}%`,background:CHART_COLORS[i%CHART_COLORS.length]}}></div></div>
                    </div>
                  ))}
                </div>
              </div>
              {trendData.length >= 2 && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                  <h3 className="text-base font-bold text-gray-800 mb-4">6-Month Cost Trend by Faculty</h3>
                  <div className="overflow-x-auto">
                    <div className="flex items-end gap-6 min-w-max" style={{height:'200px'}}>
                      {trendData.map(r => (
                        <div key={r.month} className="flex flex-col items-center gap-1">
                          <div className="flex items-end gap-0.5" style={{height:'160px'}}>
                            {topFaculties.map((fac,fi) => <div key={fac} className="w-4 rounded-t" style={{height:`${Math.max(2,((r[fac]||0)/maxTrend)*140)}px`,background:CHART_COLORS[fi%CHART_COLORS.length]}} title={`${fac}: ${formatCurrency(r[fac]||0)}`}></div>)}
                          </div>
                          <span className="text-[9px] text-gray-400">{r.label}</span>
                        </div>
                      ))}
                    </div>
                    <div className="flex flex-wrap gap-3 mt-3">
                      {topFaculties.map((fac,fi) => <span key={fac} className="flex items-center gap-1 text-[10px] text-gray-600"><span className="w-3 h-3 rounded inline-block" style={{background:CHART_COLORS[fi%CHART_COLORS.length]}}></span>{fac}</span>)}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function FTECostTab({ dataModel, processedDataCache, mappingData }) {
          const [fteFilter, setFteFilter] = useState('faculty');
          const fteData = useMemo(() => {
            if (!processedDataCache) return [];
            const map = {};
            processedDataCache.data.filter(d => d.month === dataModel.baseMonth).forEach(d => {
              const row = d.row; const orgVal = d.cleanOrgValue;
              let key;
              if (fteFilter==='faculty')   key = row['Mapped Faculty']||(mappingData&&orgVal&&mappingData[orgVal]?.faculty)||getFacultyFromOrg(orgVal)||'Unknown';
              else if (fteFilter==='dept') key = row['Mapped Department']||(mappingData&&orgVal&&mappingData[orgVal]?.dept)||row['Department name']||'Unknown';
              else if (fteFilter==='group') key = row['Group']||'Unknown';
              else key = row['Posn Desc']||row['Position']||'Unknown';
              if (!map[key]) map[key] = { key, amount:0, empIds: new Set() };
              map[key].amount += d.amount;
              if (d.id) map[key].empIds.add(d.id);
            });
            return Object.values(map).map(v=>({key:v.key,amount:v.amount,hc:v.empIds.size,avgCost:v.empIds.size>0?v.amount/v.empIds.size:0})).sort((a,b)=>b.avgCost-a.avgCost);
          }, [processedDataCache, fteFilter, mappingData, dataModel.baseMonth]);
          const maxAvg = Math.max(...fteData.map(r=>r.avgCost), 1);
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-5">
                  <div><h3 className="text-lg font-bold text-gray-800">💰 FTE Cost Rate</h3><p className="text-xs text-gray-400">Average monthly cost per employee — base month: {formatMonthLabel(dataModel.baseMonth)}</p></div>
                  <div className="flex items-center gap-2">
                    <ExportBtn onClick={() => exportCSV(
                      `fte_cost_${dataModel.baseMonth}.csv`,
                      [fteFilter.charAt(0).toUpperCase()+fteFilter.slice(1),'Headcount','Total Cost','Avg Cost/FTE'],
                      fteData.map(r => [r.key, r.hc, r.amount.toFixed(2), r.avgCost.toFixed(2)])
                    )} />
                    <div className="bg-gray-100 p-1 rounded-lg inline-flex gap-1">
                      {[['faculty','Faculty'],['dept','Department'],['group','Group'],['position','Position']].map(([val,label])=>(
                        <button key={val} onClick={()=>setFteFilter(val)} className={`px-3 py-1 rounded-md text-xs font-semibold ${fteFilter===val?'bg-white shadow text-blue-700':'text-gray-500 hover:text-gray-700'}`}>{label}</button>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs border-collapse">
                    <thead className="bg-gray-50"><tr>{[fteFilter.charAt(0).toUpperCase()+fteFilter.slice(1),'Headcount','Total Cost','Avg Cost/FTE','Cost Rate'].map(h=><th key={h} className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200">{h}</th>)}</tr></thead>
                    <tbody className="divide-y divide-gray-100">
                      {fteData.map(r => (
                        <tr key={r.key} className="hover:bg-gray-50">
                          <td className="px-3 py-2 font-semibold text-gray-800 max-w-[200px] truncate" title={r.key}>{r.key}</td>
                          <td className="px-3 py-2 text-right text-gray-600">{formatCount(r.hc)}</td>
                          <td className="px-3 py-2 text-right text-gray-700">{formatCurrency(r.amount)}</td>
                          <td className="px-3 py-2 text-right font-bold text-blue-700">{formatCurrency(r.avgCost)}</td>
                          <td className="px-3 py-2"><div className="bg-gray-200 rounded-full h-2"><div className="bg-blue-500 h-2 rounded-full" style={{width:`${(r.avgCost/maxAvg)*100}%`}}></div></div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        function SalaryBandTab({ dataModel, processedDataCache, mappingData }) {
          const [sbFaculty, setSbFaculty] = useState('');
          const [sbGroup,   setSbGroup]   = useState('');
          const BANDS = [
            {label:'< $50K',     min:0,      max:50000},
            {label:'$50K–100K',  min:50000,  max:100000},
            {label:'$100K–150K', min:100000, max:150000},
            {label:'$150K–200K', min:150000, max:200000},
            {label:'$200K–300K', min:200000, max:300000},
            {label:'$300K–500K', min:300000, max:500000},
            {label:'> $500K',    min:500000, max:Infinity},
          ];
          const empAmounts = useMemo(() => {
            if (!processedDataCache) return [];
            const m = {};
            processedDataCache.data.filter(d => d.month===dataModel.baseMonth && d.id).forEach(d => {
              const orgVal = d.cleanOrgValue;
              const fac = d.row['Mapped Faculty']||(mappingData&&orgVal&&mappingData[orgVal]?.faculty)||getFacultyFromOrg(orgVal)||'Unknown';
              if (!m[d.id]) m[d.id] = {amount:0, faculty:fac, group:d.row['Group']||''};
              m[d.id].amount += d.amount;
            });
            return Object.values(m);
          }, [processedDataCache, mappingData, dataModel.baseMonth]);
          const faculties = useMemo(() => [...new Set(empAmounts.map(e=>e.faculty))].filter(Boolean).sort(), [empAmounts]);
          const groups    = useMemo(() => [...new Set(empAmounts.map(e=>e.group))].filter(Boolean).sort(), [empAmounts]);
          const filtered  = useMemo(() => empAmounts.filter(e=>(!sbFaculty||e.faculty===sbFaculty)&&(!sbGroup||e.group===sbGroup)), [empAmounts,sbFaculty,sbGroup]);
          const bandCounts= useMemo(() => BANDS.map(b=>({...b, count:filtered.filter(e=>e.amount>=b.min&&e.amount<b.max).length, total:filtered.filter(e=>e.amount>=b.min&&e.amount<b.max).reduce((s,e)=>s+e.amount,0)})), [filtered]);
          const maxCount  = Math.max(...bandCounts.map(b=>b.count), 1);
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-5">
                  <div><h3 className="text-lg font-bold text-gray-800">📈 Salary Band Distribution</h3><p className="text-xs text-gray-400">Employee count by monthly pay range — base month: {formatMonthLabel(dataModel.baseMonth)} · {formatCount(filtered.length)} employees</p></div>
                  <div className="flex items-center gap-2">
                    <ExportBtn onClick={() => exportCSV(
                      `salary_bands_${dataModel.baseMonth}.csv`,
                      ['Band','Employee Count','% of Total','Total Cost'],
                      bandCounts.map(b => [b.label, b.count, filtered.length>0?((b.count/filtered.length)*100).toFixed(1)+'%':'0%', b.total.toFixed(2)])
                    )} />
                    <select value={sbFaculty} onChange={e=>setSbFaculty(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-xs bg-white"><option value="">All Faculties</option>{faculties.map(f=><option key={f}>{f}</option>)}</select>
                    <select value={sbGroup}   onChange={e=>setSbGroup(e.target.value)}   className="border border-gray-300 rounded-lg px-3 py-1.5 text-xs bg-white"><option value="">All Groups</option>{groups.map(g=><option key={g}>{g}</option>)}</select>
                  </div>
                </div>
                <div className="space-y-4">
                  {bandCounts.map((b,i) => (
                    <div key={b.label}>
                      <div className="flex items-center justify-between text-xs mb-1">
                        <span className="font-semibold text-gray-700 w-28">{b.label}</span>
                        <div className="flex gap-6 text-right">
                          <span className="text-gray-500">{formatCount(b.count)} employees ({filtered.length>0?((b.count/filtered.length)*100).toFixed(1):0}%)</span>
                          <span className="font-bold text-gray-800 w-28 text-right">{formatCurrency(b.total)}</span>
                        </div>
                      </div>
                      <div className="bg-gray-100 rounded-full h-6 relative overflow-hidden">
                        <div className="h-6 rounded-full flex items-center justify-end pr-2 transition-all" style={{width:`${(b.count/maxCount)*100}%`,background:`hsl(${220-i*20},70%,${55+i*3}%)`}}>
                          {b.count>0&&<span className="text-white text-[10px] font-bold">{b.count}</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        function UnionTrendTab({ dataModel, processedDataCache, scenarioFilters }) {
          const allMonths = useMemo(() => [...dataModel.actualMonths, ...(scenarioFilters.forecasts ? dataModel.forecastMonths : [])], [dataModel, scenarioFilters.forecasts]);
          const groups    = processedDataCache ? processedDataCache.uniqueGroups : [];
          const trendRows = useMemo(() => {
            if (!processedDataCache) return [];
            return allMonths.map(m => {
              const row = { month: m, label: formatMonthLabel(m), isForecast: dataModel.forecastMonths.includes(m) };
              groups.forEach(g => {
                row[g] = 0;
                const grpIds = new Set();
                processedDataCache.data.filter(d => d.month===m && d.group===g).forEach(d => { row[g]+=d.amount; if(d.id) grpIds.add(d.id); });
                row[`${g}_hc`] = grpIds.size;
              });
              return row;
            });
          }, [processedDataCache, allMonths, groups, dataModel.forecastMonths]);
          const maxAmt = Math.max(...trendRows.flatMap(r=>groups.map(g=>r[g]||0)), 1);
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50 space-y-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-1">
                  <h3 className="text-lg font-bold text-gray-800">🤝 Union Group Cost Trends</h3>
                  <ExportBtn onClick={() => exportCSV(
                    'union_group_trends.csv',
                    ['Month','Type', ...groups, 'Total'],
                    trendRows.map(r => [r.label, r.isForecast?'Forecast':'Actual', ...groups.map(g => (r[g]||0).toFixed(2)), groups.reduce((s,g)=>s+(r[g]||0),0).toFixed(2)])
                  )} />
                </div>
                <p className="text-xs text-gray-400 mb-5">Monthly payroll cost per union/staff group over time</p>
                <div className="overflow-x-auto">
                  <div className="flex items-end gap-3 min-w-max pb-2" style={{height:'220px'}}>
                    {trendRows.map(r => (
                      <div key={r.month} className={`flex flex-col items-center gap-1 ${r.isForecast?'opacity-70':''}`}>
                        <div className="flex items-end gap-0.5" style={{height:'160px'}}>
                          {groups.map((g,gi) => <div key={g} className="w-4 rounded-t" style={{height:`${Math.max(2,((r[g]||0)/maxAmt)*140)}px`,background:CHART_COLORS[gi%CHART_COLORS.length]}} title={`${g}: ${formatCurrency(r[g]||0)}`}></div>)}
                        </div>
                        <span className={`text-[9px] text-center ${r.isForecast?'text-indigo-400':'text-gray-400'}`}>{r.label}</span>
                      </div>
                    ))}
                  </div>
                  <div className="flex flex-wrap gap-3 mt-2">
                    {groups.map((g,gi) => <span key={g} className="flex items-center gap-1 text-[10px] text-gray-600"><span className="w-3 h-3 rounded inline-block" style={{background:CHART_COLORS[gi%CHART_COLORS.length]}}></span>{g}</span>)}
                  </div>
                </div>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 className="text-base font-bold text-gray-800 mb-3">Group Summary Table</h3>
                <table className="w-full text-xs border-collapse">
                  <thead className="bg-gray-50"><tr><th className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200">Month</th>{groups.map(g=><th key={g} className="px-3 py-2 text-right font-semibold text-gray-600 border-b border-gray-200">{g}</th>)}<th className="px-3 py-2 text-right font-semibold text-gray-600 border-b border-gray-200 bg-gray-100">Total</th></tr></thead>
                  <tbody className="divide-y divide-gray-100">
                    {trendRows.map(r => {
                      const rowTotal = groups.reduce((s,g)=>s+(r[g]||0),0);
                      return (
                        <tr key={r.month} className={r.isForecast?'bg-indigo-50/30':'hover:bg-gray-50'}>
                          <td className="px-3 py-2 font-semibold">{r.label}{r.isForecast&&<span className="ml-1 text-[9px] text-indigo-500">FCST</span>}</td>
                          {groups.map(g=><td key={g} className="px-3 py-2 text-right text-gray-700">{formatCurrency(r[g]||0)}</td>)}
                          <td className="px-3 py-2 text-right font-bold text-gray-800 bg-gray-50">{formatCurrency(rowTotal)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        function UGCSplitTab({ dataModel, processedDataCache, scenarioFilters }) {
          const UGC_CATEGORIES = ['UGC', 'non UGC', 'Donor Fund'];
          const UGC_COLORS = { 'UGC': '#3b82f6', 'non UGC': '#f97316', 'Donor Fund': '#8b5cf6', 'Unknown': '#9ca3af' };
          const allMonths = useMemo(() => [...dataModel.actualMonths, ...(scenarioFilters.forecasts ? dataModel.forecastMonths : [])], [dataModel, scenarioFilters.forecasts]);
          const [selectedMonth, setSelectedMonth] = useState(dataModel.baseMonth);

          const monthlyData = useMemo(() => {
            if (!processedDataCache) return [];
            return allMonths.map(m => {
              const rows = processedDataCache.data.filter(d => d.month === m);
              const bycat = {};
              rows.forEach(d => {
                const cat = d.ugcFlag || (d.row && d.row['_ugcFlag']) || 'Unknown';
                const key = UGC_CATEGORIES.includes(cat) ? cat : 'Unknown';
                if (!bycat[key]) bycat[key] = { amount: 0, empIds: new Set() };
                bycat[key].amount += d.amount;
                if (d.id) bycat[key].empIds.add(d.id);
              });
              const total = Object.values(bycat).reduce((s, v) => s + v.amount, 0);
              const entry = { month: m, label: formatMonthLabel(m), total, isForecast: dataModel.forecastMonths.includes(m) };
              [...UGC_CATEGORIES, 'Unknown'].forEach(cat => {
                entry[cat + '_amt'] = bycat[cat]?.amount ?? 0;
                entry[cat + '_hc']  = bycat[cat]?.empIds.size ?? 0;
                entry[cat + '_pct'] = total > 0 ? ((bycat[cat]?.amount ?? 0) / total * 100) : 0;
              });
              return entry;
            });
          }, [processedDataCache, allMonths, dataModel.forecastMonths]);

          const selectedRow = useMemo(() => monthlyData.find(r => r.month === selectedMonth) || monthlyData[monthlyData.length - 1], [monthlyData, selectedMonth]);

          const mappedCount = useMemo(() => {
            if (!processedDataCache) return 0;
            const base = processedDataCache.data.filter(d => d.month === dataModel.baseMonth);
            return base.filter(d => d.ugcFlag && d.ugcFlag !== '').length;
          }, [processedDataCache, dataModel.baseMonth]);

          if (mappedCount === 0) {
            return (
              <div className="flex flex-col items-center justify-center h-full text-center p-12">
                <div className="text-5xl mb-4">🔵</div>
                <h3 className="text-xl font-bold text-gray-700 mb-2">No Employee Mapping Loaded</h3>
                <p className="text-gray-500 max-w-sm">Go to <strong>Admin → Employee / UGC Mapping</strong> and upload your Mapping file to classify employees as UGC, non UGC, or Donor Fund.</p>
              </div>
            );
          }

          return (
            <div className="p-6 overflow-y-auto h-full">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h2 className="text-2xl font-bold">UGC vs Non-UGC Split</h2>
                  <p className="text-gray-500 text-sm mt-1">{mappedCount.toLocaleString()} employee-month rows classified</p>
                </div>
                <select className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white shadow-sm" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                  {allMonths.map(m => <option key={m} value={m}>{formatMonthLabel(m)}{dataModel.forecastMonths.includes(m) ? ' (F)' : ''}</option>)}
                </select>
              </div>

              {selectedRow && (
                <>
                  <div className="grid grid-cols-2 gap-3 mb-6 md:grid-cols-4">
                    {[...UGC_CATEGORIES, 'Unknown'].map(cat => (
                      <div key={cat} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                        <div className="flex items-center gap-2 mb-1">
                          <div className="w-3 h-3 rounded-full" style={{ background: UGC_COLORS[cat] }}></div>
                          <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{cat}</span>
                        </div>
                        <p className="text-xl font-bold text-gray-900">{formatCurrency(selectedRow[cat + '_amt'])}</p>
                        <p className="text-xs text-gray-400 mt-1">{selectedRow[cat + '_pct'].toFixed(1)}% · {selectedRow[cat + '_hc']} employees</p>
                      </div>
                    ))}
                  </div>

                  <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm mb-6">
                    <p className="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Cost Breakdown — {selectedRow.label}</p>
                    <div className="flex rounded-full overflow-hidden h-8">
                      {[...UGC_CATEGORIES, 'Unknown'].map(cat => {
                        const pct = selectedRow[cat + '_pct'];
                        if (pct < 0.5) return null;
                        return <div key={cat} style={{ width: pct + '%', background: UGC_COLORS[cat] }} className="flex items-center justify-center text-white text-xs font-bold" title={cat + ': ' + pct.toFixed(1) + '%'}>{pct >= 5 ? pct.toFixed(0) + '%' : ''}</div>;
                      })}
                    </div>
                    <div className="flex flex-wrap gap-4 mt-3">
                      {[...UGC_CATEGORIES, 'Unknown'].map(cat => (
                        <div key={cat} className="flex items-center gap-1.5 text-xs text-gray-600">
                          <div className="w-2.5 h-2.5 rounded-full" style={{ background: UGC_COLORS[cat] }}></div>
                          {cat}
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}

              <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                <table className="w-full text-sm text-left border-collapse">
                  <thead className="bg-gray-50 border-b border-gray-200">
                    <tr>
                      <th className="px-4 py-3 font-semibold text-gray-700">Month</th>
                      {[...UGC_CATEGORIES, 'Unknown'].map(cat => (
                        <th key={cat} className="px-4 py-3 font-semibold text-right text-gray-700">{cat}</th>
                      ))}
                      <th className="px-4 py-3 font-semibold text-right text-gray-700">Total</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {monthlyData.map(row => (
                      <tr key={row.month} onClick={() => setSelectedMonth(row.month)} className={`cursor-pointer hover:bg-gray-50 ${row.month === selectedMonth ? 'bg-blue-50' : ''} ${row.isForecast ? 'text-indigo-700' : ''}`}>
                        <td className="px-4 py-2 font-medium">{row.label}{row.isForecast ? ' (F)' : ''}</td>
                        {[...UGC_CATEGORIES, 'Unknown'].map(cat => (
                          <td key={cat} className="px-4 py-2 text-right">{row[cat + '_amt'] > 0 ? formatCurrency(row[cat + '_amt']) : <span className="text-gray-300">—</span>}</td>
                        ))}
                        <td className="px-4 py-2 text-right font-semibold">{formatCurrency(row.total)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        function SensitivityTab({ dataModel, processedDataCache }) {
          const [sens, setSens] = useState({ low: 3, mid: 5, high: 8 });
          const baseMonthlyCost = useMemo(() => {
            if (!processedDataCache) return 0;
            return processedDataCache.data.filter(d => d.month === dataModel.baseMonth).reduce((s,d) => s+d.amount, 0);
          }, [processedDataCache, dataModel.baseMonth]);
          const calcAnnual = (pct) => baseMonthlyCost * (1 + pct/100) * 12;
          const baseAnnual = calcAnnual(0);
          const scenarios = [
            {label:'Base', pct:0,        color:'text-gray-700',  bg:'bg-gray-50',  border:'border-gray-200'},
            {label:'Low',  pct:sens.low,  color:'text-green-700', bg:'bg-green-50', border:'border-green-200'},
            {label:'Mid',  pct:sens.mid,  color:'text-blue-700',  bg:'bg-blue-50',  border:'border-blue-200'},
            {label:'High', pct:sens.high, color:'text-red-700',   bg:'bg-red-50',   border:'border-red-200'},
          ];
          return (
            <div className="p-6 overflow-y-auto flex-grow bg-gray-50/50 space-y-6">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-1">
                  <h3 className="text-lg font-bold text-gray-800">🎛️ Forecast Sensitivity — Union Increase Scenarios</h3>
                  <ExportBtn onClick={() => exportCSV(
                    'sensitivity_analysis.csv',
                    ['Month','Base','Low ('+sens.low+'%)','Mid ('+sens.mid+'%)','High ('+sens.high+'%)'],
                    [
                      ...dataModel.forecastMonths.slice(0,14).map(m => [
                        formatMonthLabel(m),
                        baseMonthlyCost.toFixed(2),
                        (baseMonthlyCost*(1+sens.low/100)).toFixed(2),
                        (baseMonthlyCost*(1+sens.mid/100)).toFixed(2),
                        (baseMonthlyCost*(1+sens.high/100)).toFixed(2),
                      ]),
                      ['Annual Total',
                        (baseMonthlyCost*12).toFixed(2),
                        (baseMonthlyCost*(1+sens.low/100)*12).toFixed(2),
                        (baseMonthlyCost*(1+sens.mid/100)*12).toFixed(2),
                        (baseMonthlyCost*(1+sens.high/100)*12).toFixed(2),
                      ]
                    ]
                  )} />
                </div>
                <p className="text-xs text-gray-400 mb-6">Adjust sliders to model different union increase scenarios and see projected annual cost impact.</p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                  {[['low','Low','green'],['mid','Mid','blue'],['high','High','red']].map(([key,label,color]) => (
                    <div key={key} className={`bg-${color}-50 border border-${color}-200 rounded-xl p-4`}>
                      <label className={`text-xs font-bold text-${color}-700 mb-2 block`}>{label} Scenario: <span className="text-lg">{sens[key]}%</span></label>
                      <input type="range" min="0" max="25" step="0.5" value={sens[key]} onChange={e=>setSens(p=>({...p,[key]:parseFloat(e.target.value)}))} className="w-full accent-blue-600" />
                      <div className="flex justify-between text-[9px] text-gray-400 mt-1"><span>0%</span><span>25%</span></div>
                    </div>
                  ))}
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                  {scenarios.map(s => {
                    const annualCost = calcAnnual(s.pct);
                    const diff = annualCost - baseAnnual;
                    return (
                      <div key={s.label} className={`${s.bg} border ${s.border} rounded-xl p-4`}>
                        <p className={`text-xs font-bold ${s.color} mb-1`}>{s.label} {s.pct>0?`(+${s.pct}%)`:''}</p>
                        <p className={`text-xl font-bold ${s.color}`}>{formatCurrency(annualCost)}</p>
                        <p className="text-xs text-gray-500 mt-1">Annual projection</p>
                        {s.pct>0&&<p className={`text-xs font-semibold mt-1 ${s.color}`}>+{formatCurrency(diff)} vs base</p>}
                      </div>
                    );
                  })}
                </div>
                <div className="bg-gray-50 rounded-xl p-4 border border-gray-200">
                  <h4 className="text-sm font-bold text-gray-700 mb-3">Monthly Projection — Base Month Carry-Forward</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs border-collapse">
                      <thead className="bg-gray-100">
                        <tr>
                          <th className="px-3 py-2 text-left font-semibold border-b border-gray-200">Month</th>
                          <th className="px-3 py-2 text-right font-semibold border-b border-gray-200 text-gray-600">Base</th>
                          <th className="px-3 py-2 text-right font-semibold border-b border-gray-200 text-green-700">Low ({sens.low}%)</th>
                          <th className="px-3 py-2 text-right font-semibold border-b border-gray-200 text-blue-700">Mid ({sens.mid}%)</th>
                          <th className="px-3 py-2 text-right font-semibold border-b border-gray-200 text-red-700">High ({sens.high}%)</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {dataModel.forecastMonths.slice(0,14).map(m => (
                          <tr key={m} className="hover:bg-gray-50">
                            <td className="px-3 py-1.5 font-semibold text-indigo-600">{formatMonthLabel(m)} <span className="text-[9px] text-indigo-400">FCST</span></td>
                            <td className="px-3 py-1.5 text-right text-gray-600">{formatCurrency(baseMonthlyCost)}</td>
                            <td className="px-3 py-1.5 text-right text-green-700 font-semibold">{formatCurrency(baseMonthlyCost*(1+sens.low/100))}</td>
                            <td className="px-3 py-1.5 text-right text-blue-700 font-semibold">{formatCurrency(baseMonthlyCost*(1+sens.mid/100))}</td>
                            <td className="px-3 py-1.5 text-right text-red-700 font-semibold">{formatCurrency(baseMonthlyCost*(1+sens.high/100))}</td>
                          </tr>
                        ))}
                        <tr className="bg-gray-100 font-bold border-t-2 border-gray-300">
                          <td className="px-3 py-2">Annual Total</td>
                          <td className="px-3 py-2 text-right">{formatCurrency(baseMonthlyCost*12)}</td>
                          <td className="px-3 py-2 text-right text-green-700">{formatCurrency(baseMonthlyCost*(1+sens.low/100)*12)}</td>
                          <td className="px-3 py-2 text-right text-blue-700">{formatCurrency(baseMonthlyCost*(1+sens.mid/100)*12)}</td>
                          <td className="px-3 py-2 text-right text-red-700">{formatCurrency(baseMonthlyCost*(1+sens.high/100)*12)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // ─── END TAB COMPONENTS ────────────────────────────────────────────

        // ─── Position Admin Panel (must be a proper component — hooks rules) ──
        function PositionAdminPanel({ positionMap, setPositionMap }) {
          const [posSearch, setPosSearch]   = useState('');
          const [editRow, setEditRow]       = useState(null);
          const [newRow, setNewRow]         = useState({ position_number: '', position_desc: '' });
          const [posLoading, setPosLoading] = useState(false);
          const toast = useToast();

          const allPositions = useMemo(() =>
            Object.entries(positionMap.byNumber || {}).map(([pn, pd]) => ({ pn, pd })).sort((a,b) => a.pn.localeCompare(b.pn)),
          [positionMap]);

          const filtered = useMemo(() => posSearch
            ? allPositions.filter(p => p.pn.includes(posSearch) || p.pd.toLowerCase().includes(posSearch.toLowerCase()))
            : allPositions,
          [allPositions, posSearch]);

          const handleSave = async (pn, pd) => {
            if (!pn.trim() || !pd.trim()) return;
            setPosLoading(true);
            try {
              await savePositionToDB(pn.trim(), pd.trim());
              setPositionMap(prev => ({
                byNumber: { ...prev.byNumber, [pn.trim()]: pd.trim() },
                byDesc:   { ...prev.byDesc,   [pd.trim()]: pn.trim() },
              }));
              setEditRow(null);
              setNewRow({ position_number: '', position_desc: '' });
              toast('Position saved', 'success');
            } catch(e) { toast('Save failed: ' + e.message, 'error'); }
            setPosLoading(false);
          };

          const handleDelete = async (pn) => {
            setPosLoading(true);
            try {
              await deletePositionFromDB(pn);
              setPositionMap(prev => {
                const byNumber = {...prev.byNumber}; delete byNumber[pn];
                const byDesc   = {...prev.byDesc};   delete byDesc[prev.byNumber[pn]];
                return { byNumber, byDesc };
              });
              toast('Position deleted', 'success');
            } catch(e) { toast('Delete failed: ' + e.message, 'error'); }
            setPosLoading(false);
          };

          return (
            <div className="max-w-3xl">
              <h2 className="text-2xl font-bold mb-1">Position Master Data</h2>
              <p className="text-gray-500 text-sm mb-4">
                {allPositions.length} positions loaded. Displayed as <span className="font-mono bg-gray-100 px-1 rounded text-xs">00100033 — Lecturer</span> throughout the app.
              </p>

              {/* Add new */}
              <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-5">
                <h3 className="text-sm font-bold text-indigo-800 mb-3">Add New Position</h3>
                <div className="flex gap-2">
                  <input value={newRow.position_number} onChange={e => setNewRow(p => ({...p, position_number: e.target.value}))}
                    placeholder="Position number (e.g. 00100999)"
                    className="border border-gray-300 rounded-lg px-3 py-2 text-xs w-44 focus:border-indigo-400 focus:outline-none font-mono" />
                  <input value={newRow.position_desc} onChange={e => setNewRow(p => ({...p, position_desc: e.target.value}))}
                    placeholder="Position description"
                    className="border border-gray-300 rounded-lg px-3 py-2 text-xs flex-1 focus:border-indigo-400 focus:outline-none" />
                  <button onClick={() => handleSave(newRow.position_number, newRow.position_desc)}
                    disabled={posLoading || !newRow.position_number || !newRow.position_desc}
                    className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-xs font-bold px-4 py-2 rounded-lg">
                    Add
                  </button>
                </div>
              </div>

              {/* Search */}
              <input value={posSearch} onChange={e => setPosSearch(e.target.value)}
                placeholder="Search by number or description..."
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs mb-3 focus:border-blue-400 focus:outline-none" />

              {/* Table */}
              <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                <div className="px-4 py-2 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                  <span className="text-xs font-semibold text-gray-600">
                    {filtered.length} of {allPositions.length} positions{posSearch && ` matching "${posSearch}"`}
                  </span>
                  {posLoading && <span className="text-xs text-indigo-600 font-semibold animate-pulse">Saving...</span>}
                </div>
                <div className="overflow-y-auto max-h-[480px]">
                  <table className="w-full text-xs border-collapse">
                    <thead className="bg-gray-50 sticky top-0">
                      <tr>
                        <th className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200 w-36">Position No.</th>
                        <th className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200">Description</th>
                        <th className="px-3 py-2 border-b border-gray-200 w-24"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {filtered.map(({ pn, pd }) => (
                        <tr key={pn} className="hover:bg-gray-50">
                          <td className="px-3 py-2 font-mono text-gray-500">{pn}</td>
                          <td className="px-3 py-2">
                            {editRow?.pn === pn ? (
                              <input autoFocus value={editRow.pd}
                                onChange={e => setEditRow(r => ({...r, pd: e.target.value}))}
                                onKeyDown={e => { if(e.key==='Enter') handleSave(pn, editRow.pd); if(e.key==='Escape') setEditRow(null); }}
                                className="border border-indigo-400 rounded px-2 py-1 w-full text-xs focus:outline-none" />
